// Callback optionnel après fermeture complète de la file de popups objet
let objetPopupOnEmpty = null;

function closeObjetPopup() {
  document.getElementById('objet-popup').classList.remove('open');
  objetPopupQueue.shift();
  if (objetPopupQueue.length > 0) {
    setTimeout(showNextObjetPopup, 200);
  } else if (objetPopupOnEmpty) {
    const cb = objetPopupOnEmpty;
    objetPopupOnEmpty = null;
    setTimeout(cb, 150);
  }
}

// ══════════════════════════════════════════════════════════
// POPUP NARRATION CENTRAL (réussite mini-jeux : pacman, tractions)
// ══════════════════════════════════════════════════════════
let popupCountdownTimer = null;
let echecCountdownTimer = null;

function showPopupNarration(texte, onOk, opts) {
  opts = opts || {};
  const overlay = document.getElementById('popup-narration');
  const txtEl = document.getElementById('popup-narration-txt');
  const okBtn = document.getElementById('popup-narration-ok');

  // Délai de lecture forcé avant que le bouton OK devienne cliquable.
  // Réglable depuis le Sheet (clé popup_delai_lecture, en secondes).
  // opts.delai permet de surcharger ponctuellement (ex. tractions).
  const delaiSec = (opts.delai != null)
    ? opts.delai
    : (parseFloat(G?.config?.popup_delai_lecture) || 3);

  if (popupCountdownTimer) { clearInterval(popupCountdownTimer); popupCountdownTimer = null; }

  overlay.classList.add('open');
  okBtn.disabled = true;
  okBtn.style.opacity = '0.4';

  // Le texte s'écrit en machine à écrire ; en parallèle, un compte à rebours
  // tourne sur le bouton. Le bouton ne s'active qu'à la fin du décompte,
  // même si le texte a fini de s'écrire avant.
  typewriteBloc(txtEl, texte, null);

  let restant = Math.ceil(delaiSec);
  okBtn.textContent = restant > 0 ? `OK (${restant})` : 'OK';

  const activer = () => {
    if (popupCountdownTimer) { clearInterval(popupCountdownTimer); popupCountdownTimer = null; }
    okBtn.disabled = false;
    okBtn.style.opacity = '1';
    okBtn.textContent = 'OK';
  };

  if (restant <= 0) {
    activer();
  } else {
    popupCountdownTimer = setInterval(() => {
      restant--;
      if (restant <= 0) {
        activer();
      } else {
        okBtn.textContent = `OK (${restant})`;
      }
    }, 1000);
  }

  okBtn.onclick = () => {
    if (okBtn.disabled) return;
    if (popupCountdownTimer) { clearInterval(popupCountdownTimer); popupCountdownTimer = null; }
    overlay.classList.remove('open');
    if (onOk) onOk();
  };
}

// Créer un bloc dialogue — si le texte commence par [ c'est une narration
function createDlgBloc(personnage, texte) {
  const isNarr = texte.trim().startsWith('[') && texte.includes(']');
  const texteClean = isNarr
    ? texte.trim().replace(/^\[/, '').replace(/\]$/, '').trim()
    : texte;
  const bloc = document.createElement('div');
  bloc.className = 'dlg-bloc' + (isNarr ? ' narration' : '');
  if (isNarr) {
    bloc.innerHTML = `<div class="dlg-txt">${texteClean}</div>`;
  } else {
    bloc.innerHTML = `<div class="dlg-nom">${personnage}</div><div class="dlg-txt">${texteClean}</div>`;
  }
  return { bloc, isNarr, texteClean };
}

// Split un texte en phrases, en respectant les [narrations] comme unités atomiques
function splitPhrases(texte) {
  // D'abord séparer sur |
  const parts = texte.split('|').map(p => p.trim()).filter(Boolean);
  // Ensuite pour chaque part non-narration, découper sur saut de ligne puis ponctuation
  const result = [];
  for (const part of parts) {
    if (part.startsWith('[')) {
      result.push(part); // narration = bloc atomique
    } else if (part.includes('\n')) {
      result.push(...part.split(/\n+/).map(p => p.trim()).filter(Boolean));
    } else {
      const sub = part.split(/(?<=[.!?…])\s+(?=[A-ZÀ-Ù0-9])/).map(p => p.trim()).filter(Boolean);
      result.push(...(sub.length > 0 ? sub : [part]));
    }
  }
  return result;
}
// ══════════════════════════════════════════════════════════
// SONS
// Deux canaux indépendants :
//  - bgMusic : musique de fond globale, en boucle, jamais coupée
//  - currentSound : sons/voix des lieux, joués PAR-DESSUS la musique
// ══════════════════════════════════════════════════════════
let currentSound = null;
let bgMusic = null;
let bgMusicStarted = false;
let launchSound = null; // jingle de l'écran titre (launch.mp3)
let introMusic = null;  // élément <audio> de la musique d'intro (intro.mp3), préchargé
let introGain = null;   // gain Web Audio de la musique d'intro (pour le fondu)
let introMusicReady = null; // promesse résolue quand intro.mp3 est prêt à jouer
let isMuted = false; // état mute global (musique + sons)

// Contexte audio partagé (aussi utilisé par le son de tap), résumé après un geste.
function getAudioCtx() {
  if (!tapAudioCtx) tapAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (tapAudioCtx.state === 'suspended') tapAudioCtx.resume();
  return tapAudioCtx;
}

// Précharger intro.mp3 (élément <audio>) dès l'init pour qu'il soit prêt quand
// l'intro démarre — évite que l'intro commence sans musique / avec du retard.
function preloadIntroMusic() {
  introMusic = new Audio();
  introMusic.loop = true;
  introMusic.preload = 'auto';
  introMusic.crossOrigin = 'anonymous'; // requis pour router du cross-origin (CORS OK côté raw.githubusercontent)
  introMusicReady = new Promise((resolve) => {
    const ok = () => resolve();
    introMusic.addEventListener('canplaythrough', ok, { once: true });
    introMusic.addEventListener('error', ok, { once: true });
    setTimeout(ok, 8000); // filet : ne jamais bloquer indéfiniment
  });
  introMusic.src = BASE + 'son/intro.mp3';
  introMusic.load();
}

// Lancer la musique d'intro (déjà préchargée), routée via Web Audio pour le fondu.
function playIntroMusic() {
  if (!introMusic) preloadIntroMusic(); // filet
  introGain = null;
  try {
    const ctx = getAudioCtx();
    const src = ctx.createMediaElementSource(introMusic);
    introGain = ctx.createGain();
    introGain.gain.value = isMuted ? 0 : 1;
    src.connect(introGain);
    introGain.connect(ctx.destination);
  } catch (e) { introGain = null; introMusic.muted = isMuted; } // repli si Web Audio indispo
  try { introMusic.currentTime = 0; } catch (e) {}
  introMusic.play().catch(() => {});
}

// Fondu sortant de la musique d'intro sur `ms` ms — via le gain Web Audio (marche
// sur iOS), avec repli sur le volume pour les navigateurs desktop sans routage.
function fadeOutIntroMusic(ms) {
  if (introGain && tapAudioCtx) {
    const now = tapAudioCtx.currentTime;
    try {
      // Rampe linéaire : le volume baisse de façon régulière sur toute la durée,
      // le fade se sent bien sur les 3 s (au lieu de devenir inaudible trop tôt).
      introGain.gain.cancelScheduledValues(now);
      introGain.gain.setValueAtTime(introGain.gain.value, now);
      introGain.gain.linearRampToValueAtTime(0, now + ms / 1000);
    } catch (e) {}
  } else if (introMusic) {
    const v0 = introMusic.volume, t0 = performance.now();
    const step = () => {
      const p = Math.min(1, (performance.now() - t0) / ms);
      try { introMusic.volume = v0 * (1 - p); } catch (e) {}
      if (p < 1 && introMusic && !introMusic.paused) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }
}

// Coupe ou réactive tout l'audio du jeu (musique de fond + son de lieu + jingle).
function toggleMute() {
  isMuted = !isMuted;
  if (bgMusic) bgMusic.muted = isMuted;
  if (currentSound) currentSound.muted = isMuted;
  if (launchSound) launchSound.muted = isMuted;
  if (introMusic) introMusic.muted = isMuted;
  if (introGain) { try { introGain.gain.value = isMuted ? 0 : 1; } catch (e) {} }
  if (lambertAudio) lambertAudio.muted = isMuted;
  if (cessAudio) cessAudio.muted = isMuted;
  if (matchAudio) matchAudio.muted = isMuted;
  if (doorOpenAudio) doorOpenAudio.muted = isMuted;
  if (ambianceLieu) ambianceLieu.muted = isMuted;
  if (pageAudio) pageAudio.muted = isMuted;
  // Basculer l'icône
  const on = document.getElementById('mute-icon-on');
  const off = document.getElementById('mute-icon-off');
  if (on && off) {
    on.style.display = isMuted ? 'none' : 'block';
    off.style.display = isMuted ? 'block' : 'none';
  }
}

// Jingle de l'écran titre : joué SEUL (coupe la musique de fond le temps du
// titre). Chemin configurable (clé 'son_launch'), repli sur son/launch.mp3.
function playLaunch() {
  // Couper la musique de fond pendant l'écran titre
  if (bgMusic) { bgMusic.pause(); bgMusic = null; bgMusicStarted = false; }
  const path = (G.config && G.config.son_launch) ? G.config.son_launch : 'son/launch.mp3';
  if (launchSound) { launchSound.pause(); launchSound.currentTime = 0; }
  launchSound = new Audio(BASE + path);
  launchSound.loop = false;
  launchSound.muted = isMuted;
  launchSound.volume = parseFloat(G.config && G.config.son_launch_volume) || 0.6;
  launchSound.play().catch(() => {});
  return launchSound;
}

// Arrête le jingle de l'écran titre (au lancement du jeu via "Jouer").
function stopLaunch() {
  if (launchSound) { launchSound.pause(); launchSound.currentTime = 0; launchSound = null; }
}

// Démarre la musique de fond globale (une seule fois), en boucle.
// La clé : config.musique_fond, sinon repli sur le son du lieu 'hall'.
function startBgMusic() {
  // Garde synchrone : si une instance existe déjà OU si un démarrage est en
  // cours, on ne recrée rien (évite la double couche audio décalée).
  if (bgMusicStarted || bgMusic) return;
  let path = (G.config && G.config.musique_fond) ? G.config.musique_fond : null;
  if (!path) {
    const hall = G.lieux.find(l => l.id === 'hall');
    path = hall ? (hall.son || hall.son_entree || null) : null;
  }
  if (!path) return;
  // Nouvelle instance => l'ancien routage Web Audio (source/filtre/gain) est mort :
  // on le réinitialise, sinon l'effet "étouffé" pointerait sur une source morte et
  // ne s'appliquerait plus jamais (cas : autoplay bloqué puis relance au 1er clic).
  bgRouted = false; bgGain = null; bgFilter = null;
  // On crée l'instance tout de suite : bgMusic non-null verrouille les appels suivants.
  bgMusic = new Audio();
  // crossOrigin AVANT le src : indispensable pour pouvoir router la piste dans
  // Web Audio (effet "étouffé" des toilettes) sans que le flux soit bloqué.
  bgMusic.crossOrigin = 'anonymous';
  bgMusic.loop = true;
  bgMusic.muted = isMuted;
  bgMusic.volume = bgVolumeNormal();
  bgMusic.src = BASE + path;
  // Ceinture-bretelles : si l'attribut loop ne se réamorce pas (cas fréquent
  // sur iOS/Safari où la piste s'arrête à la fin), on relance manuellement.
  // On capture l'ÉLÉMENT (pas la variable globale) et on vérifie qu'il est
  // toujours le bgMusic courant : sinon une ancienne instance pourrait relancer
  // la nouvelle par surprise (« disque rayé »).
  const elBg = bgMusic;
  elBg.addEventListener('ended', () => {
    if (bgMusic !== elBg) return;
    try { elBg.currentTime = 0; } catch (e) {}
    elBg.play().catch(() => {});
  });
  bgMusic.play().then(() => { bgMusicStarted = true; }).catch(() => {
    // Autoplay bloqué : on libère l'instance pour pouvoir retenter au prochain clic.
    bgMusicStarted = false;
    if (bgMusic) { bgMusic.pause(); bgMusic = null; }
  });
}

// ══════════════════════════════════════════════════════════
// AMBIANCES DE LIEU (sound design)
// ══════════════════════════════════════════════════════════
// Trois comportements possibles quand on entre dans un lieu :
//  1. Lieu avec SA PROPRE ambiance (config `ambiances_lieux`) : ambiance-hall se
//     coupe et la piste du lieu tourne en boucle (ex. culte.mp3, exterieur.mp3).
//     Au retour au hall, ambiance-hall repart à `ambiance_hall_reprise` secondes
//     (défaut 10) : on a l'impression qu'elle a continué sans nous.
//  2. Lieu ÉTOUFFÉ (config `lieux_etouffes`) : ambiance-hall continue mais filtrée
//     passe-bas + volume baissé, comme si le hall était dans la pièce d'à côté
//     (ex. toilettes). Aucun fichier supplémentaire nécessaire.
//  3. Tous les autres : ambiance-hall normale.
let ambianceLieu = null;   // <audio> de l'ambiance du lieu en cours
let bgGain = null;         // gain Web Audio de la musique de fond
let bgFilter = null;       // passe-bas ("pièce à côté")
let bgRouted = false;      // vrai une fois bgMusic routé dans Web Audio

function bgVolumeNormal() {
  return parseFloat(G && G.config && G.config.musique_fond_volume) || 0.5;
}
// Deux niveaux d'étouffement de la musique de fond :
//   FORT  ("derrière une porte fermée", ex. toilettes) : etouffe_frequence (400 Hz)
//         + etouffe_volume (0.35).
//   LÉGER ("boutique duty-free, pas vraiment dans le hall", ex. Louis/relay et
//         Rolex) : etouffe_leger_frequence (2000 Hz) + etouffe_leger_volume (0.7).
//         Moins filtré, un peu moins fort.
function etouffeFreq() {
  const n = parseFloat(G && G.config && G.config.etouffe_frequence);
  return (n > 0) ? n : 400;   // Hz : plus bas = plus étouffé
}
function etouffeVol() {
  const n = parseFloat(G && G.config && G.config.etouffe_volume);
  return (n >= 0 && n <= 1) ? n : 0.35;  // multiplicateur du volume normal
}
function etouffeLegerFreq() {
  const n = parseFloat(G && G.config && G.config.etouffe_leger_frequence);
  return (n > 0) ? n : 2000;  // Hz : plus haut = plus léger (moins filtré)
}
function etouffeLegerVol() {
  const n = parseFloat(G && G.config && G.config.etouffe_leger_volume);
  return (n >= 0 && n <= 1) ? n : 0.7;
}

// Table lieu -> fichier d'ambiance, depuis config.ambiances_lieux
//   ex : "culte:son/culte.mp3|antoine:son/exterieur.mp3"
function getAmbiancesLieux() {
  const map = {};
  const raw = G && G.config && G.config.ambiances_lieux;
  if (raw) String(raw).split('|').forEach(entry => {
    const i = entry.indexOf(':');
    if (i < 0) return;
    const id = entry.slice(0, i).trim().toLowerCase();
    const f = entry.slice(i + 1).trim();
    if (id && f) map[id] = f;
  });
  return map;
}
function listeContient(cle, id) {
  const raw = G && G.config && G.config[cle];
  if (!raw) return false;
  return String(raw).split('|').map(s => s.trim().toLowerCase()).includes(String(id).toLowerCase());
}
// Réglage d'étouffement d'un lieu, ou null (son normal). Fort prioritaire sur léger.
//   lieux_etouffes        : étouffement FORT  (ex. "toilettes")
//   lieux_etouffes_leger  : étouffement LÉGER (ex. "relay|rolex")
function niveauEtouffementLieu(id) {
  if (listeContient('lieux_etouffes', id)) return { freq: etouffeFreq(), vol: etouffeVol() };
  if (listeContient('lieux_etouffes_leger', id)) return { freq: etouffeLegerFreq(), vol: etouffeLegerVol() };
  return null;
}

// Route bgMusic dans Web Audio (passe-bas + gain). Fait À LA DEMANDE seulement
// (1er étouffement) : tant qu'on n'en a pas besoin, la piste joue en direct, ce
// qui évite tout risque de silence si le contexte audio n'est pas encore actif.
function routerBgMusic() {
  if (bgRouted || !bgMusic) return;
  try {
    const ctx = getAudioCtx();
    const src = ctx.createMediaElementSource(bgMusic);
    bgFilter = ctx.createBiquadFilter();
    bgFilter.type = 'lowpass';
    bgFilter.frequency.value = 20000;   // grand ouvert = aucun effet audible
    bgGain = ctx.createGain();
    bgGain.gain.value = bgVolumeNormal();
    src.connect(bgFilter);
    bgFilter.connect(bgGain);
    bgGain.connect(ctx.destination);
    bgRouted = true;
  } catch (e) { bgRouted = false; bgGain = null; bgFilter = null; }
}

// Applique un étouffement à la musique de fond (fondu court), ou le retire.
// `niveau` = { freq, vol } (cf. niveauEtouffementLieu) ou null pour rétablir.
function etoufferBgMusic(niveau) {
  if (!bgMusic) return;
  const vol = bgVolumeNormal();
  const freqCible = niveau ? niveau.freq : 20000;      // 20 kHz = filtre grand ouvert
  const volCible = niveau ? vol * niveau.vol : vol;
  if (niveau) routerBgMusic();
  if (bgRouted && bgFilter && bgGain && tapAudioCtx) {
    const t = tapAudioCtx.currentTime;
    try {
      bgFilter.frequency.setTargetAtTime(freqCible, t, 0.08);
      bgGain.gain.setTargetAtTime(volCible, t, 0.08);
    } catch (e) {}
  } else {
    // Repli sans Web Audio : au moins le volume (ignoré par iOS, mais inoffensif).
    bgMusic.volume = volCible;
  }
}

function stopAmbianceLieu() {
  if (ambianceLieu) { ambianceLieu.pause(); ambianceLieu = null; }
}

// Ambiance propre au lieu : ambiance-hall se coupe, la piste du lieu boucle.
function jouerAmbianceLieu(fichier) {
  stopAmbianceLieu();
  if (bgMusic) bgMusic.pause();     // ambiance-hall se coupe
  ambianceLieu = new Audio(BASE + fichier);
  ambianceLieu.loop = true;
  ambianceLieu.muted = isMuted;
  ambianceLieu.volume = bgVolumeNormal();
  ambianceLieu.play().catch(() => {});
}

// Retour au hall : on coupe l'ambiance du lieu, on enlève l'étouffement, et on
// relance ambiance-hall à `ambiance_hall_reprise` s (défaut 10) si elle a été coupée.
function reprendreBgMusic() {
  stopAmbianceLieu();
  if (!bgMusic) { startBgMusic(); return; }
  etoufferBgMusic(null); // hall : plus aucun étouffement
  if (bgMusic.paused) {
    const n = parseFloat(G && G.config && G.config.ambiance_hall_reprise);
    const pos = isNaN(n) ? 10 : n;
    try { bgMusic.currentTime = pos; } catch (e) {}
    bgMusic.play().catch(() => {});
  }
}

// Applique le bon comportement audio à l'entrée d'un lieu.
function appliquerAmbianceLieu(id) {
  const fichier = getAmbiancesLieux()[String(id).toLowerCase()];
  if (fichier) { jouerAmbianceLieu(fichier); return; }   // 1. ambiance dédiée
  stopAmbianceLieu();
  if (!bgMusic) startBgMusic();
  else if (bgMusic.paused) bgMusic.play().catch(() => {});
  etoufferBgMusic(niveauEtouffementLieu(id));            // 2. étouffé (fort/léger) / 3. normal
}

// ── SON DE TAP ──
// Petit "tick" synthétisé (Web Audio, ~60 ms) joué à chaque tap sur un bouton.
// Pas de fichier à charger : zéro latence. Respecte le mute global.
// Volume réglable depuis le Sheet : config.son_tap_volume (défaut 0.15, 0 = désactivé).
let tapAudioCtx = null;
function playTapSound() {
  const raw = parseFloat(G && G.config && G.config.son_tap_volume);
  const volume = isNaN(raw) ? 0.15 : raw;
  if (volume <= 0 || isMuted) return;
  try {
    if (!tapAudioCtx) tapAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (tapAudioCtx.state === 'suspended') tapAudioCtx.resume();
    const t = tapAudioCtx.currentTime;
    const osc = tapAudioCtx.createOscillator();
    const gain = tapAudioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(600, t + 0.05);
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(gain);
    gain.connect(tapAudioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.07);
  } catch (e) { /* Web Audio indisponible : pas de tick, pas d'erreur */ }
}
// pointerdown (et non click) : le son part dès que le doigt touche, plus réactif.
document.addEventListener('pointerdown', (e) => {
  const btn = e.target && e.target.closest ? e.target.closest('button') : null;
  if (btn && !btn.disabled) playTapSound();
}, { capture: true, passive: true });

// Petit "toc" quand un pin atterrit (cascade du tuto) : même timbre que le clic
// des actions, avec une légère variation de hauteur par pin pour que la pluie de
// pins sonne comme une cascade plutôt qu'un tir uniforme.
function playPinDrop(i) {
  const raw = parseFloat(G && G.config && G.config.son_tap_volume);
  const volume = isNaN(raw) ? 0.15 : raw;
  if (volume <= 0 || isMuted) return;
  try {
    const ctx = getAudioCtx();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    const detune = 1 + (((i % 5) - 2) * 0.045); // ~0.91 .. 1.09 selon le pin
    osc.frequency.setValueAtTime(900 * detune, t);
    osc.frequency.exponentialRampToValueAtTime(600 * detune, t + 0.05);
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.07);
  } catch (e) { /* Web Audio indisponible : pas de son, pas d'erreur */ }
}

// ── RÉVERBÉRATION (voix dans une petite pièce carrelée, ex. Oscar aux chiottes) ──
// Aucun fichier d'impulsion à charger : on la GÉNÈRE (bruit blanc qui décroît),
// technique classique pour une reverb algorithmique simple. Réglable depuis le Sheet :
//   sons_reverb    : liste des sons concernés, séparés par | (défaut : son/oscar.mp3)
//   reverb_duree   : longueur de la queue de reverb en s (défaut 1.5)
//   reverb_melange : dosage 0-1 (défaut 0.3 = "petite reverbe")
let reverbIR = null;
function reverbDuree() {
  const n = parseFloat(G && G.config && G.config.reverb_duree);
  return (n > 0) ? n : 1.2;
}
function reverbMelange() {
  const n = parseFloat(G && G.config && G.config.reverb_melange);
  return (n >= 0 && n <= 1) ? n : 0.55;
}
function estSonReverb(path) {
  const raw = (G && G.config && G.config.sons_reverb !== undefined && G.config.sons_reverb !== '')
    ? G.config.sons_reverb : 'son/oscar.mp3';
  return String(raw).split('|').map(s => s.trim().toLowerCase()).filter(Boolean)
    .includes(String(path).trim().toLowerCase());
}
function getReverbIR(ctx, dureeS) {
  if (reverbIR && Math.abs(reverbIR.duration - dureeS) < 0.01) return reverbIR;
  const rate = ctx.sampleRate;
  const len = Math.max(1, Math.floor(rate * dureeS));
  const ir = ctx.createBuffer(2, len, rate);
  // Réflexions précoces : c'est ELLES qui donnent le côté "boîte carrelée" qui
  // claque (le son rebondit sur des murs proches et durs). Sans elles, on n'a
  // qu'une queue diffuse, qui sonne "grande salle" plutôt que "chiottes".
  const early = [0.006, 0.011, 0.017, 0.023, 0.031, 0.043, 0.058, 0.074];
  for (let c = 0; c < 2; c++) {
    const data = ir.getChannelData(c);
    // Queue diffuse : elle MONTE sur ~25 ms au lieu de démarrer plein pot, et
    // reste en retrait (0.35). Sinon elle masque les réflexions précoces et on
    // n'entend qu'un "shhh" de grande salle au lieu d'une petite pièce carrelée.
    for (let i = 0; i < len; i++) {
      const montee = Math.min(1, (i / rate) / 0.025);
      data[i] = (Math.random() * 2 - 1) * montee * 0.35 * Math.pow(1 - i / len, 2.0);
    }
    // Réflexions précoces par-dessus : elles ressortent nettement du diffus.
    early.forEach((t, k) => {
      // léger décalage entre les 2 canaux = largeur stéréo, ça "ouvre" la pièce
      const idx = Math.floor(t * rate * (1 + c * 0.04));
      if (idx < len) data[idx] += (k % 2 ? -1 : 1) * 0.95 * Math.pow(0.78, k);
    });
  }
  reverbIR = ir;
  return ir;
}
// Route un <audio> dans un convolver (wet) + un passage direct (dry).
function brancherReverb(el) {
  try {
    const ctx = getAudioCtx();
    const src = ctx.createMediaElementSource(el);
    const conv = ctx.createConvolver();
    conv.buffer = getReverbIR(ctx, reverbDuree());
    const melange = reverbMelange();
    const wet = ctx.createGain(); wet.gain.value = melange;
    const dry = ctx.createGain(); dry.gain.value = 1 - melange;
    src.connect(dry); dry.connect(ctx.destination);
    src.connect(conv); conv.connect(wet); wet.connect(ctx.destination);
    return true;
  } catch (e) { return false; }
}

// Son de lieu : joué PAR-DESSUS la musique de fond (n'affecte pas bgMusic).
function playSound(path) {
  if (!path) return;
  if (currentSound) { currentSound.pause(); currentSound.currentTime = 0; }
  const avecReverb = estSonReverb(path);
  currentSound = new Audio();
  // crossOrigin uniquement pour les sons routés dans Web Audio : les autres
  // gardent exactement le chemin actuel (zéro risque de régression).
  if (avecReverb) currentSound.crossOrigin = 'anonymous';
  currentSound.muted = isMuted;
  currentSound.src = BASE + path;
  if (avecReverb) brancherReverb(currentSound);
  currentSound.play().catch(() => {});
}

// Ne coupe QUE le son de lieu, jamais la musique de fond.
function stopSound() {
  if (currentSound) { currentSound.pause(); currentSound.currentTime = 0; currentSound = null; }
}

// Coupe TOUS les sons ponctuels d'un lieu (voix + briquet, cess, match, page)
// avant de changer d'écran, pour qu'aucun ne « bave » sur la navigation.
function arreterSonsTransitoires() {
  stopSound();
  [lambertAudio, cessAudio, matchAudio, pageAudio].forEach(a => {
    if (a) { try { a.pause(); a.currentTime = 0; } catch (e) {} }
  });
}

// Son par lieu : colonne 'son' du Sheet (un mp3 par personnage).
// Le hall n'a pas de son de lieu (sa piste sert de musique de fond globale).
function sonDuLieu(lieu) {
  if (!lieu || lieu.id === 'hall') return null;
  const s = lieu.son || lieu.son_entree || lieu.son_succes || null;
  // Le Sheet utilise « (vide) » comme placeholder de cellule vide : ce n'est pas
  // un fichier. Sans ce garde-fou, on tenterait de jouer BASE + "(vide)" → 404.
  if (!s || String(s).trim().toLowerCase() === '(vide)') return null;
  return s;
}

function playSonLieu(lieu) {
  const s = sonDuLieu(lieu);
  if (s) playSound(s);
}

function playSonSucces() {
  if (currentLieu) playSonLieu(currentLieu);
}

function entrerLieu(id) {
  stopPacman(); // sécurité : aucune boucle pacman ne doit survivre à un changement de lieu
  const lieu = G.lieux.find(l => l.id === id);
  currentLieu = lieu;
  lieuxVisites.add(id);
  cacherTinder();            // état neuf : pas de téléphone résiduel d'une visite précédente
  appliquerAmbianceLieu(id); // ambiance dédiée / hall étouffé / hall normal
  dlgList = G.dialogues.filter(d => d.lieu_id === id).sort((a, b) => +a.ordre - +b.ordre);
  dlgIndex = 0;
  phraseIndex = 0;

  // Jouer le son du personnage à l'arrivée
  // Son du personnage à l'arrivée — sauf toilettes : là, le son d'Oscar est
  // déclenché à chaque ouverture de sa cabine, pas à l'entrée des toilettes.
  if (id !== 'toilettes') playSonLieu(lieu);

  if (id === 'toilettes') { showCabines(lieu); return; }
  if (id === 'enregistrement') { showValises(lieu); return; }
  if (id === 'lambert') { showLambert(lieu); return; }
  if (id === 'magazine') { showMagazine(lieu); return; }

  document.getElementById('scene-bg').style.backgroundImage = `url(${BASE}${lieu.ecran})`;
  showScreen('scene');

  if (id !== 'securite' && !peutAcceder(lieu)) {
    const echec = dlgList.find(d => d.type === 'fin_echec');
    if (echec) dlgIndex = dlgList.indexOf(echec);
  }

  renderDlg();
}

// ══════════════════════════════════════════════════════════
// DIALOGUE ENGINE
// ══════════════════════════════════════════════════════════
function adjustDlgBottom() {
  const cta = document.getElementById('cta-zone');
  const dlg = document.getElementById('dlg-zone');
  const choix = document.getElementById('choix-zone');
  // Double RAF pour attendre le rendu complet
  requestAnimationFrame(() => {
    // Si la zone CTA est masquée (mini-jeu Tinder : on clique dans le téléphone,
    // il n'y a aucun bouton), son offsetHeight vaut 0 et le repli à 58 px faisait
    // FLOTTER le dialogue au-dessus du vide. On le ferre alors en bas avec la
    // seule marge de la zone CTA (14 px + safe area), lisible même masquée.
    const ctaCachee = getComputedStyle(cta).display === 'none';
    let ctaH;
    if (!ctaCachee) {
      ctaH = cta.offsetHeight || 58;
    } else {
      const margeCharte = parseFloat(getComputedStyle(cta).paddingBottom) || 14; // = 14 + safe area
      // Pendant le Tinder, le téléphone occupe toute la hauteur : on descend le
      // bloc un peu plus bas que la marge de charte pour qu'il ne vienne pas
      // toucher la main. On reste au-dessus de la safe area (indicateur home).
      // Réglable : config tinder_dlg_marge (px au-dessus de la safe area, défaut 4).
      if (document.querySelector('#tinder-zone.open')) {
        const safe = Math.max(0, margeCharte - 14); // la charte = 14 px + safe area
        const n = parseFloat(G && G.config && G.config.tinder_dlg_marge);
        ctaH = safe + (isNaN(n) ? 4 : n);
      } else {
        ctaH = margeCharte;
      }
    }
    const choixH = (choix.style.display !== 'none') ? (choix.offsetHeight || 0) : 0;
    choix.style.bottom = ctaH + 'px';
    dlg.style.bottom = (ctaH + choixH) + 'px';
  });
}

function renderDlg() {
  let dlg = dlgList[dlgIndex];
  if (!dlg) { goHall(); return; }

  // Ligne spéciale Arthur : Victor se parle à lui-même UNIQUEMENT s'il a un meuj,
  // que Arthur lui fait disparaître. Sinon on saute cette ligne.
  if (dlg.type === 'victor_si_meuj') {
    if (dlg._traite) {
      // Déjà traitée (navigation phrase par phrase) : afficher comme 'victor'
      dlg = Object.assign({}, dlg, { type: 'victor' });
    } else {
      const idxMeuj = inventaire.indexOf('meuj');
      if (idxMeuj === -1) {
        // Pas de meuj : on saute cette ligne
        dlgIndex++;
        phraseIndex = 0;
        renderDlg();
        return;
      } else {
        // A un meuj : on le retire (une seule fois), on marque la ligne traitée
        inventaire.splice(idxMeuj, 1);
        dlgList[dlgIndex]._traite = true;
        dlg = Object.assign({}, dlg, { type: 'victor' });
      }
    }
  }

  // Reset UI
  const dlgZone = document.getElementById('dlg-zone');
  const choixZone = document.getElementById('choix-zone');
  const ctaZone = document.getElementById('cta-zone');
  const btnContinuer = document.getElementById('btn-continuer');
  const btnHall = document.getElementById('btn-hall-scene');
  dlgZone.innerHTML = '';
  choixZone.innerHTML = '';
  choixZone.style.display = 'none';
  ctaZone.style.display = 'none';
  btnHall.style.display = 'none';
  btnHall.disabled = false;
  btnHall.style.opacity = '1';
  btnHall.textContent = 'Retour au hall';
  if (echecCountdownTimer) { clearInterval(echecCountdownTimer); echecCountdownTimer = null; }
  btnContinuer.style.display = 'block';
  // Nettoyer zones montres si elles existent
  document.querySelectorAll('.montre-zone').forEach(el => el.remove());

  const type = dlg.type;

  // Types à afficher phrase par phrase
  if (['pnj','victor','narration'].includes(type)) {
    const phrases = splitPhrases(dlg.texte);
    if (phraseIndex >= phrases.length) phraseIndex = phrases.length - 1;
    const phrase = phrases[phraseIndex] || dlg.texte;

    dlgZone.innerHTML = '';
    const { bloc, isNarr } = createDlgBloc(dlg.personnage, phrase);
    // On ajoute le bloc mais avec texte vide — la machine à écrire le remplira
    const txtEl = bloc.querySelector('.dlg-txt');
    txtEl.textContent = '';
    dlgZone.appendChild(bloc);

    ctaZone.style.display = 'flex';
    // Bloquer le bouton pendant l'écriture
    btnContinuer.disabled = true;
    btnContinuer.style.opacity = '0.4';
    requestAnimationFrame(adjustDlgBottom);

    const isLast = phraseIndex >= phrases.length - 1;
    const isPnjDlg = type === 'pnj' || type === 'victor' || type === 'narration';
    const nextDlgType = dlgList[dlgIndex + 1]?.type;
    const noMorePnjAfter = !nextDlgType || ['fin_succes','fin_echec','reponse_incorrecte','qcm','qcm_audio','tinder','choix','tunnel_pacman','tunnel_tractions'].includes(nextDlgType);
    // Un mini-jeu (pacman/tractions) suit-il ? Si oui, on ne propose pas l'inventaire.
    const miniJeuSuit = nextDlgType === 'tunnel_pacman' || nextDlgType === 'tunnel_tractions';
    // L'inventaire ne se propose que si le lieu attend vraiment un objet ET qu'aucun mini-jeu ne suit.
    const attendObjet = currentLieu.objet_a_donner
      && currentLieu.objet_a_donner !== 'pacman'
      && currentLieu.objet_a_donner !== 'tractions'
      && currentLieu.objet_a_donner !== 'cabines'
      && currentLieu.objet_a_donner !== 'qcm'
      && currentLieu.objet_a_donner !== 'choix';

    // Lancer la machine à écrire
    typewriteBloc(txtEl, isNarr ? phrase.replace(/^\[|\]$/g,'').trim() : phrase, () => {
      btnContinuer.disabled = false;
      btnContinuer.style.opacity = '1';
    });

    if (isLast && attendObjet && isPnjDlg && noMorePnjAfter && !miniJeuSuit) {
      btnContinuer.textContent = 'Ouvrir l\'inventaire →';
      btnContinuer.onclick = () => { if (!btnContinuer.disabled) { phraseIndex = 0; openInv(); } };
    } else {
      btnContinuer.textContent = 'Continuer';
      if (!isLast) {
        btnContinuer.onclick = () => { if (!btnContinuer.disabled) { phraseIndex++; renderDlg(); } };
      } else {
        btnContinuer.onclick = () => { if (!btnContinuer.disabled) { phraseIndex = 0; dlgIndex++; renderDlg(); } };
      }
    }
    return;
  }

  phraseIndex = 0;

  // Bloc texte standard pour tous les autres types (QCM, choix/Rolex, tinder,
  // fin_succes, fin_echec…). Passe par createDlgBloc (donc gère aussi la
  // narration entre [crochets]) et TAPE le texte à la machine, à la vitesse
  // config typewriter_speed — comme les répliques pnj. Avant, ces types
  // s'affichaient d'un coup.
  const { bloc, texteClean } = createDlgBloc(dlg.personnage, dlg.texte);
  const blocTxtEl = bloc.querySelector('.dlg-txt');
  if (blocTxtEl) blocTxtEl.textContent = '';
  dlgZone.appendChild(bloc);
  // Tinder : on laisse d'abord voir la photo, le commentaire de Paul arrive
  // après un délai (config tinder_delai_commentaire, défaut 0,8 s).
  const delaiTexte = (type === 'tinder') ? tinderDelaiCommentaire() : 0;
  const taperBloc = () => {
    if (!blocTxtEl) return;
    bloc.style.display = '';
    typewriteBloc(blocTxtEl, texteClean, () => requestAnimationFrame(adjustDlgBottom));
    requestAnimationFrame(adjustDlgBottom);
  };
  if (delaiTexte > 0) {
    bloc.style.display = 'none'; // pas de bulle vide pendant l'attente
    if (tinderTexteTimer) clearTimeout(tinderTexteTimer);
    tinderTexteTimer = setTimeout(taperBloc, delaiTexte);
  } else {
    taperBloc();
  }

  if (type === 'qcm') {
    const opts = dlg.meta.split('|');
    const bonne = opts[opts.length - 1].trim();
    const options = opts.slice(0, -1);
    const court = options.every(o => o.length < 28);

    choixZone.style.display = 'flex';
    choixZone.style.flexDirection = court ? 'row' : 'column';
    choixZone.style.flexWrap = court ? 'wrap' : 'nowrap';

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-choix';
      if (court) btn.style.cssText = 'flex:1;min-width:44%;text-align:center;margin:2px;';
      btn.textContent = opt;
      btn.onclick = () => handleQcmAnswer(opt, bonne);
      choixZone.appendChild(btn);
    });
    // Ajuster après que les choix sont dans le DOM
    requestAnimationFrame(() => requestAnimationFrame(adjustDlgBottom));
  }

  // QCM "audio" (deviner ce que dit Paul) : un audio se joue, on choisit la
  // bonne transcription parmi les propositions — MÊME affichage que le QCM.
  // meta = "son/paulX.mp3 | A) prop1 | B) prop2 | ... | <bonne lettre>"
  //   1er token = fichier audio ; dernier = bonne lettre ; milieu = options.
  // texte = la consigne (ex. "Es-tu capable de comprendre cette phrase ?").
  else if (type === 'qcm_audio') {
    const parts = dlg.meta.split('|');
    const audioFile = parts[0].trim();
    const bonne = parts[parts.length - 1].trim();
    const options = parts.slice(1, -1);
    const court = options.every(o => o.length < 28);

    choixZone.style.display = 'flex';
    choixZone.style.flexDirection = 'column';
    choixZone.style.flexWrap = 'nowrap';

    // La question et le bouton "Réécouter" forment UN SEUL bloc : on annule la
    // marge basse du bloc de dialogue (globale à tous les dialogues) pour cette
    // question uniquement, afin qu'ils soient collés.
    bloc.style.marginBottom = '0';

    // Bouton "Écouter" (rejouable à volonté), collé sous la question.
    const btnAudio = document.createElement('button');
    btnAudio.className = 'btn-choix';
    btnAudio.style.cssText = 'text-align:center;font-weight:700;margin-bottom:6px;';
    btnAudio.textContent = '▶  Réécouter Paul';
    btnAudio.onclick = () => playSound(audioFile);
    choixZone.appendChild(btnAudio);

    // Propositions : même disposition ET même espacement qu'un QCM classique
    // (gap 4px, comme #choix-zone), pour que les blocs restent bien dissociés.
    const optWrap = document.createElement('div');
    optWrap.style.cssText = 'display:flex;width:100%;gap:4px;flex-direction:' +
      (court ? 'row' : 'column') + ';flex-wrap:' + (court ? 'wrap' : 'nowrap') + ';';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-choix';
      if (court) btn.style.cssText = 'flex:1;min-width:44%;text-align:center;margin:2px;';
      btn.textContent = opt;
      btn.onclick = () => handleQcmAnswer(opt, bonne);
      optWrap.appendChild(btn);
    });
    choixZone.appendChild(optWrap);

    // L'audio se joue automatiquement dès que la question apparaît.
    playSound(audioFile);
    requestAnimationFrame(() => requestAnimationFrame(adjustDlgBottom));
  }

  // TINDER : une ligne par fille. texte = commentaire de Paul, meta = image de la
  // fille (dans ecrans/, ex. tindergirl1.jpg). Le téléphone s'affiche sur la scène.
  // La mission n'est validée QUE si le joueur like la DERNIÈRE fille :
  //   - like sur la dernière -> on saute le 'fin_echec' et on tombe sur 'fin_succes'
  //   - nope sur la dernière -> 'fin_echec' (retour au hall sans passeport, on peut réessayer)
  //   - sur les autres, like comme nope passent à la suivante (le like joue le MATCH)
  else if (type === 'tinder') {
    appliquerReglagesTinder();
    const zone = document.getElementById('tinder-zone');
    document.getElementById('tinder-cadre').src = BASE + 'ecrans/' + tinderCadre();
    document.getElementById('tinder-photo').src = BASE + 'ecrans/' + String(dlg.meta || '').trim();
    zone.classList.add('open');
    ajusterTinderPhone(); // caler la boîte du tel AVANT que les zones de clic servent

    const tinders = dlgList.filter(d => d.type === 'tinder');
    const estDerniere = tinders.length > 0 && tinders[tinders.length - 1] === dlg;

    const suite = (like) => {
      if (estDerniere && !like) {
        cacherTinder();
        const iEchec = dlgList.findIndex(d => d.type === 'fin_echec');
        if (iEchec >= 0) { phraseIndex = 0; dlgIndex = iEchec; renderDlg(); }
        else goHall();
        return;
      }
      phraseIndex = 0;
      dlgIndex++;
      // Dernière fille likée : on saute le fin_echec pour tomber sur le succès.
      while (dlgIndex < dlgList.length && dlgList[dlgIndex].type === 'fin_echec') dlgIndex++;
      if (dlgIndex >= dlgList.length || dlgList[dlgIndex].type !== 'tinder') cacherTinder();
      renderDlg();
    };

    // Aucun bouton dessiné : on clique directement sur le X et le cœur du PNG.
    let verrou = false; // un seul clic pris en compte par fille
    const armer = (el, estLike) => {
      if (!el) return;
      el.onclick = () => {
        // Anti-rebond GLOBAL : `verrou` est recréé à chaque rendu, il ne protège
        // donc que le clic courant — sans ce délai, un double-tap enchaînerait
        // deux filles d'un coup (et pourrait refuser la dernière par accident).
        const t = Date.now();
        if (t - tinderDernierClic < 350) return;
        tinderDernierClic = t;
        if (verrou) return;
        verrou = true;
        // Like : le MATCH s'affiche + match.mp3, PUIS on enchaîne.
        if (estLike) jouerMatch(() => suite(true)); else suite(false);
      };
    };
    armer(document.getElementById('tinder-nope'), false);
    armer(document.getElementById('tinder-like'), true);
    requestAnimationFrame(() => requestAnimationFrame(adjustDlgBottom));
  }

  else if (type === 'choix' && currentLieu && currentLieu.id === 'rolex') {
    document.getElementById('scene-bg').style.backgroundImage = `url(${BASE}ecrans/montreschoix.jpg)`;
    const montres = [
      { label:'Daytona',        type:'reponse_daytona',  icon:'icons/daytona.png',  nom:'Rolex Daytona',       left:'5%',  top:'52%', w:'30%', h:'30%' },
      { label:'Milgauss',       type:'reponse_milgauss', icon:'icons/milgauss.png', nom:'Rolex Milgauss',      left:'36%', top:'50%', w:'28%', h:'32%' },
      { label:'GMT-Master II',  type:'reponse_gmt',      icon:'icons/GMT.png',      nom:'Rolex GMT-Master II', left:'64%', top:'52%', w:'31%', h:'30%' },
    ];
    montres.forEach(m => {
      const z = document.createElement('div');
      z.className = 'montre-zone';
      z.style.cssText = `position:absolute;left:${m.left};top:${m.top};width:${m.w};height:${m.h};cursor:pointer;z-index:25;border:2px solid transparent;transition:border-color 0.15s;`;
      z.ontouchstart = () => z.style.borderColor = 'var(--rose)';
      z.ontouchend = () => z.style.borderColor = 'transparent';
      z.onmouseenter = () => z.style.borderColor = 'var(--rose)';
      z.onmouseleave = () => z.style.borderColor = 'transparent';
      z.onclick = () => {
        // Sécurité : pas d'achat sans les 50 000 € (au cas où l'accès Sheet
        // ne serait pas configuré). On affiche le refus de paiement.
        if (!inventaire.includes('50k')) {
          document.querySelectorAll('.montre-zone').forEach(el => el.remove());
          const echec = dlgList.find(d => d.type === 'fin_echec');
          // Pas de son de succès ici : il n'y a pas d'achat, donc pas de montre ramassée.
          showSucces(echec || { personnage: 'Vendeur Rolex', texte: "Il semblerait que vous ne soyez pas en capacité de procéder au paiement, Monsieur. Revenez quand vos finances seront réglées." }, { skipSon: true });
          return;
        }
        document.querySelectorAll('.montre-zone').forEach(el => el.remove());
        // Récupérer la ligne de félicitations correspondante (44/45/46)
        const rep = dlgList.find(d => d.type === m.type);
        // Mettre à jour le slot générique "montre" avec le bon modèle (nom + icon)
        const objMontre = G.objets.find(o => o.id === 'montre');
        if (objMontre) { objMontre.nom = m.nom; objMontre.icon = m.icon; }
        // Mémoriser si la Milgauss (la bonne montre) a été choisie
        milgaussAchetee = m.nom.toLowerCase().includes('milgauss');
        // Remplacer la montre si déjà en inventaire
        const idx = inventaire.indexOf('montre');
        if (idx !== -1) inventaire.splice(idx, 1);
        // Dépenser les 50 000 € à l'achat
        const idx50k = inventaire.indexOf('50k');
        if (idx50k !== -1) inventaire.splice(idx50k, 1);
        // 1) Animation popup objet → 2) au clic OK : dialogue du vendeur qui félicite
        // (son joué une seule fois, au moment de l'animation de ramassage, pas à la félicitation)
        objetPopupOnEmpty = () => {
          if (rep) showSucces(rep, { skipSon: true });
          else goHall();
        };
        ajouterObjet('montre');
        if (currentLieu) playSonLieu(currentLieu);
      };
      document.getElementById('screen-scene').appendChild(z);
    });
  }

  else if (type === 'choix') {
    choixZone.style.display = 'flex';
    choixZone.style.flexDirection = 'column';
    dlg.meta.split('|').forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-choix';
      btn.textContent = opt;
      btn.onclick = () => { dlgIndex++; renderDlg(); };
      choixZone.appendChild(btn);
    });
  }

  else if (type === 'reponse_incorrecte') {
    ctaZone.style.display = 'flex';
    btnContinuer.textContent = 'Réessayer';
    btnContinuer.onclick = () => { dlgIndex++; renderDlg(); };
  }

  else if (type === 'fin_succes' || type === 'fin_succes_2') {
    ctaZone.style.display = 'flex';
    btnContinuer.style.display = 'none';
    btnHall.style.display = 'block';
    if (dlg.meta && !inventaire.includes(dlg.meta)) {
      // Bouton rose épais "Récupérer le [objet]" (même DA que les toilettes),
      // animation sur l'écran du PNJ, puis bascule en "Retour au hall".
      const obj = G.objets.find(o => o.id === dlg.meta);
      const nomObj = obj ? obj.nom : dlg.meta;
      styleBtnRamasser(btnHall, true);
      btnHall.textContent = 'Récupérer ' + nomObjAvecArticle(nomObj);
      btnHall.onclick = () => {
        ajouterObjet(dlg.meta); // animation popup sur l'écran PNJ
        if (currentLieu) playSonLieu(currentLieu); // son joué au moment de l'animation, pas avant
        styleBtnRamasser(btnHall, false);
        btnHall.textContent = 'Retour au hall';
        btnHall.onclick = () => { stopSound(); goHall(); };
      };
    } else {
      // Pas d'objet à ramasser (ou déjà en inventaire) : aucune animation à attendre, son immédiat.
      if (currentLieu) playSonLieu(currentLieu);
      styleBtnRamasser(btnHall, false);
      btnHall.textContent = 'Retour au hall';
      btnHall.onclick = () => { if (dlg.meta) ajouterObjet(dlg.meta); goHall(); };
    }
    requestAnimationFrame(adjustDlgBottom);
  }

  else if (type === 'fin_echec') {
    ctaZone.style.display = 'flex';
    btnHall.style.display = 'block';
    styleBtnRamasser(btnHall, false); // au cas où il resterait stylé en "Récupérer"
    btnHall.textContent = 'Retour au hall';
    btnHall.onclick = goHall;
    // Échec du mini-jeu Tinder : on reste devant Paul et on propose de réessayer
    // sur place (bouton rose), sans repasser par le hall. Pour les autres lieux
    // (pacman, tractions…) il n'y a pas de ligne 'tinder' → bouton masqué, donc
    // comportement inchangé.
    const iPremiereFille = dlgList.findIndex(d => d.type === 'tinder');
    if (iPremiereFille >= 0) {
      btnContinuer.style.display = 'block';
      btnContinuer.disabled = false;
      btnContinuer.style.opacity = '1';
      btnContinuer.textContent = 'Réessayer';
      btnContinuer.onclick = () => { phraseIndex = 0; dlgIndex = iPremiereFille; renderDlg(); };
    } else {
      btnContinuer.style.display = 'none';
    }
    requestAnimationFrame(adjustDlgBottom);
  }

  else if (type === 'tunnel_pacman') {
    pacEchecs = 0; // nouvelle entrée dans la mission → série d'échecs remise à zéro
    const phrases = dlg.texte.split('|').map(p => p.trim()).filter(Boolean);
    startPacman(phrases.length > 0 ? phrases : ['...']);
  }

  else if (type === 'tunnel_tractions') {
    const phrases = dlg.texte.split('|').map(p => p.trim()).filter(Boolean);
    startTractions(phrases.length > 0 ? phrases : ['...']);
  }

  else {
    // Type inconnu (ex. popup_succes, game_over_pacman, reponse_*) — ignorer et passer au suivant
    dlgIndex++;
    renderDlg();
  }
}

// ══════════════════════════════════════════════════════════
// TINDER (téléphone de Paul)
// ══════════════════════════════════════════════════════════
// Les cartes des filles sont dessinées sur le MÊME canvas que iphone.png (carte
// déjà calée sur l'écran, transparent autour) : on les superpose donc au 1:1,
// aucun repositionnement à faire. Réglages depuis le Sheet :
//   tinder_cadre          : image du téléphone   (défaut iphone.png)
//   tinder_match          : image du MATCH       (défaut match.png)
//   tinder_match_son      : son du MATCH         (défaut son/match.mp3)
// (Pas de taille pour le MATCH : comme les deux autres PNG, son cadrage est
//  dans l'image et il occupe le même calque plein.)
//   tinder_match_duree    : durée d'affichage du MATCH en s  (défaut 1.3)
// (Pas de réglage de taille pour le téléphone : le cadrage est dans le PNG.)
let matchAudio = null;
let tinderDernierClic = 0;   // anti-rebond entre deux filles (cf. armer())
let tinderTexteTimer = null; // délai avant le commentaire de Paul
// Délai (ms) avant que le commentaire de Paul apparaisse : on laisse d'abord voir
// la fille. Réglable : config tinder_delai_commentaire (en secondes, défaut 0,8).
function tinderDelaiCommentaire() {
  const n = parseFloat(G && G.config && G.config.tinder_delai_commentaire);
  return (!isNaN(n) && n >= 0) ? n * 1000 : 800;
}
function tinderCadre() {
  const f = G && G.config && G.config.tinder_cadre;
  return (f && String(f).trim()) ? String(f).trim() : 'iphone.png';
}
function appliquerReglagesTinder() {
  const st = document.documentElement.style;
  const set = (variable, cle, defaut) => {
    const n = parseFloat(G && G.config && G.config[cle]);
    st.setProperty(variable, (isNaN(n) ? defaut : n) + '%');
  };
  // Positions du X et du cœur, MESURÉES dans iphone.png (800x1653, recalage final) :
  // X rose centre (317,1086) -> 39.6% / 65.7% ; cœur vert (497,1086) -> 62.2% / 65.7%.
  // À REMESURER si le PNG change : le % vertical bouge à chaque recadrage du tel.
  set('--tinder-nope-x', 'tinder_nope_x', 39.6);
  set('--tinder-like-x', 'tinder_like_x', 62.2);
  set('--tinder-btn-y', 'tinder_btn_y', 65.7);
  set('--tinder-hit', 'tinder_hit_taille', 11); // diamètre des zones de clic
}
// Donne à #tinder-phone la boîte EXACTE qu'occupe l'image en `contain`. Sans ça,
// les zones de clic (positionnées en % du conteneur) seraient décalées par rapport
// à l'image dès que l'écran n'a pas le ratio 9:16 (cas d'un iPhone, plus étroit).
function ajusterTinderPhone() {
  const zone = document.getElementById('tinder-zone');
  const phone = document.getElementById('tinder-phone');
  const cadre = document.getElementById('tinder-cadre');
  if (!zone || !phone || !cadre) return;
  const r = zone.getBoundingClientRect();
  if (!r.width || !r.height) return;
  // Ratio LU SUR L'IMAGE : si tu changes le canvas des PNG (ex. plus haut pour
  // voir la main jusqu'en bas), il n'y a rien à toucher ici. Repli sur 9:16 tant
  // que l'image n'est pas décodée (naturalWidth vaut 0 avant le chargement).
  const ratio = (cadre.naturalWidth && cadre.naturalHeight)
    ? cadre.naturalWidth / cadre.naturalHeight : 1080 / 1920;
  // Cadrage PLEIN (façon `cover`) : on remplit tout l'écran, quitte à déborder —
  // rogné en haut/bas si l'image est plus haute, sur les côtés si plus large.
  // Le débord est coupé par overflow:hidden sur #tinder-zone.
  let w = r.width, h = w / ratio;
  if (h < r.height) { h = r.height; w = h * ratio; }
  phone.style.width = w + 'px';
  phone.style.height = h + 'px';
}
window.addEventListener('resize', ajusterTinderPhone);
window.addEventListener('orientationchange', ajusterTinderPhone);
function cacherTinder() {
  // Couper le délai en cours : sinon un commentaire de Paul pourrait surgir
  // après coup, une fois le téléphone rangé.
  if (tinderTexteTimer) { clearTimeout(tinderTexteTimer); tinderTexteTimer = null; }
  const z = document.getElementById('tinder-zone');
  if (z) z.classList.remove('open');
  const m = document.getElementById('tinder-match');
  if (m) m.classList.remove('show');
}
// MATCH : le png apparaît au milieu + match.mp3, puis on enchaîne.
function jouerMatch(onDone) {
  const fichier = (G && G.config && G.config.tinder_match && String(G.config.tinder_match).trim())
    ? String(G.config.tinder_match).trim() : 'match.png';
  const duree = (parseFloat(G && G.config && G.config.tinder_match_duree) || 1.3) * 1000;
  const son = (G && G.config && G.config.tinder_match_son && String(G.config.tinder_match_son).trim())
    ? String(G.config.tinder_match_son).trim() : 'son/match.mp3';
  if (!matchAudio) { matchAudio = new Audio(BASE + son); matchAudio.preload = 'auto'; }
  matchAudio.muted = isMuted;
  try { matchAudio.currentTime = 0; } catch (e) {}
  matchAudio.play().catch(() => {});
  const m = document.getElementById('tinder-match');
  if (!m) { if (onDone) onDone(); return; }
  m.src = BASE + 'ecrans/' + fichier;
  void m.offsetWidth;        // reflow : rejoue l'animation à chaque match
  m.classList.add('show');
  setTimeout(() => { m.classList.remove('show'); if (onDone) onDone(); }, duree);
}

// Validation d'une réponse de QCM (texte ou audio) : partagée par les deux types.
// Bonne lettre → on saute les 'reponse_incorrecte' et on enchaîne (question
// suivante d'une série, ou dialogue final qui donne l'objet). Mauvaise → message
// 'reponse_incorrecte' 3 s puis on réaffiche la question.
function handleQcmAnswer(opt, bonne) {
  const lettre = opt.trim().charAt(0);
  if (lettre === bonne) {
    phraseIndex = 0;
    dlgIndex++;
    while (dlgIndex < dlgList.length && dlgList[dlgIndex].type === 'reponse_incorrecte') dlgIndex++;
    renderDlg();
  } else {
    const mauvaise = dlgList.find((d, i) => i > dlgIndex && d.type === 'reponse_incorrecte');
    if (mauvaise) showTempDlg(mauvaise, () => { renderDlg(); }, 3000);
  }
}

function showTempDlg(dlg, cb, duree = 3000) {
  const dlgZone = document.getElementById('dlg-zone');
  dlgZone.innerHTML = '';
  document.getElementById('choix-zone').style.display = 'none';
  const { bloc, texteClean } = createDlgBloc(dlg.personnage, dlg.texte);
  bloc.style.borderLeft = '3px solid var(--rose)';
  const txtEl = bloc.querySelector('.dlg-txt');
  if (txtEl) txtEl.textContent = ''; // tapé à la machine, comme partout ailleurs
  dlgZone.appendChild(bloc);
  if (txtEl) typewriteBloc(txtEl, texteClean, () => requestAnimationFrame(adjustDlgBottom));
  requestAnimationFrame(adjustDlgBottom);
  setTimeout(() => cb(), duree);
}

// Bascule le bouton entre le style CTA (rose épais, comme aux toilettes) et
// le style secondaire (retour au hall).
function styleBtnRamasser(btn, ramasser) {
  if (ramasser) {
    btn.classList.remove('btn-sec');
    btn.classList.add('btn-cta');
  } else {
    btn.classList.remove('btn-cta');
    btn.classList.add('btn-sec');
  }
}

// Renvoie le nom de l'objet précédé d'un article ("le putter", "la valise").
// Heuristique simple ; par défaut "le". Override possible via objet.article.
function nomObjAvecArticle(nom) {
  const n = (nom || '').toLowerCase();
  const feminins = ['valise','photo','montre','mallette','carte'];
  const art = feminins.some(f => n.includes(f)) ? 'la ' : 'le ';
  return art + nom;
}

function showSucces(dlg, opts) {
  opts = opts || {};
  const dlgZone = document.getElementById('dlg-zone');
  const choixZone = document.getElementById('choix-zone');
  dlgZone.innerHTML = '';
  choixZone.innerHTML = '';
  choixZone.style.display = 'none';
  const { bloc: sbloc } = createDlgBloc(dlg.personnage, dlg.texte);
  // texte vide → machine à écrire
  const txtEl = sbloc.querySelector('.dlg-txt');
  if (txtEl) txtEl.textContent = '';
  dlgZone.appendChild(sbloc);
  const ctaZone = document.getElementById('cta-zone');
  ctaZone.style.display = 'flex';
  document.getElementById('btn-continuer').style.display = 'none';
  const btnHall = document.getElementById('btn-hall-scene');
  btnHall.style.display = 'block';
  btnHall.disabled = false;
  btnHall.style.opacity = '1';
  if (echecCountdownTimer) { clearInterval(echecCountdownTimer); echecCountdownTimer = null; }
  // Un objet va être ramassé via une animation : on attend ce moment pour jouer le son.
  // Sinon (pas d'objet, déjà en inventaire, ou son déjà joué ailleurs comme chez Rolex) : son immédiat.
  const animationEnAttente = dlg.meta && !inventaire.includes(dlg.meta);
  if (!animationEnAttente && !opts.skipSon && currentLieu) playSonLieu(currentLieu);
  if (opts.onFin) {
    // Fin de mission : gros bouton rose (btn-cta) qui enchaîne sur l'écran de fin.
    styleBtnRamasser(btnHall, true);
    btnHall.textContent = 'Continuer';
    btnHall.onclick = () => {
      if (dlg.meta) { ajouterObjet(dlg.meta); if (!opts.skipSon && currentLieu) playSonLieu(currentLieu); }
      stopSound();
      opts.onFin();
    };
  } else if (animationEnAttente) {
    // Objet à récupérer : bouton rose épais "Récupérer le [objet]" (DA toilettes),
    // déclenche l'animation sur l'écran du PNJ, puis bascule en "Retour au hall".
    const obj = G.objets.find(o => o.id === dlg.meta);
    const nomObj = obj ? obj.nom : dlg.meta;
    styleBtnRamasser(btnHall, true);
    btnHall.textContent = 'Récupérer ' + nomObjAvecArticle(nomObj);
    btnHall.onclick = () => {
      ajouterObjet(dlg.meta); // animation popup de l'objet, sur l'écran PNJ
      if (!opts.skipSon && currentLieu) playSonLieu(currentLieu); // son joué au moment de l'animation
      styleBtnRamasser(btnHall, false);
      btnHall.textContent = 'Retour au hall';
      btnHall.onclick = () => { stopSound(); goHall(); };
    };
  } else {
    styleBtnRamasser(btnHall, false);
    btnHall.textContent = 'Retour au hall';
    btnHall.onclick = () => {
      if (dlg.meta) ajouterObjet(dlg.meta);
      stopSound();
      goHall();
    };
  }
  if (txtEl) typewriteBloc(txtEl, dlg.texte, () => requestAnimationFrame(adjustDlgBottom));
  requestAnimationFrame(adjustDlgBottom);
}

// ══════════════════════════════════════════════════════════
// DONNER UN OBJET
// ══════════════════════════════════════════════════════════
function openDonner() {
  const grid = document.getElementById('donner-grid');
  grid.innerHTML = '';
  inventaire.forEach(id => {
    const obj = G.objets.find(o => o.id === id);
    if (!obj) return;
    const item = document.createElement('div');
    item.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:8px;background:#f5f5f5;';
    item.innerHTML = `<img src="${BASE}${obj.icon}" style="width:48px;height:48px;object-fit:contain;"><span style="font-size:9px;font-weight:700;text-transform:uppercase;text-align:center;margin-top:4px;color:#111;">${obj.nom}</span>`;
    item.onclick = () => { closeDonner(); handleDonner(id); };
    grid.appendChild(item);
  });
  document.getElementById('donner-overlay').style.display = 'flex';
}
function closeDonner() { document.getElementById('donner-overlay').style.display = 'none'; }

function handleDonner(objetId) {
  const attendu = currentLieu.objet_a_donner;

  if (currentLieu.id === 'exterieur') {
    if (objetId === 'meuj') {
      inventaire.splice(inventaire.indexOf('meuj'), 1);
      // Chercher le fin_succes avec meta photolaura
      const succes = dlgList.find(d => d.type === 'fin_succes' && d.meta === 'photolaura')
                  || dlgList.find(d => d.type === 'fin_succes');
      if (succes) showSucces(succes);
    } else {
      const mauvais = dlgList.find(d => d.type === 'reponse_incorrecte')
                   || {personnage:'Antoine', texte:"Qu'est-ce que tu veux que je foute avec ça ?"};
      // Après le message, rouvrir l'inventaire pour réessayer
      showTempDlg(mauvais, () => { openInv(); }, 3000);
    }
    return;
  }

  if (currentLieu.id === 'dutyfree_charles') {
    if (objetId === 'montre') {
      // Vérifier que c'est bien la Milgauss
      const objMontre = G.objets.find(o => o.id === 'montre');
      const isMilgauss = objMontre && objMontre.nom && objMontre.nom.toLowerCase().includes('milgauss');
      if (isMilgauss) {
        inventaire.splice(inventaire.indexOf('montre'), 1);
        const succes = dlgList.find(d => d.type === 'fin_succes');
        if (succes) showSucces(succes);
      } else {
        showTempDlg({personnage:'Charles', texte:"Non non non, je veux la Milgauss ! Celle avec le cadran violet. T'as pas celle-là ?"}, () => { openInv(); }, 3500);
      }
    } else {
      const mauvais = dlgList.find(d => d.type === 'reponse_incorrecte');
      showTempDlg(mauvais || {personnage:'Charles', texte:"T'as pas un truc qui brille ?"}, () => { openInv(); }, 3000);
    }
    return;
  }

  if (objetId === attendu) {
    inventaire.splice(inventaire.indexOf(objetId), 1);
    const succes = dlgList.find(d => d.type === 'fin_succes');
    if (succes) showSucces(succes); // objet donné au clic retour via showSucces
  } else {
    const mauvais = dlgList.find(d => d.type === 'reponse_incorrecte');
    showTempDlg(mauvais || {personnage: currentLieu.pnj, texte:"C'est pas ça..."}, renderDlg);
  }
}

// ══════════════════════════════════════════════════════════
// VALISES (BAPTISTE)
// ══════════════════════════════════════════════════════════
let baptisteTunnelIdx = 0;
let baptisteTunnelPhrases = [];
let baptisteEcrit = false;          // bloque pendant qu'un message s'écrit
let baptisteValisesActives = false; // les valises ne sont cliquables qu'en mode "consigne"
let baptisteConsigneDlg = null, baptisteRelanceDlg = null, baptisteSuccesDlg = null;

// Découpe un texte du Sheet en phrases (séparateur "|"). Aucune phrase en dur.
function splitPhrasesBaptiste(texte) {
  return String(texte || '').split('|').map(s => s.trim()).filter(Boolean);
}

function showValises(lieu) {
  if (!peutAcceder(lieu)) { entrerLieuEchec(lieu); return; }
  document.getElementById('valises-bg').style.backgroundImage = `url(${BASE}${lieu.ecran})`;
  showScreen('valises');

  // Tous les textes viennent du Sheet (lieu_id 'enregistrement').
  const dlgs = G.dialogues.filter(d => d.lieu_id === 'enregistrement');
  const intro = dlgs.find(d => d.type === 'pnj');
  baptisteConsigneDlg = dlgs.find(d => d.type === 'consigne');
  baptisteRelanceDlg  = dlgs.find(d => d.type === 'relance'); // consigne courte après une mauvaise valise
  baptisteSuccesDlg   = dlgs.find(d => d.type === 'fin_succes');
  baptisteTunnelPhrases = dlgs.filter(d => d.type === 'tunnel').sort((a,b) => +a.ordre - +b.ordre);
  baptisteTunnelIdx = 0;
  baptisteValisesActives = false;

  // Zones valises (les clics ne sont pris en compte qu'en mode "consigne").
  const overlay = document.getElementById('valises-overlay');
  overlay.innerHTML = '';
  const valises = [
    { left:'5%',  top:'55%', w:'20%', h:'25%' },
    { left:'27%', top:'57%', w:'20%', h:'23%' },
    { left:'52%', top:'55%', w:'20%', h:'25%' },
    { left:'74%', top:'53%', w:'22%', h:'27%' },
  ];
  valises.forEach((v, idx) => {
    const zone = document.createElement('div');
    zone.className = 'valise-zone';
    zone.dataset.idx = idx;
    zone.dataset.essayee = 'false';
    zone.style.cssText = `position:absolute;left:${v.left};top:${v.top};width:${v.w};height:${v.h};cursor:pointer;z-index:10;-webkit-tap-highlight-color:rgba(255,110,199,0.2);`;
    zone.ontouchstart = () => { if (baptisteValisesActives && zone.dataset.essayee === 'false') zone.style.background = 'rgba(255,110,199,0.2)'; };
    zone.ontouchend = () => zone.style.background = 'transparent';
    zone.onclick = () => choisirValise(zone);
    overlay.appendChild(zone);
  });

  // Intro de Baptiste (phrase(s) + CONTINUER), puis consigne en jaune.
  if (intro) {
    montrerSequenceBaptiste(splitPhrasesBaptiste(intro.texte), false, montrerConsigne);
  } else {
    montrerConsigne();
  }
}

// Affiche une suite de phrases dans le bloc Baptiste, une par une via CONTINUER.
// onDone est appelé au clic CONTINUER de la dernière phrase.
function montrerSequenceBaptiste(phrases, consigneMode, onDone) {
  const seq = phrases.length ? phrases : ['...'];
  let idx = 0;
  const bloc = document.querySelector('#baptiste-tunnel .baptiste-bloc');
  bloc.classList.toggle('mode-consigne', !!consigneMode);
  document.getElementById('baptiste-tunnel').style.display = 'block';
  baptisteValisesActives = false; // pas de clic valise pendant un dialogue
  const txtEl = document.getElementById('baptiste-txt');
  const btn = document.getElementById('baptiste-ok-btn');
  const afficher = () => {
    btn.style.display = 'none';
    baptisteEcrit = true;
    typewriteBloc(txtEl, seq[idx], () => {
      baptisteEcrit = false;
      btn.textContent = 'Continuer';
      btn.style.display = 'block';
      btn.onclick = () => {
        if (baptisteEcrit) return;
        idx++;
        if (idx < seq.length) afficher();
        else { btn.style.display = 'none'; if (onDone) onDone(); }
      };
    });
  };
  afficher();
}

// Consigne en jaune (depuis le Sheet) + valises rendues cliquables.
// relance=true → consigne courte après une mauvaise valise (repli sur la
// consigne complète si aucune ligne 'relance' n'existe dans le Sheet).
function montrerConsigne(relance) {
  const bloc = document.querySelector('#baptiste-tunnel .baptiste-bloc');
  document.getElementById('baptiste-ok-btn').style.display = 'none';
  const dlg = (relance && baptisteRelanceDlg) ? baptisteRelanceDlg : baptisteConsigneDlg;
  if (dlg) {
    bloc.classList.add('mode-consigne');
    document.getElementById('baptiste-tunnel').style.display = 'block';
    baptisteEcrit = true;
    typewriteBloc(document.getElementById('baptiste-txt'), dlg.texte, () => {
      baptisteEcrit = false;
      baptisteValisesActives = true;
    });
  } else {
    // Pas de consigne dans le Sheet : on active simplement les valises.
    document.getElementById('baptiste-tunnel').style.display = 'none';
    baptisteValisesActives = true;
  }
}

function choisirValise(zone) {
  if (!baptisteValisesActives || baptisteEcrit) return;
  if (zone.dataset.essayee === 'true') return;

  zone.dataset.essayee = 'true';
  zone.style.cursor = 'default';
  zone.style.background = 'transparent';

  const zones = Array.from(document.querySelectorAll('#valises-overlay .valise-zone'));
  const restantes = zones.filter(z => z.dataset.essayee === 'false');

  if (restantes.length === 0) {
    // Dernière valise non essayée = la bonne → succès.
    baptisteValisesActives = false;
    zones.forEach(z => z.onclick = null);
    if (baptisteSuccesDlg && baptisteSuccesDlg.meta) ajouterObjet(baptisteSuccesDlg.meta); // animation ramassage
    if (currentLieu) playSonLieu(currentLieu); // son au moment du ramassage de la valise
    const phrases = baptisteSuccesDlg ? splitPhrasesBaptiste(baptisteSuccesDlg.texte) : ['...'];
    montrerSequenceBaptiste(phrases, false, () => { stopSound(); goHall(); });
  } else {
    // Mauvaise valise → séquence "tunnel" (1 ligne tunnel = 1 valise, phrases
    // séparées par "|"), puis retour à la consigne + valises de nouveau cliquables.
    const row = baptisteTunnelPhrases.length
      ? baptisteTunnelPhrases[baptisteTunnelIdx % baptisteTunnelPhrases.length]
      : null;
    baptisteTunnelIdx++;
    const phrases = row ? splitPhrasesBaptiste(row.texte) : ['...'];
    montrerSequenceBaptiste(phrases, false, () => montrerConsigne(true)); // relance courte
  }
}

// ══════════════════════════════════════════════════════════
// LAMBERT (briquet / boîte à lambert)
// ══════════════════════════════════════════════════════════
// Dialogues depuis le Sheet (lieu_id 'lambert') : type 'pnj' = arrivée (Victor),
// type 'interruption' = phrases de "Q" quand on atteint le seuil de clics.
// Chaque ligne 'interruption' = UNE série : la 1re fois qu'on atteint le seuil on
// joue la 1re interruption (ordre le plus petit), la 2e fois la suivante, etc.
// (escalade). Une fois toutes passées, on rejoue la dernière.
let lambertValide = false;        // validé dès le 1er clic sur le briquet (requis pour finir)
let lambertClicks = 0;            // compteur avant l'interruption de Q
let lambertSerie = 0;             // n° de la prochaine interruption (série) à jouer
let lambertClickable = false;     // le briquet ne réagit qu'entre les dialogues
let lambertEcrit = false;         // bloque pendant qu'un message s'écrit
let lambertArriveeLignes = [], lambertQLignes = [];
// Nb de clics avant que Q interrompe — réglable depuis le Sheet
// (config.lambert_seuil), défaut 15.
function lambertSeuil() {
  const n = parseInt(G && G.config && G.config.lambert_seuil);
  return (n > 0) ? n : 15;
}

// Élément Audio réutilisable pour le briquet : préchargé une fois puis rejoué à
// chaque clic (currentTime=0 + play). Bien plus fiable sur iOS que de recréer un
// new Audio() à chaque clic rapide.
let lambertAudio = null;
function jouerSonLambert() {
  if (!lambertAudio) {
    lambertAudio = new Audio(BASE + 'son/lambert.mp3');
    lambertAudio.preload = 'auto';
  }
  lambertAudio.muted = isMuted;
  try { lambertAudio.currentTime = 0; } catch (e) {}
  lambertAudio.play().catch(() => {});
}

function showLambert(lieu) {
  document.getElementById('lambert-bg').style.backgroundImage = `url(${BASE}${lieu.ecran})`;
  showScreen('lambert');
  // Précharger le son du briquet dès l'entrée dans le lieu.
  if (!lambertAudio) { lambertAudio = new Audio(BASE + 'son/lambert.mp3'); lambertAudio.preload = 'auto'; }
  lambertAudio.load();

  const dlgs = G.dialogues.filter(d => d.lieu_id === 'lambert');
  lambertArriveeLignes = dlgs.filter(d => d.type === 'pnj').sort((a,b) => +a.ordre - +b.ordre);
  lambertQLignes = dlgs.filter(d => d.type === 'interruption').sort((a,b) => +a.ordre - +b.ordre);
  lambertClicks = 0;
  lambertSerie = 0;
  lambertClickable = false;

  // Zone cliquable sur le briquet
  const overlay = document.getElementById('lambert-overlay');
  overlay.innerHTML = '';
  const zone = document.createElement('div');
  zone.id = 'lambert-zone';
  zone.onclick = cliquerBriquet;
  overlay.appendChild(zone);

  // Dialogue d'arrivée de Victor, puis le briquet devient cliquable.
  if (lambertArriveeLignes.length) {
    montrerSequenceLambert(lambertArriveeLignes, () => { masquerLambertDlg(); lambertClickable = true; });
  } else {
    masquerLambertDlg();
    lambertClickable = true;
  }
}

// Affiche une suite de répliques (avec le nom de chaque ligne) une par une via CONTINUER.
function montrerSequenceLambert(rows, onDone) {
  let idx = 0;
  const nomEl = document.getElementById('lambert-nom');
  const txtEl = document.getElementById('lambert-txt');
  const btn = document.getElementById('lambert-btn');
  document.getElementById('lambert-dlg').style.display = 'block';
  lambertClickable = false; // pas de clic briquet pendant un dialogue
  const afficher = () => {
    const row = rows[idx];
    nomEl.textContent = row.personnage || '';
    btn.style.display = 'none';
    lambertEcrit = true;
    typewriteBloc(txtEl, row.texte, () => {
      lambertEcrit = false;
      btn.textContent = 'Continuer';
      btn.style.display = 'block';
      btn.onclick = () => {
        if (lambertEcrit) return;
        idx++;
        if (idx < rows.length) afficher();
        else { btn.style.display = 'none'; if (onDone) onDone(); }
      };
    });
  };
  afficher();
}

function masquerLambertDlg() {
  document.getElementById('lambert-dlg').style.display = 'none';
}

function cliquerBriquet() {
  if (!lambertClickable || lambertEcrit) return;
  // Son du briquet à chaque clic (élément réutilisable, fiable sur iOS).
  jouerSonLambert();
  lambertValide = true; // le pin est validé dès le 1er clic
  lambertClicks++;
  if (lambertClicks >= lambertSeuil()) {
    lambertClicks = 0;
    lambertClickable = false;
    // Interruption de Q : une DIFFÉRENTE à chaque série (escalade). On avance
    // d'une interruption, puis on reste sur la dernière une fois toutes passées.
    if (lambertQLignes.length) {
      const idx = Math.min(lambertSerie, lambertQLignes.length - 1);
      lambertSerie++;
      montrerSequenceLambert([lambertQLignes[idx]], () => { masquerLambertDlg(); lambertClickable = true; });
    } else {
      lambertClickable = true;
    }
  }
}

// ══════════════════════════════════════════════════════════
// MAGAZINE (Hobbies Magazine feuilletable)
// ══════════════════════════════════════════════════════════
// Couverture (lieu.ecran) + réplique Victor (Sheet type 'pnj') + bouton
// "Feuilleter", puis pages magazine1..N.jpg. Nb de pages réglable via
// config.magazine_pages (défaut 8).
let magazineCoverEcran = '';
let magazineNbPages = 8;
let magazineLu = false;   // vrai quand on a atteint la dernière page (requis pour finir)
let magazineLayers = [];        // 2 calques <img> (double-buffer, anti-flash)
let magazineFront = 0;          // index du calque actuellement visible
let magazinePageLignes = {};    // { numéro de page → réplique } (Sheet type 'page')
let magazinePageDlgTimer = null; // délai avant l'affichage du commentaire de page

function masquerDlgPageMagazine() {
  if (magazinePageDlgTimer) { clearTimeout(magazinePageDlgTimer); magazinePageDlgTimer = null; }
  const el = document.getElementById('magazine-page-dlg');
  if (el) el.style.display = 'none';
}
// Bruit de page tournée (élément réutilisable préchargé, fiable iOS).
let pageAudio = null;
function jouerSonPage() {
  if (!pageAudio) { pageAudio = new Audio(BASE + 'son/page.mp3'); pageAudio.preload = 'auto'; }
  pageAudio.muted = isMuted;
  try { pageAudio.currentTime = 0; } catch (e) {}
  pageAudio.play().catch(() => {});
}

function showMagazine(lieu) {
  showScreen('magazine');
  magazineCoverEcran = lieu.ecran;
  magazineNbPages = (parseInt(G.config && G.config.magazine_pages) > 0)
    ? parseInt(G.config.magazine_pages) : 8;

  // Réplique de Victor depuis le Sheet.
  const intro = G.dialogues.find(d => d.lieu_id === 'magazine' && d.type === 'pnj');
  document.getElementById('magazine-nom').textContent = intro ? (intro.personnage || 'Victor') : 'Victor';
  document.getElementById('magazine-feuilleter').onclick = () => { jouerSonPage(); allerPageMagazine(1); };

  // Commentaires par page (Sheet type 'page', ordre = numéro de page). Optionnels.
  magazinePageLignes = {};
  G.dialogues.filter(d => d.lieu_id === 'magazine' && d.type === 'page').forEach(d => {
    const p = parseInt(d.ordre);
    if (p > 0 && d.texte && String(d.texte).trim()) magazinePageLignes[p] = d;
  });

  // Double-buffer : 2 calques <img>. On charge la nouvelle image (déjà préchargée
  // → en cache) sur le calque caché puis on bascule l'opacité → aucun flash noir,
  // et seulement 2 images décodées à la fois (léger pour la mémoire mobile).
  const bg = document.getElementById('magazine-bg');
  bg.innerHTML = '';
  magazineLayers = [document.createElement('img'), document.createElement('img')];
  magazineLayers.forEach(im => { im.className = 'magazine-img'; bg.appendChild(im); });
  magazineFront = 0;

  afficherCouvertureMagazine(intro ? intro.texte : '');
}

// Affiche l'image `src` sans flash : on la met sur le calque caché, on attend
// qu'elle soit prête (instantané car en cache), puis on croise l'opacité.
function montrerImageMagazine(src) {
  const front = magazineLayers[magazineFront];
  const back = magazineLayers[1 - magazineFront];
  if (front.src === src) return; // déjà à l'écran
  const swap = () => {
    back.onload = null; back.onerror = null;
    front.classList.remove('active');
    back.classList.add('active');
    magazineFront = 1 - magazineFront;
  };
  back.onload = swap;
  back.onerror = swap;
  back.src = src;
  if (back.complete && back.src === src) swap(); // déjà en cache → immédiat
}

function afficherCouvertureMagazine(texte) {
  masquerDlgPageMagazine();
  montrerImageMagazine(BASE + magazineCoverEcran);
  document.getElementById('magazine-nav').style.display = 'none';
  document.getElementById('magazine-dlg').style.display = 'block';
  if (texte != null) typewriteBloc(document.getElementById('magazine-txt'), texte, () => {});
}

function allerPageMagazine(p) {
  masquerDlgPageMagazine(); // cacher le commentaire de la page précédente + annuler son timer
  if (p <= 0) { afficherCouvertureMagazine(null); return; } // retour à la couverture
  document.getElementById('magazine-dlg').style.display = 'none';
  document.getElementById('magazine-nav').style.display = 'flex';
  montrerImageMagazine(BASE + 'ecrans/magazine' + p + '.jpg');
  // Commentaire de Victor pour cette page, 1 s après le changement (si défini).
  const ligne = magazinePageLignes[p];
  if (ligne) {
    magazinePageDlgTimer = setTimeout(() => {
      document.getElementById('magazine-page-nom').textContent = ligne.personnage || 'Victor';
      typewriteBloc(document.getElementById('magazine-page-txt'), ligne.texte, () => {});
      document.getElementById('magazine-page-dlg').style.display = 'block';
    }, 1000);
  }
  const prev = document.getElementById('magazine-prev');
  const next = document.getElementById('magazine-next');
  prev.textContent = '← Précédente';
  prev.onclick = () => { jouerSonPage(); allerPageMagazine(p - 1); }; // page 1 → retour couverture, avec bruit de page
  if (p >= magazineNbPages) {
    magazineLu = true; // magazine parcouru en entier → pin validable / requis pour finir
    next.textContent = 'Retour au hall';
    next.onclick = goHall;
  } else {
    next.textContent = 'Suivante →';
    next.onclick = () => { jouerSonPage(); allerPageMagazine(p + 1); }; // bruit de page tournée
  }
}
