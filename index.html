<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EVG Victor</title>
<!-- Ajout à l'écran d'accueil iOS : icône + titre + affichage plein écran "app" -->
<meta name="apple-mobile-web-app-title" content="EVG Victor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/pierrerugier/evg-victor/main/icons/app-icon.png">
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pierrerugier/evg-victor/main/icons/app-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Josefin Sans', sans-serif;
  --rose: #FF6EC7;
  --noir: #000000;
  --blanc: #ffffff;
  --dlg-bg: rgba(0,0,0,0.72);
  --dlg-color: #ffffff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: var(--font);
  background: #111;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
html, body {
  width: 100%; height: 100%;
  /* hauteur dynamique : s'ajuste aux barres du navigateur mobile (Chrome/Safari) */
  height: 100dvh;
  overflow: hidden;
  font-family: var(--font);
  background: #111;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
#app {
  position: relative;
  width: 100%;
  height: 100%;
  height: 100dvh;
  /* ne jamais dépasser la hauteur visible réelle */
  max-height: 100dvh;
  overflow: hidden;
}
/* Sur écran assez large (paysage ou desktop), on borne la largeur pour garder
   un format vertical, en se basant sur la hauteur dynamique. */
@media (min-aspect-ratio: 9/16) {
  #app {
    width: calc(100dvh * 9 / 16);
    height: 100dvh;
    max-height: 100dvh;
  }
}

/* SCREENS */
.screen {
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  width: 100%; height: 100%;
}
.screen.active { display: flex; }

/* BG */
.bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center top;
  z-index: 0;
}

/* BOUTON RETOUR */
#btn-retour-hall, #btn-retour-titre {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 50;
  background: rgba(0,0,0,0.75);
  color: #fff;
  border: none;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px 14px;
  cursor: pointer;
}

/* INVENTAIRE ICON */
.inv-btn {
  position: absolute;
  top: calc(10px + env(safe-area-inset-top, 0px)); right: 10px;
  width: 64px; height: 64px;
  z-index: 50;
  background: none; border: none;
  cursor: pointer; padding: 0;
}
.inv-btn img { width: 100%; height: 100%; object-fit: contain; }

/* BOUTON MUTE - à gauche du bouton inventaire, plus petit, blanc transparent */
.mute-btn {
  position: absolute;
  top: calc(80px + env(safe-area-inset-top, 0px)); right: 22px;
  width: 40px; height: 40px;
  z-index: 50;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.mute-btn svg { width: 20px; height: 20px; display: block; }
.mute-btn svg path, .mute-btn svg line { stroke: #fff; }

/* SCENE */
#screen-scene { position: relative; }

/* DIALOGUE - toujours collé en bas */
#dlg-zone {
  position: absolute;
  bottom: 58px; left: 0; right: 0;
  z-index: 30;
  padding: 10px 14px 0px;
  display: flex; flex-direction: column; gap: 0;
}
.dlg-bloc {
  background: var(--dlg-bg);
  padding: 10px 12px;
  margin-bottom: 4px;
}
.dlg-bloc.narration {
  background: var(--dlg-bg); /* même fond noir que les autres */
}
.dlg-nom {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--rose); margin-bottom: 4px;
}
.dlg-txt {
  font-size: 14px; line-height: 1.5;
  color: var(--dlg-color);
}
.dlg-bloc.narration .dlg-txt {
  color: var(--narration-color, #FFDE00);
}
/* plus de curseur clignotant */

/* CHOIX */
#choix-zone {
  position: absolute;
  bottom: 58px; left: 0; right: 0;
  z-index: 30;
  padding: 0 14px 4px;
  display: none; flex-direction: column; gap: 4px;
}
.btn-choix {
  background: rgba(0,0,0,0.72);
  border: none; border-left: 4px solid transparent;
  padding: 11px 13px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: #fff; text-align: left; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-choix:active { border-left-color: var(--rose); }

/* CTA */
#cta-zone {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  padding: 4px 14px calc(14px + env(safe-area-inset-bottom, 0px));
  display: none; flex-direction: column; gap: 6px;
}

/* scene-bottom unused but kept for compat */
#scene-bottom { display: contents; }
.btn-cta {
  background: var(--rose);
  border: none; padding: 15px;
  font-family: var(--font); font-size: 15px; font-weight: 700;
  color: var(--noir); text-transform: uppercase;
  letter-spacing: 0.08em; cursor: pointer;
  width: 100%; min-height: 52px;
  -webkit-tap-highlight-color: transparent;
}
.btn-sec {
  background: rgba(0,0,0,0.7);
  border: none; padding: 12px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: #fff; cursor: pointer; width: 100%;
  -webkit-tap-highlight-color: transparent;
}

/* ── ÉCRAN CHARGEMENT ── */
#screen-loading { background: #000; }
#loading-cover {
  position: absolute; inset: 0;
  background-size: cover; background-position: center top;
}
#loading-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 10; pointer-events: none;
}
#loading-intro {
  position: absolute;
  bottom: 14%; left: 0; right: 0;
  z-index: 5; padding: 0 20px;
  text-align: center; color: #fff;
  font-size: 12px; line-height: 1.5;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}
#loading-phrases {
  position: absolute;
  bottom: 13%; left: 0; right: 0;
  z-index: 20; padding: 0 24px;
  text-align: center; color: #fff;
  font-size: 11px; letter-spacing: 0.3px;
  opacity: 0.85;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  pointer-events: none;
  min-height: 14px;
}
#btn-jouer {
  display: none;
  position: absolute;
  bottom: 5%; left: 5%; width: 90%;
  z-index: 20;
}

/* ── CHEAT BAR (appui long sur l'icône inventaire) ── */
.inv-btn {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
#cheat-bar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 200; display: none;
  padding: 10px 14px 12px;
  background: rgba(0,0,0,0.88);
  box-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
#cheat-bar.open { display: block; }
#cheat-row { display: flex; gap: 8px; align-items: stretch; }
#cheat-input {
  flex: 1; box-sizing: border-box;
  padding: 11px 12px; border-radius: 8px;
  border: 1px solid var(--rose);
  background: #111; color: #fff;
  font-size: 16px; text-align: center; letter-spacing: 1px;
  outline: none;
}
#cheat-close {
  flex: 0 0 auto; width: 44px;
  border-radius: 8px; border: 1px solid var(--rose);
  background: #111; color: #fff;
  font-size: 18px; line-height: 1; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#cheat-close:active { background: #222; }
#cheat-msg {
  color: var(--rose); text-align: center;
  font-size: 12px; margin-top: 6px; min-height: 14px;
}

/* ── POP-UP PUB PARODIE ── */
#pub-overlay {
  position: absolute; inset: 0; z-index: 300;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
}
#pub-overlay.open { display: flex; }
#pub-box {
  position: relative; width: 92%; line-height: 0;
  top: -10%; /* remontée de 10% de la hauteur d'écran */
  border: 4px solid var(--rose); border-radius: 6px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
}
#pub-img { width: 100%; height: auto; display: block; border-radius: 3px; }
#pub-close {
  position: absolute; top: 8px; right: 8px;
  min-width: 30px; height: 30px; padding: 0 6px;
  border-radius: 50%;
  background: var(--rose); color: #000;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-weight: 800; font-size: 15px; line-height: 1;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
#pub-close.actif { cursor: pointer; }

/* ── HALL ── */
#screen-hall { position: relative; }
#hall-pins { position: absolute; inset: 0; z-index: 10; }
.hall-pin {
  position: absolute;
  transform: translate(-50%, -100%);
  background: none; border: none; padding: 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.hall-pin.locked svg path { fill: #777; }
.hall-pin.locked svg circle { fill: #555; }
/* Pins masqués pendant la 1re phrase du tuto, puis "atterrissage" à la 2e. */
.hall-pin.pin-hidden { opacity: 0; }
.hall-pin.pin-land {
  animation: pinLand 360ms cubic-bezier(0.34, 1.4, 0.64, 1) both;
}
@keyframes pinLand {
  0%   { opacity: 0; transform: translate(-50%, -200%) scale(0.8); }
  100% { opacity: 1; transform: translate(-50%, -100%) scale(1); }
}

/* ── INVENTAIRE OVERLAY ── */
#inv-overlay {
  position: absolute; inset: 0; z-index: 60;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5);
}
#inv-overlay.open { display: flex; }
#inv-inner { position: relative; width: 100%; height: 100%; }
#inv-bg { width: 100%; height: 100%; object-fit: cover; object-position: center; }
#inv-grid {
  position: absolute;
  top: 20%; left: 16%; width: 68%; height: 63%;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.inv-slot {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.inv-slot img {
  width: 62px; height: 62px; object-fit: contain;
  opacity: 0.15; filter: grayscale(1);
}
.inv-slot.ok img { opacity: 1; filter: none; }
.inv-slot span {
  font-size: 8px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  text-align: center; margin-top: 3px; line-height: 1.2;
}
#inv-close-btn {
  position: absolute; bottom: 5%; left: 10%; width: 80%; z-index: 2;
}

/* ── OBJET GAGNÉ ── */
#objet-popup {
  position: absolute; inset: 0; z-index: 200;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.82);
  pointer-events: all;
}
#objet-popup.open { display: flex; }
#objet-popup img {
  width: 220px; height: 220px; object-fit: contain;
  animation: popIn 0.4s ease forwards;
}
@keyframes popIn {
  0%{ transform: scale(0.4); opacity: 0; }
  70%{ transform: scale(1.1); }
  100%{ transform: scale(1); opacity: 1; }
}
#objet-popup-label {
  margin-top: 20px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase; color: #fff;
}
#objet-popup-nom {
  font-size: 22px; font-weight: 700; color: var(--rose); margin-top: 6px;
}
#objet-popup-ok {
  margin-top: 28px; width: 70%;
}

/* ── POPUP NARRATION CENTRAL (mini-jeux réussis) ── */
#popup-narration {
  position: absolute; inset: 0; z-index: 210;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  padding: 28px;
}
#popup-narration.open { display: flex; }
#popup-narration-bloc {
  background: var(--dlg-bg);
  padding: 10px 12px;
  max-width: 90%; width: 100%;
  animation: popIn 0.4s ease forwards;
}
#popup-narration-txt {
  font-size: 14px; line-height: 1.5;
  color: var(--narration-color, #FFDE00);
  min-height: 21px;
}
#popup-narration-ok {
  margin-top: 16px; width: 90%; max-width: 90%;
}

/* ── TUTO ── */
#tuto-zone {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 40; padding: 14px 14px 14px;
}
#tuto-bloc {
  background: var(--dlg-bg); padding: 14px 14px 12px; margin-bottom: 10px;
}
#tuto-txt { font-size: 14px; line-height: 1.5; color: var(--narration-color, #FFDE00); }
/* bouton tuto = rose comme les autres boutons d'action (hérite de .btn-cta) */

/* ── PACMAN ── */
#screen-pacman { background: #1a1a2e; }
/* Zone de jeu : prend l'espace dispo et centre le canvas verticalement */
#pac-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 0;
  overflow: hidden;
}
#pac-canvas { display: block; }
/* Barre de phrases de Pierre : collée juste sous le bloc jeu (canvas) */
#pac-phrase-bar {
  flex-shrink: 0;
  z-index: 15;
  background: rgba(0,0,0,0.92);
  padding: 12px 16px;
}
#pac-phrase-nom {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--rose); margin-bottom: 6px;
}
#pac-phrase-txt { font-size: 14px; line-height: 1.5; color: #fff; min-height: 44px; }
/* Bulle flottante hall (animation Victor) - même DA partout */
#hall-bubble {
  position: absolute;
  bottom: 24px; left: 14px; right: 14px;
  z-index: 20;
  background: var(--dlg-bg);
  padding: 10px 12px;
  display: none;
  pointer-events: none;
}
#hall-bubble-nom { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rose); margin-bottom: 4px; }
#hall-bubble-txt { font-size: 14px; line-height: 1.5; color: #fff; }
#pac-controls {
  display: grid; grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  width: 100%; height: 120px; background: #111; flex-shrink: 0; gap: 4px; padding: 4px;
}
.pac-btn {
  background: #2a2a2a; border: none; font-size: 24px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; color: #fff;
}
.pac-btn:active { background: #444; }
#pac-gameover {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.88); z-index: 20;
  flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; padding: 28px;
}
#pac-gameover.open { display: flex; }

.hall-pin.visited svg path { fill: #fff; }
.hall-pin.visited svg circle { fill: #ccc; }

/* ── TRACTIONS - phrases en bas au dessus du bouton ── */
#screen-tractions { background: #000; flex-direction: column; }
#trac-area { flex: 1; width: 100%; position: relative; overflow: hidden; }
#trac-bg { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; object-fit: contain; }
#trac-body { position: absolute; left: 50%; transform: translateX(-50%); width: 70%; object-fit: contain; transition: bottom 0.12s; }
#trac-bar-wrap { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 10px; height: 150px; background: #333; }
#trac-bar-fill { position: absolute; bottom: 0; left: 0; right: 0; background: var(--rose); height: 0%; transition: height 0.1s; }
#trac-phrase-bar {
  position: absolute;
  bottom: calc(80px + 16px); left: 14px; right: 14px;
  z-index: 5;
  background: var(--dlg-bg);
  padding: 10px 12px;
}
#trac-phrase-nom {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--rose); margin-bottom: 4px;
}
#trac-phrase-txt { font-size: 14px; line-height: 1.5; color: #fff; min-height: 38px; }
#trac-tap { flex-shrink: 0; height: 80px; font-size: 20px; }

/* ── VALISES (BAPTISTE) ── */
#screen-valises { position: relative; }
#valises-overlay { position: absolute; inset: 0; z-index: 10; }
#baptiste-tunnel {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  padding: 10px 14px 6px; display: none;
}
.baptiste-bloc {
  background: rgba(0,0,0,0.8); padding: 10px 12px; margin-bottom: 6px;
}
/* Mode "consigne" : instructions en jaune, sans le nom du personnage. */
.baptiste-bloc.mode-consigne .dlg-nom { display: none; }
.baptiste-bloc.mode-consigne #baptiste-txt { color: var(--narration-color, #FFDE00); }

/* ── CABINES (OSCAR) ── */
#screen-cabines { position: relative; }
#cabines-overlay { position: absolute; inset: 0; z-index: 10; }
#cabine-dlg {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  padding: 10px 14px 14px; display: none;
}

/* FIN */
#screen-fin { background: #000; }
#fin-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  z-index: 1;
}
#fin-textes {
  position: absolute; bottom: 23%; left: 0; right: 0;
  z-index: 5; text-align: center; padding: 0 20px;
  pointer-events: none;
}
#fin-ligne1, #fin-ligne2 {
  color: #fff; text-transform: uppercase;
  text-shadow: 0 2px 12px rgba(0,0,0,0.75);
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#fin-ligne1.show, #fin-ligne2.show { opacity: 1; transform: translateY(0); }
#fin-ligne1 { font-size: 30px; font-weight: 800; letter-spacing: 0.03em; }
#fin-ligne2 { font-size: 17px; font-weight: 600; letter-spacing: 0.08em; margin-top: 8px; }
#fin-rejouer {
  display: none;
  position: absolute; bottom: 5%; left: 5%; width: 90%; z-index: 10;
}
#fin-rejouer.show { display: block; }
#fin-fondu {
  position: absolute; inset: 0; background: #fff;
  z-index: 60; opacity: 1; pointer-events: none;
  transition: opacity 2s ease;
}
#fin-fondu.clear { opacity: 0; }
</style>
</head>
<body>
<div id="app">

<!-- BOUTON MUTE GLOBAL (visible partout) -->
<button class="mute-btn" id="mute-btn" onclick="toggleMute()" aria-label="Couper le son">
  <svg id="mute-icon-on" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 9v6h4l5 4V5L7 9H3z" fill="#fff" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M16 8.5a4 4 0 0 1 0 7" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M18.5 6a7 7 0 0 1 0 12" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </svg>
  <svg id="mute-icon-off" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
    <path d="M3 9v6h4l5 4V5L7 9H3z" fill="#fff" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="16" y1="9" x2="21" y2="15" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="9" x2="16" y2="15" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</button>

<!-- BOUTON INVENTAIRE GLOBAL (visible sur les écrans de jeu) -->
<button class="inv-btn" id="inv-btn-global" onclick="onInvBtnTap()" style="display:none;"><img id="inv-icon" src="" alt=""></button>

<!-- CHEAT : 5 taps rapides sur l'icône inventaire → ce champ apparaît -->
<div id="cheat-bar">
  <div id="cheat-row">
    <button id="cheat-close" onclick="fermerCheat()" aria-label="Fermer">✕</button>
    <input id="cheat-input" type="text" placeholder="code…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
  </div>
  <div id="cheat-msg"></div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div id="loading-cover"></div>
  <canvas id="loading-canvas"></canvas>
  <div id="loading-intro"></div>
  <div id="loading-phrases"></div>
  <button class="btn-cta" id="btn-jouer">Jouer</button>
</div>

<!-- HALL -->
<div id="screen-hall" class="screen">
  <div class="bg" id="hall-bg"></div>
  <button id="btn-retour-titre" onclick="goLoading()">← Titre</button>
  <div id="hall-pins"></div>
  <div id="hall-bubble">
    <div id="hall-bubble-nom">Victor</div>
    <div id="hall-bubble-txt"></div>
  </div>
  <!-- TUTO -->
  <div id="tuto-zone" style="display:none;">
    <div id="tuto-bloc">

<script>
// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzze8-guvyUP7j04Mg_RW1vXiKOIZ_KpLaWKlARLEi3usTmdHenEuuZCgYQJTKTQtXt2A/exec';

let BASE = '';
let G = null; // { config, objets, lieux, dialogues }

// Liste des slots affichés dans l'inventaire (inclut la montre, qu'on récupère
// chez Rolex puis qu'on donne à Charles).
const OBJETS_FINAUX = ['tshirt','valise','meuj','passeport','montre','billet','putter','photolaura'];

// Objets réellement requis pour passer le contrôle de sécurité à la fin.
// La montre n'en fait PAS partie : elle a été donnée à Charles au duty-free.
// Les 50k non plus : ils ont été dépensés chez Rolex.
const OBJETS_REQUIS_SECURITE = ['tshirt','valise','meuj','passeport','billet','putter','photolaura'];

// État jeu
let inventaire = [];
let lieuxVisites = new Set(); // lieux déjà visités
let currentLieu = null;
let dlgIndex = 0;
let phraseIndex = 0;
let dlgList = [];
let oscarVisites = 0;
let milgaussAchetee = false; // vrai dès que la Milgauss est choisie chez Rolex
let jeuTermine = false; // vrai uniquement à la vraie fin (toutes les missions OK)

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  const res = await fetch(SHEET_URL + '?v=' + Date.now());
  G = await res.json();
  BASE = G.config.github_base_url || 'https://raw.githubusercontent.com/pierrerugier/evg-victor/main/';

  // Slot inventaire générique "montre" : on l'injecte s'il n'existe pas
  // dans le Sheet, pour que la montre choisie chez Rolex s'affiche.
  if (!G.objets.find(o => o.id === 'montre')) {
    G.objets.push({ id:'montre', nom:'Rolex', icon:'icons/milgauss.png' });
  }

  if (G.config.couleur_narration) {
    // couleur_narration = couleur du texte de narration (pas le fond)
    document.documentElement.style.setProperty('--narration-color', G.config.couleur_narration);
  }

  // Charger le tuto depuis le Sheet
  TUTO = (G.tuto || []).sort((a,b) => +a.ordre - +b.ordre).map(t => t.texte).filter(Boolean);
  if (TUTO.length === 0) TUTO = ["Bienvenue dans le jeu !", "Explore l'aéroport.", "Bonne chance !"];

  // Appliquer couleurs config
  if (G.config.couleur_rose) document.documentElement.style.setProperty('--rose', G.config.couleur_rose);
  // Transparence blocs dialogue (depuis sheet)
  const alpha = G.config.dlg_alpha || '0.72';
  document.documentElement.style.setProperty('--dlg-bg', `rgba(0,0,0,${alpha})`);
  if (G.config.font_family) {
    document.documentElement.style.setProperty('--font', `'${G.config.font_family}', sans-serif`);
  }

  // Titre + icône de l'ajout à l'écran d'accueil (iOS), éditables depuis le Sheet :
  // config.app_titre = titre affiché sous l'icône ; config.app_icone = chemin de
  // l'image (relatif au dépôt, ex. "icons/app-icon.png", ou URL complète).
  // iOS lit ces valeurs au moment de "Ajouter à l'écran d'accueil", donc les
  // mettre à jour après le chargement de la config suffit.
  if (G.config.app_titre) {
    document.title = G.config.app_titre;
    const metaTitre = document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if (metaTitre) metaTitre.setAttribute('content', G.config.app_titre);
  }
  if (G.config.app_icone) {
    const ic = String(G.config.app_icone).trim();
    const url = /^https?:\/\//.test(ic) ? ic : (BASE + ic);
    document.querySelectorAll('link[rel="apple-touch-icon"], link[rel="icon"]')
      .forEach(l => l.setAttribute('href', url));
  }

  // Loading simplifié : juste le fond Victor + préchargement en silence
  document.getElementById('loading-cover').style.backgroundImage = `url(${BASE}ecrans/Victors-laoding.jpg)`;

  // Précharger tout en silence
  await preload(collectImages());

  // Afficher le bouton Jouer (le jingle launch se joue au clic, pas au chargement)
  document.getElementById('btn-jouer').style.display = 'block';
  // Lancer les fausses phrases de chargement (l'écran titre est déjà actif au démarrage,
  // il ne passe donc pas par showScreen au premier affichage).
  startLoadingPhrases();
  document.getElementById('btn-jouer').onclick = () => {
    const btn = document.getElementById('btn-jouer');
    if (btn.disabled) return;
    btn.disabled = true;
    btn.style.opacity = '0.5';
    // Jouer le jingle sur l'écran titre, attendre qu'il se termine, puis lancer le jeu.
    const jingle = playLaunch();
    const lancerJeu = () => {
      stopLaunch();
      startBgMusic();
      goHall();
      showTuto();
      btn.disabled = false;
      btn.style.opacity = '1';
    };
    if (jingle) {
      // Filet de sécurité : si l'audio est bloqué/échoue, on ne reste pas bloqué sur le titre.
      const delaiSecours = (parseFloat(G.config && G.config.launch_delai) || 8) * 1000;
      const secours = setTimeout(lancerJeu, delaiSecours);
      jingle.addEventListener('ended', () => { clearTimeout(secours); lancerJeu(); }, { once: true });
    } else {
      lancerJeu();
    }
  };

  // Setup inventaire icons
  document.getElementById('inv-icon').src = BASE + 'icons/inventaire-icon.png';
  document.getElementById('inv-bg').src = BASE + 'icons/inventaire.png';

  // Cheat codes (appui long sur l'icône inventaire)
  setupCheat();

  // Filet de sécurité : si le navigateur a bloqué l'autoplay de la musique de
  // fond, la relancer au premier clic/tap utilisateur (hors écran titre).
  // Mais JAMAIS quand le jeu est terminé / sur l'écran de fin : sinon le clic
  // qui déclenche la fin relancerait la musique du hall par-dessus finjeu.mp3.
  const retryAudio = () => {
    const surTitre = document.querySelector('#screen-loading.active');
    const surFin = document.querySelector('#screen-fin.active');
    if (!surTitre && !surFin && !jeuTermine && !bgMusicStarted && !bgMusic) startBgMusic();
  };
  document.addEventListener('click', retryAudio);
  document.addEventListener('touchstart', retryAudio);
  // Toute interaction sur le hall réarme le décompte d'inactivité de la pub.
  document.addEventListener('click', resetPubTimer);
  document.addEventListener('touchstart', resetPubTimer);
}

function collectImages() {
  const urls = [];
  (G.lieux || []).forEach(l => l.ecran && urls.push(BASE + l.ecran));
  (G.objets || []).forEach(o => o.icon && urls.push(BASE + o.icon));
  ['icons/inventaire.png','icons/inventaire-icon.png',
   'ecrans/Victors-laoding.jpg','ecrans/pullupbase.jpg','ecrans/victor-bodypullup.png',
   'ecrans/montreschoix.jpg','ecrans/Oscar.jpg','ecrans/toilette-50K.jpg','ecrans/toilette-shortbernardini.jpg'].forEach(p => urls.push(BASE + p));
  return urls;
}

function preload(urls) {
  return Promise.all(urls.map(url => new Promise(r => {
    const img = new Image(); img.onload = r; img.onerror = r; img.src = url;
  })));
}

// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  // Bouton inventaire global : visible sur les écrans de jeu, masqué ailleurs
  // (titre, mini-jeux, écran de fin).
  const invBtn = document.getElementById('inv-btn-global');
  if (invBtn) {
    const avecInv = ['hall', 'scene', 'valises', 'cabines'];
    invBtn.style.display = avecInv.includes(id) ? 'block' : 'none';
  }
  // Fausses phrases de chargement : ne défilent que sur l'écran titre.
  if (id === 'loading') startLoadingPhrases(); else stopLoadingPhrases();
  // Pop-up pub parodie : minuteur d'inactivité armé uniquement sur le hall.
  if (id === 'hall') { if (tutoDone && !pubVue) armPubTimer(); }
  else clearPubIdleTimer();
}

// ── POP-UP PUB PARODIE (hall) ──
// Après 20 s sans interaction sur le hall, une fausse pub plein écran apparaît,
// une seule fois par partie. Countdown 5→0 puis croix pour fermer.
let pubVue = false;              // n'apparaît qu'une fois par partie
let pubIdleTimer = null;         // minuteur d'inactivité (20 s)
let pubCountdownTimer = null;    // décompte 5→0
const PUB_IDLE_MS = 10000;

function clearPubIdleTimer() { if (pubIdleTimer) { clearTimeout(pubIdleTimer); pubIdleTimer = null; } }
function armPubTimer() {
  clearPubIdleTimer();
  if (pubVue) return;
  pubIdleTimer = setTimeout(showPub, PUB_IDLE_MS);
}
// Réinitialise le décompte d'inactivité à chaque interaction (uniquement sur le hall).
function resetPubTimer() {
  if (pubVue) return;
  if (document.querySelector('#screen-hall.active') && tutoDone) armPubTimer();
  else clearPubIdleTimer();
}
function showPub() {
  if (pubVue) return;
  pubVue = true;
  clearPubIdleTimer();
  const overlay = document.getElementById('pub-overlay');
  const img = document.getElementById('pub-img');
  const close = document.getElementById('pub-close');
  img.src = BASE + 'ecrans/pubkorpus.jpg';
  close.classList.remove('actif');
  close.onclick = null;
  let n = 5;
  close.textContent = n;
  overlay.classList.add('open');
  pubCountdownTimer = setInterval(() => {
    n--;
    if (n > 0) {
      close.textContent = n;
    } else {
      clearInterval(pubCountdownTimer); pubCountdownTimer = null;
      close.textContent = '✕';           // le décompte devient une croix
      close.classList.add('actif');
      close.onclick = fermerPub;
    }
  }, 1000);
}
function fermerPub() {
  document.getElementById('pub-overlay').classList.remove('open');
  if (pubCountdownTimer) { clearInterval(pubCountdownTimer); pubCountdownTimer = null; }
}

// ── FAUSSES PHRASES DE CHARGEMENT (écran titre) ──
// Petites phrases bidon qui défilent au-dessus du bouton "Jouer".
// Modifiables/ajoutables depuis le back end : ligne `phrases_chargement`
// de l'onglet config du Sheet, séparées par des « | ».
let loadingPhrasesTimer = null;
const PHRASES_CHARGEMENT_DEFAUT = [
  '...chargement des métadonnées...',
  '...calibrage du narguilé...',
  '...synchronisation des meujs de cess...',
  '...vérification des passeports...',
  '...polissage du putter...',
  '...comptage des billets...',
  '...réveil de Pierre...',
  '...optimisation des tractions...',
];
function getPhrasesChargement() {
  const raw = G && G.config && G.config.phrases_chargement;
  const list = raw ? String(raw).split('|').map(s => s.trim()).filter(Boolean) : [];
  return list.length ? list : PHRASES_CHARGEMENT_DEFAUT;
}
// Durée d'affichage proportionnelle au nombre de mots :
// 3 mots = 0,4 s, +0,2 s par mot supplémentaire (4 = 0,6 s, 5 = 0,8 s, etc.).
// Plancher à 3 mots pour les phrases plus courtes.
function dureePhraseMs(phrase) {
  const nbMots = phrase.split(/\s+/).filter(Boolean).length;
  return (Math.max(nbMots, 3) - 1) * 200;
}
// Mélange (Fisher-Yates) sans muter le tableau d'origine.
function melange(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function startLoadingPhrases() {
  stopLoadingPhrases();
  const el = document.getElementById('loading-phrases');
  if (!el) return;
  const phrases = getPhrasesChargement();
  // Ordre aléatoire : on pioche dans un sac mélangé, reconstitué une fois vidé
  // (évite de répéter une phrase juste avant qu'elles soient toutes passées).
  let sac = [];
  let derniere = null;
  const tick = () => {
    if (sac.length === 0) {
      sac = melange(phrases);
      // Éviter que la 1re phrase du nouveau sac soit identique à la précédente.
      if (sac.length > 1 && sac[0] === derniere) sac.push(sac.shift());
    }
    const phrase = sac.shift();
    derniere = phrase;
    el.textContent = phrase;
    loadingPhrasesTimer = setTimeout(tick, dureePhraseMs(phrase));
  };
  tick();
}
function stopLoadingPhrases() {
  if (loadingPhrasesTimer) { clearTimeout(loadingPhrasesTimer); loadingPhrasesTimer = null; }
  const el = document.getElementById('loading-phrases');
  if (el) el.textContent = '';
}

// ── CHEAT CODES ──
// Appui long (3 s) sur l'icône inventaire → champ de saisie en haut de l'écran.
// Code "complete" : ajoute tous les objets + la condition (Arthur vu) requis
// pour la fin. Il suffit ensuite d'aller faire la traction de Kupi pour finir.
// Déclencheur : 5 taps rapides sur l'icône inventaire. Fiable sur iOS,
// contrairement à l'appui long que Safari interrompt avec son propre geste.
let invTapCount = 0, invTapTimer = null;
const INV_TAPS_CHEAT = 5;     // nombre de taps pour ouvrir le cheat
const INV_TAP_FENETRE = 320;  // délai max (ms) entre deux taps de la séquence
// Appelé par le bouton inventaire (onclick). N'impacte PAS les openInv()
// déclenchés par le jeu lui-même (Charles, etc.), qui restent instantanés.
function onInvBtnTap() {
  invTapCount++;
  if (invTapTimer) clearTimeout(invTapTimer);
  if (invTapCount >= INV_TAPS_CHEAT) {
    invTapCount = 0;
    document.getElementById('inv-overlay').classList.remove('open');
    ouvrirCheat();
    return;
  }
  // Pas d'autre tap dans la fenêtre → appui normal, on ouvre l'inventaire.
  invTapTimer = setTimeout(() => { invTapCount = 0; openInv(); }, INV_TAP_FENETRE);
}
function setupCheat() {
  const input = document.getElementById('cheat-input');
  if (!input) return;
  // Validation du code : à la saisie (mobile, sans touche entrée) ou via Entrée.
  input.addEventListener('input', () => {
    if (CHEATS.includes(input.value.trim().toLowerCase())) appliquerCheat(input.value);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') appliquerCheat(input.value);
    else if (e.key === 'Escape') fermerCheat();
  });
}
function ouvrirCheat() {
  const bar = document.getElementById('cheat-bar');
  const input = document.getElementById('cheat-input');
  const msg = document.getElementById('cheat-msg');
  if (!bar || !input) return;
  if (msg) msg.textContent = '';
  input.value = '';
  bar.classList.add('open');
  setTimeout(() => input.focus(), 50);
}
function fermerCheat() {
  const bar = document.getElementById('cheat-bar');
  const input = document.getElementById('cheat-input');
  if (input) input.blur();
  if (bar) bar.classList.remove('open');
}
// Override de session pour l'image de fond du hall (cheat "drag").
// Remis à null au rechargement → tout revient à la normale au redémarrage.
let hallEcranOverride = null;
const CHEATS = ['complete', 'drag'];
function appliquerCheat(code) {
  const c = String(code || '').trim().toLowerCase();
  let msgTxt = null;
  if (c === 'complete') {
    // Tous les objets requis pour la fin + la condition "avoir vu Arthur".
    OBJETS_REQUIS_SECURITE.forEach(id => { if (!inventaire.includes(id)) inventaire.push(id); });
    lieuxVisites.add('arthur');
    // Rafraîchir les pins du hall si on y est, pour refléter le nouvel état.
    if (document.querySelector('#screen-hall.active')) setupHall();
    msgTxt = '✓ Tout débloqué — va voir Kupi et fais la traction !';
  } else if (c === 'drag') {
    // Interrupteur : 1re fois → image drag.jpg ; en retapant "drag" → retour normal.
    if (hallEcranOverride) {
      hallEcranOverride = null;
      msgTxt = '✓ Mode drag désactivé';
    } else {
      const hall = G.lieux.find(l => l.id === 'hall');
      if (hall) hallEcranOverride = hall.ecran.replace(/[^/]+$/, 'drag.jpg');
      msgTxt = '✓ Mode drag activé';
    }
    if (document.querySelector('#screen-hall.active')) setupHall();
  } else {
    return false;
  }
  const input = document.getElementById('cheat-input');
  const msg = document.getElementById('cheat-msg');
  if (input) { input.value = ''; input.blur(); }
  if (msg) msg.textContent = msgTxt;
  setTimeout(fermerCheat, 1900);
  return true;
}

let tutoIndex = 0;

// ══════════════════════════════════════════════════════════
// EFFET MACHINE À ÉCRIRE
// ══════════════════════════════════════════════════════════
let typewriterTimeout = null;

function typewrite(el, text, speed, onDone) {
  if (typewriterTimeout) clearTimeout(typewriterTimeout);
  el.textContent = '';
  let i = 0;
  const len = text.length;
  function step() {
    if (i < len) {
      el.textContent = text.slice(0, i + 1);
      i++;
      typewriterTimeout = setTimeout(step, speed);
    } else {
      if (onDone) onDone();
    }
  }
  if (len === 0) { if (onDone) onDone(); return; }
  step();
}

function typewriteBloc(txtEl, text, onDone) {
  const speed = parseInt(G?.config?.typewriter_speed) || 10;
  typewrite(txtEl, text, speed, onDone);
}
let TUTO = []; // chargé depuis le Sheet onglet 'tuto'

function setupHall() {
  const hall = G.lieux.find(l => l.id === 'hall');
  const ecranHall = hallEcranOverride || hall.ecran; // cheat "drag" remplace l'image
  document.getElementById('hall-bg').style.backgroundImage = `url(${BASE}${ecranHall})`;

  const pins = document.getElementById('hall-pins');
  pins.innerHTML = '';

  G.lieux.filter(l => {
    if (l.id === 'hall') return false;
    const a = String(l.actif).toLowerCase().trim();
    return a === 'true' || a === 'vrai' || a === '1' || a === 'oui';
  }).forEach(lieu => {
    if (!lieu.pos_x && lieu.pos_x !== 0) return;
    const done = lieuEstComplete(lieu);
    const btn = document.createElement('button');
    btn.className = 'hall-pin' + (done ? ' visited' : '');
    btn.style.left = lieu.pos_x + '%';
    btn.style.top = lieu.pos_y + '%';
    btn.innerHTML = `<svg width="26" height="34" viewBox="0 0 28 36" fill="none">
      <path d="M14 0C6.268 0 0 6.268 0 14c0 9.625 14 22 14 22S28 23.625 28 14C28 6.268 21.732 0 14 0z" fill="${done ? '#fff' : 'var(--rose)'}"/>
      <circle cx="14" cy="14" r="6" fill="${done ? '#ccc' : '#000'}"/>
    </svg>`;
    btn.onclick = () => {
      if (!tutoDone) return; // pins bloqués pendant le tuto
      entrerLieu(lieu.id);
    };
    // Au tout début (1re phrase du tuto), les pins sont masqués ; ils
    // "atterrissent" à la 2e phrase via revealPins().
    if (!pinsReveles && !tutoDone) btn.classList.add('pin-hidden');
    pins.appendChild(btn);
  });

  setupInvGrid();
  // Ne pas démarrer l'animation ici - elle démarre après le tuto
}

// Fait apparaître les pins du hall en cascade (atterrissage), ~1 s au total.
function revealPins() {
  pinsReveles = true;
  const pins = Array.from(document.querySelectorAll('#hall-pins .hall-pin'));
  const n = pins.length;
  const animDur = 360, total = 1000;
  const stagger = n > 1 ? (total - animDur) / (n - 1) : 0;
  pins.forEach((pin, i) => {
    pin.classList.remove('pin-hidden');
    pin.style.animationDelay = Math.round(i * stagger) + 'ms';
    pin.classList.add('pin-land');
  });
}

function lieuEstComplete(lieu) {
  // Sécurité (Kupi) : reste rose jusqu'à la vraie fin du jeu (tous les objets).
  // Ne pas passer blanc juste parce qu'on y est entré pour une traction ratée.
  if (lieu.id === 'securite') return jeuTermine;
  if (!lieu.objet_donne) return lieuxVisites.has(lieu.id);
  if (lieu.id === 'toilettes') return oscarVisites >= 2;
  // Rolex : le pin passe blanc dès que la Milgauss a été achetée,
  // et le reste même après l'avoir donnée à Charles.
  if (lieu.id === 'rolex') return milgaussAchetee;
  return inventaire.includes(lieu.objet_donne);
}

function peutAcceder(lieu) {
  const requis = String(lieu.objets_requis || '').trim();
  if (!requis) return true;
  return requis.split(',').map(s => s.trim()).filter(Boolean).every(id => inventaire.includes(id));
}

function showTuto() {

  tutoIndex = 0;

}
function renderTuto() {

// ══════════════════════════════════════════════════════════
// ANIMATION HALL (phrases de Victor en random)
// ══════════════════════════════════════════════════════════
function startHallAnim() {
  if (hallAnimTimer) { clearTimeout(hallAnimTimer); hallAnimTimer = null; }
  const bubble = document.getElementById('hall-bubble');
  const txtEl = document.getElementById('hall-bubble-txt');
  if (!bubble || !txtEl) return;

  const animDlg = G.dialogues.find(d =>
    d.lieu_id && d.lieu_id.toLowerCase() === 'hall' && d.type && d.type.toLowerCase() === 'animation hall'
  );
  if (!animDlg) return;

  const phrases = animDlg.texte.split('|').map(p => p.trim()).filter(Boolean);
  if (phrases.length === 0) return;

  const dureeAffichage = (parseFloat(G.config.time_duration_animation) || 4) * 1000;
  const dureePause = (parseFloat(G.config.pause_duration_animation) || 3) * 1000;

  let lastIdx = -1;
  function pickRandom() {
    let i;
    do { i = Math.floor(Math.random() * phrases.length); }
    while (phrases.length > 1 && i === lastIdx);
    lastIdx = i;
    return phrases[i];
  }

  function showNext() {
    // Ne pas afficher si le tuto est encore visible
    if (!tutoDone) {
      hallAnimTimer = setTimeout(showNext, 1000);
      return;
    }
    // Ne pas afficher si on n'est plus sur le hall
    if (!document.querySelector('#screen-hall.active')) return;

    bubble.style.display = 'block';
    txtEl.textContent = '';
    typewriteBloc(txtEl, pickRandom(), () => {
      hallAnimTimer = setTimeout(() => {
        bubble.style.display = 'none';
        hallAnimTimer = setTimeout(() => {
          if (document.querySelector('#screen-hall.active')) showNext();
        }, dureePause);
      }, dureeAffichage);
    });
  }

  // Démarrer immédiatement (le délai de 5s est géré par l'appelant)
  showNext();
}

// ══════════════════════════════════════════════════════════
// POPUP NARRATION CENTRAL (réussite mini-jeux : pacman, tractions)
// ══════════════════════════════════════════════════════════
let popupCountdownTimer = null;
let echecCountdownTimer = null;

function showPopupNarration(texte, onOk, opts) {
  opts = opts || {};
  const overlay = document.getElementById('popup-narration');
  const txtEl = document.getElementById('popup-narration-txt');
  const okBtn = document.getElementById('popup-narration-ok');

  // Délai de lecture forcé avant que le bouton OK devienne cliquable.
  // Réglable depuis le Sheet (clé popup_delai_lecture, en secondes).
  // opts.delai permet de surcharger ponctuellement (ex. tractions).
  const delaiSec = (opts.delai != null)
    ? opts.delai
    : (parseFloat(G?.config?.popup_delai_lecture) || 3);

  if (popupCountdownTimer) { clearInterval(popupCountdownTimer); popupCountdownTimer = null; }

  overlay.classList.add('open');
  okBtn.disabled = true;
  okBtn.style.opacity = '0.4';

  // Le texte s'écrit en machine à écrire ; en parallèle, un compte à rebours
  // tourne sur le bouton. Le bouton ne s'active qu'à la fin du décompte,
  // même si le texte a fini de s'écrire avant.
  typewriteBloc(txtEl, texte, null);

  let restant = Math.ceil(delaiSec);
  okBtn.textContent = restant > 0 ? `OK (${restant})` : 'OK';

  const activer = () => {
    if (popupCountdownTimer) { clearInterval(popupCountdownTimer); popupCountdownTimer = null; }
    okBtn.disabled = false;
    okBtn.style.opacity = '1';
    okBtn.textContent = 'OK';
  };

  if (restant <= 0) {
    activer();
  } else {
    popupCountdownTimer = setInterval(() => {
      restant--;
      if (restant <= 0) {
        activer();
      } else {
        okBtn.textContent = `OK (${restant})`;
      }
    }, 1000);
  }

  okBtn.onclick = () => {
    if (okBtn.disabled) return;
    if (popupCountdownTimer) { clearInterval(popupCountdownTimer); popupCountdownTimer = null; }
    overlay.classList.remove('open');
    if (onOk) onOk();
  };
}

// Créer un bloc dialogue — si le texte commence par [ c'est une narration
function createDlgBloc(personnage, texte) {
  const isNarr = texte.trim().startsWith('[') && texte.includes(']');
  const texteClean = isNarr
    ? texte.trim().replace(/^\[/, '').replace(/\]$/, '').trim()
    : texte;
  const bloc = document.createElement('div');
  bloc.className = 'dlg-bloc' + (isNarr ? ' narration' : '');
  if (isNarr) {
    bloc.innerHTML = `<div class="dlg-txt">${texteClean}</div>`;
  } else {
    bloc.innerHTML = `<div class="dlg-nom">${personnage}</div><div class="dlg-txt">${texteClean}</div>`;
  }
  return { bloc, isNarr, texteClean };
}

// Split un texte en phrases, en respectant les [narrations] comme unités atomiques
function splitPhrases(texte) {
  // D'abord séparer sur |
  const parts = texte.split('|').map(p => p.trim()).filter(Boolean);
  // Ensuite pour chaque part non-narration, découper sur saut de ligne puis ponctuation
  const result = [];
  for (const part of parts) {
    if (part.startsWith('[')) {
      result.push(part); // narration = bloc atomique
    } else if (part.includes('\n')) {
      result.push(...part.split(/\n+/).map(p => p.trim()).filter(Boolean));
    } else {
      const sub = part.split(/(?<=[.!?…])\s+(?=[A-ZÀ-Ù0-9])/).map(p => p.trim()).filter(Boolean);
      result.push(...(sub.length > 0 ? sub : [part]));
    }
  }
  return result;
}
// ══════════════════════════════════════════════════════════
// SONS
// Deux canaux indépendants :
//  - bgMusic : musique de fond globale, en boucle, jamais coupée
//  - currentSound : sons/voix des lieux, joués PAR-DESSUS la musique
// ══════════════════════════════════════════════════════════
let currentSound = null;
let bgMusic = null;
let bgMusicStarted = false;
let launchSound = null; // jingle de l'écran titre (launch.mp3)
let isMuted = false; // état mute global (musique + sons)

// Coupe ou réactive tout l'audio du jeu (musique de fond + son de lieu + jingle).
function toggleMute() {
  isMuted = !isMuted;
  if (bgMusic) bgMusic.muted = isMuted;
  if (currentSound) currentSound.muted = isMuted;
  if (launchSound) launchSound.muted = isMuted;
  // Basculer l'icône
  const on = document.getElementById('mute-icon-on');
  const off = document.getElementById('mute-icon-off');
  if (on && off) {
    on.style.display = isMuted ? 'none' : 'block';
    off.style.display = isMuted ? 'block' : 'none';
  }
}

// Jingle de l'écran titre : joué SEUL (coupe la musique de fond le temps du
// titre). Chemin configurable (clé 'son_launch'), repli sur son/launch.mp3.
function playLaunch() {
  // Couper la musique de fond pendant l'écran titre
  if (bgMusic) { bgMusic.pause(); bgMusic = null; bgMusicStarted = false; }
  const path = (G.config && G.config.son_launch) ? G.config.son_launch : 'son/launch.mp3';
  if (launchSound) { launchSound.pause(); launchSound.currentTime = 0; }
  launchSound = new Audio(BASE + path);
  launchSound.loop = false;
  launchSound.muted = isMuted;
  launchSound.volume = parseFloat(G.config && G.config.son_launch_volume) || 0.6;
  launchSound.play().catch(() => {});
  return launchSound;
}

// Arrête le jingle de l'écran titre (au lancement du jeu via "Jouer").
function stopLaunch() {
  if (launchSound) { launchSound.pause(); launchSound.currentTime = 0; launchSound = null; }
}

// Démarre la musique de fond globale (une seule fois), en boucle.
// La clé : config.musique_fond, sinon repli sur le son du lieu 'hall'.
function startBgMusic() {
  // Garde synchrone : si une instance existe déjà OU si un démarrage est en
  // cours, on ne recrée rien (évite la double couche audio décalée).
  if (bgMusicStarted || bgMusic) return;
  let path = (G.config && G.config.musique_fond) ? G.config.musique_fond : null;
  if (!path) {
    const hall = G.lieux.find(l => l.id === 'hall');
    path = hall ? (hall.son || hall.son_entree || null) : null;
  }
  if (!path) return;
  // On crée l'instance tout de suite : bgMusic non-null verrouille les appels suivants.
  bgMusic = new Audio(BASE + path);
  bgMusic.loop = true;
  bgMusic.muted = isMuted;
  bgMusic.volume = parseFloat(G.config && G.config.musique_fond_volume) || 0.5;
  // Ceinture-bretelles : si l'attribut loop ne se réamorce pas (cas fréquent
  // sur iOS/Safari où la piste s'arrête à la fin), on relance manuellement.
  bgMusic.addEventListener('ended', () => {
    bgMusic.currentTime = 0;
    bgMusic.play().catch(() => {});
  });
  bgMusic.play().then(() => { bgMusicStarted = true; }).catch(() => {
    // Autoplay bloqué : on libère l'instance pour pouvoir retenter au prochain clic.
    bgMusicStarted = false;
    if (bgMusic) { bgMusic.pause(); bgMusic = null; }
  });
}

// Son de lieu : joué PAR-DESSUS la musique de fond (n'affecte pas bgMusic).
function playSound(path) {
  if (!path) return;
  if (currentSound) { currentSound.pause(); currentSound.currentTime = 0; }
  currentSound = new Audio(BASE + path);
  currentSound.muted = isMuted;
  currentSound.play().catch(() => {});
}

// Ne coupe QUE le son de lieu, jamais la musique de fond.
function stopSound() {
  if (currentSound) { currentSound.pause(); currentSound.currentTime = 0; currentSound = null; }
}

// Son par lieu : colonne 'son' du Sheet (un mp3 par personnage).
// Le hall n'a pas de son de lieu (sa piste sert de musique de fond globale).
function sonDuLieu(lieu) {
  if (!lieu || lieu.id === 'hall') return null;
  return lieu.son || lieu.son_entree || lieu.son_succes || null;
}

function playSonLieu(lieu) {
  const s = sonDuLieu(lieu);
  if (s) playSound(s);
}

function playSonSucces() {
  if (currentLieu) playSonLieu(currentLieu);
}

function entrerLieu(id) {
  stopPacman(); // sécurité : aucune boucle pacman ne doit survivre à un changement de lieu
  const lieu = G.lieux.find(l => l.id === id);
  currentLieu = lieu;
  lieuxVisites.add(id);
  dlgList = G.dialogues.filter(d => d.lieu_id === id).sort((a, b) => +a.ordre - +b.ordre);
  dlgIndex = 0;
  phraseIndex = 0;

  // Jouer le son du personnage à l'arrivée
  // Son du personnage à l'arrivée — sauf toilettes : là, le son d'Oscar est
  // déclenché à chaque ouverture de sa cabine, pas à l'entrée des toilettes.
  if (id !== 'toilettes') playSonLieu(lieu);

  if (id === 'toilettes') { showCabines(lieu); return; }
  if (id === 'enregistrement') { showValises(lieu); return; }

  document.getElementById('scene-bg').style.backgroundImage = `url(${BASE}${lieu.ecran})`;
  showScreen('scene');

  if (id !== 'securite' && !peutAcceder(lieu)) {
    const echec = dlgList.find(d => d.type === 'fin_echec');
    if (echec) dlgIndex = dlgList.indexOf(echec);
  }

  renderDlg();
}

// ══════════════════════════════════════════════════════════
// DIALOGUE ENGINE
// ══════════════════════════════════════════════════════════
function adjustDlgBottom() {
  const cta = document.getElementById('cta-zone');
  const dlg = document.getElementById('dlg-zone');
  const choix = document.getElementById('choix-zone');
  // Double RAF pour attendre le rendu complet
  requestAnimationFrame(() => {
    const ctaH = cta.offsetHeight || 58;
    const choixH = (choix.style.display !== 'none') ? (choix.offsetHeight || 0) : 0;
    choix.style.bottom = ctaH + 'px';
    dlg.style.bottom = (ctaH + choixH) + 'px';
  });
}

function renderDlg() {
  let dlg = dlgList[dlgIndex];
  if (!dlg) { goHall(); return; }

  // Ligne spéciale Arthur : Victor se parle à lui-même UNIQUEMENT s'il a un meuj,
  // que Arthur lui fait disparaître. Sinon on saute cette ligne.
  if (dlg.type === 'victor_si_meuj') {
    if (dlg._traite) {
      // Déjà traitée (navigation phrase par phrase) : afficher comme 'victor'
      dlg = Object.assign({}, dlg, { type: 'victor' });
    } else {
      const idxMeuj = inventaire.indexOf('meuj');
      if (idxMeuj === -1) {
        // Pas de meuj : on saute cette ligne
        dlgIndex++;
        phraseIndex = 0;
        renderDlg();
        return;
      } else {
        // A un meuj : on le retire (une seule fois), on marque la ligne traitée
        inventaire.splice(idxMeuj, 1);
        dlgList[dlgIndex]._traite = true;
        dlg = Object.assign({}, dlg, { type: 'victor' });
      }
    }
  }

  // Reset UI
  const dlgZone = document.getElementById('dlg-zone');
  const choixZone = document.getElementById('choix-zone');
  const ctaZone = document.getElementById('cta-zone');
  const btnContinuer = document.getElementById('btn-continuer');
  const btnHall = document.getElementById('btn-hall-scene');
  dlgZone.innerHTML = '';
  choixZone.innerHTML = '';
  choixZone.style.display = 'none';
  ctaZone.style.display = 'none';
  btnHall.style.display = 'none';
  btnHall.disabled = false;
  btnHall.style.opacity = '1';
  btnHall.textContent = 'Retour au hall';
  if (echecCountdownTimer) { clearInterval(echecCountdownTimer); echecCountdownTimer = null; }
  btnContinuer.style.display = 'block';
  // Nettoyer zones montres si elles existent
  document.querySelectorAll('.montre-zone').forEach(el => el.remove());

  const type = dlg.type;

  // Types à afficher phrase par phrase
  if (['pnj','victor','narration'].includes(type)) {
    const phrases = splitPhrases(dlg.texte);
    if (phraseIndex >= phrases.length) phraseIndex = phrases.length - 1;
    const phrase = phrases[phraseIndex] || dlg.texte;

    dlgZone.innerHTML = '';
    const { bloc, isNarr } = createDlgBloc(dlg.personnage, phrase);
    // On ajoute le bloc mais avec texte vide — la machine à écrire le remplira
    const txtEl = bloc.querySelector('.dlg-txt');
    txtEl.textContent = '';
    dlgZone.appendChild(bloc);

    ctaZone.style.display = 'flex';
    // Bloquer le bouton pendant l'écriture
    btnContinuer.disabled = true;
    btnContinuer.style.opacity = '0.4';
    requestAnimationFrame(adjustDlgBottom);

    const isLast = phraseIndex >= phrases.length - 1;
    const isPnjDlg = type === 'pnj' || type === 'victor' || type === 'narration';
    const nextDlgType = dlgList[dlgIndex + 1]?.type;
    const noMorePnjAfter = !nextDlgType || ['fin_succes','fin_echec','reponse_incorrecte','qcm','choix','tunnel_pacman','tunnel_tractions'].includes(nextDlgType);
    // Un mini-jeu (pacman/tractions) suit-il ? Si oui, on ne propose pas l'inventaire.
    const miniJeuSuit = nextDlgType === 'tunnel_pacman' || nextDlgType === 'tunnel_tractions';
    // L'inventaire ne se propose que si le lieu attend vraiment un objet ET qu'aucun mini-jeu ne suit.
    const attendObjet = currentLieu.objet_a_donner
      && currentLieu.objet_a_donner !== 'pacman'
      && currentLieu.objet_a_donner !== 'tractions'
      && currentLieu.objet_a_donner !== 'cabines'
      && currentLieu.objet_a_donner !== 'qcm'
      && currentLieu.objet_a_donner !== 'choix';

    // Lancer la machine à écrire
    typewriteBloc(txtEl, isNarr ? phrase.replace(/^\[|\]$/g,'').trim() : phrase, () => {
      btnContinuer.disabled = false;
      btnContinuer.style.opacity = '1';
    });

    if (isLast && attendObjet && isPnjDlg && noMorePnjAfter && !miniJeuSuit) {
      btnContinuer.textContent = 'Ouvrir l\'inventaire →';
      btnContinuer.onclick = () => { if (!btnContinuer.disabled) { phraseIndex = 0; openInv(); } };
    } else {
      btnContinuer.textContent = 'Continuer';
      if (!isLast) {
        btnContinuer.onclick = () => { if (!btnContinuer.disabled) { phraseIndex++; renderDlg(); } };
      } else {
        btnContinuer.onclick = () => { if (!btnContinuer.disabled) { phraseIndex = 0; dlgIndex++; renderDlg(); } };
      }
    }
    return;
  }

  phraseIndex = 0;

  // Bloc texte standard pour les autres types
  const bloc = document.createElement('div');
  bloc.className = 'dlg-bloc';
  bloc.innerHTML = `<div class="dlg-nom">${dlg.personnage}</div><div class="dlg-txt">${dlg.texte}</div>`;
  dlgZone.appendChild(bloc);

  if (type === 'qcm') {
    const opts = dlg.meta.split('|');
    const bonne = opts[opts.length - 1].trim();
    const options = opts.slice(0, -1);
    const court = options.every(o => o.length < 28);

    choixZone.style.display = 'flex';
    choixZone.style.flexDirection = court ? 'row' : 'column';
    choixZone.style.flexWrap = court ? 'wrap' : 'nowrap';

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-choix';
      if (court) btn.style.cssText = 'flex:1;min-width:44%;text-align:center;margin:2px;';
      btn.textContent = opt;
      btn.onclick = () => {
        const lettre = opt.trim().charAt(0);
        if (lettre === bonne) {
          // Bonne réponse : sauter les reponse_incorrecte et aller au prochain dialogue utile
          phraseIndex = 0;
          dlgIndex++;
          // Sauter les entrées reponse_incorrecte
          while (dlgIndex < dlgList.length && dlgList[dlgIndex].type === 'reponse_incorrecte') {
            dlgIndex++;
          }
          renderDlg();
        } else {
          // Mauvaise réponse : afficher message temporaire 3 secondes puis réafficher le QCM
          const mauvaise = dlgList.find((d, i) => i > dlgIndex && d.type === 'reponse_incorrecte');
          if (mauvaise) showTempDlg(mauvaise, () => { renderDlg(); }, 3000);
        }
      };
      choixZone.appendChild(btn);
    });
    // Ajuster après que les choix sont dans le DOM
    requestAnimationFrame(() => requestAnimationFrame(adjustDlgBottom));
  }

  else if (type === 'choix' && currentLieu && currentLieu.id === 'rolex') {
    document.getElementById('scene-bg').style.backgroundImage = `url(${BASE}ecrans/montreschoix.jpg)`;
    const montres = [
      { label:'Daytona',        type:'reponse_daytona',  icon:'icons/daytona.png',  nom:'Rolex Daytona',       left:'5%',  top:'52%', w:'30%', h:'30%' },
      { label:'Milgauss',       type:'reponse_milgauss', icon:'icons/milgauss.png', nom:'Rolex Milgauss',      left:'36%', top:'50%', w:'28%', h:'32%' },
      { label:'GMT-Master II',  type:'reponse_gmt',      icon:'icons/GMT.png',      nom:'Rolex GMT-Master II', left:'64%', top:'52%', w:'31%', h:'30%' },
    ];
    montres.forEach(m => {
      const z = document.createElement('div');
      z.className = 'montre-zone';
      z.style.cssText = `position:absolute;left:${m.left};top:${m.top};width:${m.w};height:${m.h};cursor:pointer;z-index:25;border:2px solid transparent;transition:border-color 0.15s;`;
      z.ontouchstart = () => z.style.borderColor = 'var(--rose)';
      z.ontouchend = () => z.style.borderColor = 'transparent';
      z.onmouseenter = () => z.style.borderColor = 'var(--rose)';
      z.onmouseleave = () => z.style.borderColor = 'transparent';
      z.onclick = () => {
        // Sécurité : pas d'achat sans les 50 000 € (au cas où l'accès Sheet
        // ne serait pas configuré). On affiche le refus de paiement.
        if (!inventaire.includes('50k')) {
          document.querySelectorAll('.montre-zone').forEach(el => el.remove());
          const echec = dlgList.find(d => d.type === 'fin_echec');
          // Pas de son de succès ici : il n'y a pas d'achat, donc pas de montre ramassée.
          showSucces(echec || { personnage: 'Vendeur Rolex', texte: "Il semblerait que vous ne soyez pas en capacité de procéder au paiement, Monsieur. Revenez quand vos finances seront réglées." }, { skipSon: true });
          return;
        }
        document.querySelectorAll('.montre-zone').forEach(el => el.remove());
        // Récupérer la ligne de félicitations correspondante (44/45/46)
        const rep = dlgList.find(d => d.type === m.type);
        // Mettre à jour le slot générique "montre" avec le bon modèle (nom + icon)
        const objMontre = G.objets.find(o => o.id === 'montre');
        if (objMontre) { objMontre.nom = m.nom; objMontre.icon = m.icon; }
        // Mémoriser si la Milgauss (la bonne montre) a été choisie
        milgaussAchetee = m.nom.toLowerCase().includes('milgauss');
        // Remplacer la montre si déjà en inventaire
        const idx = inventaire.indexOf('montre');
        if (idx !== -1) inventaire.splice(idx, 1);
        // Dépenser les 50 000 € à l'achat
        const idx50k = inventaire.indexOf('50k');
        if (idx50k !== -1) inventaire.splice(idx50k, 1);
        // 1) Animation popup objet → 2) au clic OK : dialogue du vendeur qui félicite
        // (son joué une seule fois, au moment de l'animation de ramassage, pas à la félicitation)
        objetPopupOnEmpty = () => {
          if (rep) showSucces(rep, { skipSon: true });
          else goHall();
        };
        ajouterObjet('montre');
        if (currentLieu) playSonLieu(currentLieu);
      };
      document.getElementById('screen-scene').appendChild(z);
    });
  }

  else if (type === 'choix') {
    choixZone.style.display = 'flex';
    choixZone.style.flexDirection = 'column';
    dlg.meta.split('|').forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-choix';
      btn.textContent = opt;
      btn.onclick = () => { dlgIndex++; renderDlg(); };
      choixZone.appendChild(btn);
    });
  }

  else if (type === 'reponse_incorrecte') {
    ctaZone.style.display = 'flex';
    btnContinuer.textContent = 'Réessayer';
    btnContinuer.onclick = () => { dlgIndex++; renderDlg(); };
  }

  else if (type === 'fin_succes' || type === 'fin_succes_2') {
    ctaZone.style.display = 'flex';
    btnContinuer.style.display = 'none';
    btnHall.style.display = 'block';
    if (dlg.meta && !inventaire.includes(dlg.meta)) {
      // Bouton rose épais "Récupérer le [objet]" (même DA que les toilettes),
      // animation sur l'écran du PNJ, puis bascule en "Retour au hall".
      const obj = G.objets.find(o => o.id === dlg.meta);
      const nomObj = obj ? obj.nom : dlg.meta;
      styleBtnRamasser(btnHall, true);
      btnHall.textContent = 'Récupérer ' + nomObjAvecArticle(nomObj);
      btnHall.onclick = () => {
        ajouterObjet(dlg.meta); // animation popup sur l'écran PNJ
        if (currentLieu) playSonLieu(currentLieu); // son joué au moment de l'animation, pas avant
        styleBtnRamasser(btnHall, false);
        btnHall.textContent = 'Retour au hall';
        btnHall.onclick = () => { stopSound(); goHall(); };
      };
    } else {
      // Pas d'objet à ramasser (ou déjà en inventaire) : aucune animation à attendre, son immédiat.
      if (currentLieu) playSonLieu(currentLieu);
      styleBtnRamasser(btnHall, false);
      btnHall.textContent = 'Retour au hall';
      btnHall.onclick = () => { if (dlg.meta) ajouterObjet(dlg.meta); goHall(); };
    }
    requestAnimationFrame(adjustDlgBottom);
  }

  else if (type === 'fin_echec') {
    ctaZone.style.display = 'flex';
    btnContinuer.style.display = 'none';
    btnHall.style.display = 'block';
    btnHall.textContent = 'Retour au hall';
    btnHall.onclick = goHall;
    requestAnimationFrame(adjustDlgBottom);
  }

  else if (type === 'tunnel_pacman') {
    const phrases = dlg.texte.split('|').map(p => p.trim()).filter(Boolean);
    startPacman(phrases.length > 0 ? phrases : ['...']);
  }

  else if (type === 'tunnel_tractions') {
    const phrases = dlg.texte.split('|').map(p => p.trim()).filter(Boolean);
    startTractions(phrases.length > 0 ? phrases : ['...']);
  }

  else {
    // Type inconnu (ex. popup_succes, game_over_pacman, reponse_*) — ignorer et passer au suivant
    dlgIndex++;
    renderDlg();
  }
}

function showTempDlg(dlg, cb, duree = 3000) {
  const dlgZone = document.getElementById('dlg-zone');
  dlgZone.innerHTML = '';
  document.getElementById('choix-zone').style.display = 'none';
  const { bloc } = createDlgBloc(dlg.personnage, dlg.texte);
  bloc.style.borderLeft = '3px solid var(--rose)';
  dlgZone.appendChild(bloc);
  requestAnimationFrame(adjustDlgBottom);
  setTimeout(() => cb(), duree);
}

// Bascule le bouton entre le style CTA (rose épais, comme aux toilettes) et
// le style secondaire (retour au hall).
function styleBtnRamasser(btn, ramasser) {
  if (ramasser) {
    btn.classList.remove('btn-sec');
    btn.classList.add('btn-cta');
  } else {
    btn.classList.remove('btn-cta');
    btn.classList.add('btn-sec');
  }
}

// Renvoie le nom de l'objet précédé d'un article ("le putter", "la valise").
// Heuristique simple ; par défaut "le". Override possible via objet.article.
function nomObjAvecArticle(nom) {
  const n = (nom || '').toLowerCase();
  const feminins = ['valise','photo','montre','mallette','carte'];
  const art = feminins.some(f => n.includes(f)) ? 'la ' : 'le ';
  return art + nom;
}

function showSucces(dlg, opts) {
  opts = opts || {};
  const dlgZone = document.getElementById('dlg-zone');
  const choixZone = document.getElementById('choix-zone');
  dlgZone.innerHTML = '';
  choixZone.innerHTML = '';
  choixZone.style.display = 'none';
  const { bloc: sbloc } = createDlgBloc(dlg.personnage, dlg.texte);
  // texte vide → machine à écrire
  const txtEl = sbloc.querySelector('.dlg-txt');
  if (txtEl) txtEl.textContent = '';
  dlgZone.appendChild(sbloc);
  const ctaZone = document.getElementById('cta-zone');
  ctaZone.style.display = 'flex';
  document.getElementById('btn-continuer').style.display = 'none';
  const btnHall = document.getElementById('btn-hall-scene');
  btnHall.style.display = 'block';
  btnHall.disabled = false;
  btnHall.style.opacity = '1';
  if (echecCountdownTimer) { clearInterval(echecCountdownTimer); echecCountdownTimer = null; }
  // Un objet va être ramassé via une animation : on attend ce moment pour jouer le son.
  // Sinon (pas d'objet, déjà en inventaire, ou son déjà joué ailleurs comme chez Rolex) : son immédiat.
  const animationEnAttente = dlg.meta && !inventaire.includes(dlg.meta);
  if (!animationEnAttente && !opts.skipSon && currentLieu) playSonLieu(currentLieu);
  if (opts.onFin) {
    // Fin de mission : gros bouton rose (btn-cta) qui enchaîne sur l'écran de fin.
    styleBtnRamasser(btnHall, true);
    btnHall.textContent = 'Continuer';
    btnHall.onclick = () => {
      if (dlg.meta) { ajouterObjet(dlg.meta); if (!opts.skipSon && currentLieu) playSonLieu(currentLieu); }
      stopSound();
      opts.onFin();
    };
  } else if (animationEnAttente) {
    // Objet à récupérer : bouton rose épais "Récupérer le [objet]" (DA toilettes),
    // déclenche l'animation sur l'écran du PNJ, puis bascule en "Retour au hall".
    const obj = G.objets.find(o => o.id === dlg.meta);
    const nomObj = obj ? obj.nom : dlg.meta;
    styleBtnRamasser(btnHall, true);
    btnHall.textContent = 'Récupérer ' + nomObjAvecArticle(nomObj);
    btnHall.onclick = () => {
      ajouterObjet(dlg.meta); // animation popup de l'objet, sur l'écran PNJ
      if (!opts.skipSon && currentLieu) playSonLieu(currentLieu); // son joué au moment de l'animation
      styleBtnRamasser(btnHall, false);
      btnHall.textContent = 'Retour au hall';
      btnHall.onclick = () => { stopSound(); goHall(); };
    };
  } else {
    styleBtnRamasser(btnHall, false);
    btnHall.textContent = 'Retour au hall';
    btnHall.onclick = () => {
      if (dlg.meta) ajouterObjet(dlg.meta);
      stopSound();
      goHall();
    };
  }
  if (txtEl) typewriteBloc(txtEl, dlg.texte, () => requestAnimationFrame(adjustDlgBottom));
  requestAnimationFrame(adjustDlgBottom);
}

// ══════════════════════════════════════════════════════════
// DONNER UN OBJET
// ══════════════════════════════════════════════════════════
function openDonner() {
  const grid = document.getElementById('donner-grid');
  grid.innerHTML = '';
  inventaire.forEach(id => {
    const obj = G.objets.find(o => o.id === id);
    if (!obj) return;
    const item = document.createElement('div');
    item.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:8px;background:#f5f5f5;';
    item.innerHTML = `<img src="${BASE}${obj.icon}" style="width:48px;height:48px;object-fit:contain;"><span style="font-size:9px;font-weight:700;text-transform:uppercase;text-align:center;margin-top:4px;color:#111;">${obj.nom}</span>`;
    item.onclick = () => { closeDonner(); handleDonner(id); };
    grid.appendChild(item);
  });
  document.getElementById('donner-overlay').style.display = 'flex';
}
function closeDonner() { document.getElementById('donner-overlay').style.display = 'none'; }

function handleDonner(objetId) {
  const attendu = currentLieu.objet_a_donner;

  if (currentLieu.id === 'exterieur') {
    if (objetId === 'meuj') {
      inventaire.splice(inventaire.indexOf('meuj'), 1);
      // Chercher le fin_succes avec meta photolaura
      const succes = dlgList.find(d => d.type === 'fin_succes' && d.meta === 'photolaura')
                  || dlgList.find(d => d.type === 'fin_succes');
      if (succes) showSucces(succes);
    } else {
      const mauvais = dlgList.find(d => d.type === 'reponse_incorrecte')
                   || {personnage:'Antoine', texte:"Qu'est-ce que tu veux que je foute avec ça ?"};
      // Après le message, rouvrir l'inventaire pour réessayer
      showTempDlg(mauvais, () => { openInv(); }, 3000);
    }
    return;
  }

  if (currentLieu.id === 'dutyfree_charles') {
    if (objetId === 'montre') {
      // Vérifier que c'est bien la Milgauss
      const objMontre = G.objets.find(o => o.id === 'montre');
      const isMilgauss = objMontre && objMontre.nom && objMontre.nom.toLowerCase().includes('milgauss');
      if (isMilgauss) {
        inventaire.splice(inventaire.indexOf('montre'), 1);
        const succes = dlgList.find(d => d.type === 'fin_succes');
        if (succes) showSucces(succes);
      } else {
        showTempDlg({personnage:'Charles', texte:"Non non non, je veux la Milgauss ! Celle avec le cadran violet. T'as pas celle-là ?"}, () => { openInv(); }, 3500);
      }
    } else {
      const mauvais = dlgList.find(d => d.type === 'reponse_incorrecte');
      showTempDlg(mauvais || {personnage:'Charles', texte:"T'as pas un truc qui brille ?"}, () => { openInv(); }, 3000);
    }
    return;
  }

  if (objetId === attendu) {
    inventaire.splice(inventaire.indexOf(objetId), 1);
    const succes = dlgList.find(d => d.type === 'fin_succes');
    if (succes) showSucces(succes); // objet donné au clic retour via showSucces
  } else {
    const mauvais = dlgList.find(d => d.type === 'reponse_incorrecte');
    showTempDlg(mauvais || {personnage: currentLieu.pnj, texte:"C'est pas ça..."}, renderDlg);
  }
}

// ══════════════════════════════════════════════════════════
// VALISES (BAPTISTE)
// ══════════════════════════════════════════════════════════
let baptisteTunnelIdx = 0;
let baptisteTunnelPhrases = [];
let baptisteEcrit = false;          // bloque pendant qu'un message s'écrit
let baptisteValisesActives = false; // les valises ne sont cliquables qu'en mode "consigne"
let baptisteConsigneDlg = null, baptisteRelanceDlg = null, baptisteSuccesDlg = null;

// Découpe un texte du Sheet en phrases (séparateur "|"). Aucune phrase en dur.
function splitPhrasesBaptiste(texte) {
  return String(texte || '').split('|').map(s => s.trim()).filter(Boolean);
}

function showValises(lieu) {
  if (!peutAcceder(lieu)) { entrerLieuEchec(lieu); return; }
  document.getElementById('valises-bg').style.backgroundImage = `url(${BASE}${lieu.ecran})`;
  showScreen('valises');

  // Tous les textes viennent du Sheet (lieu_id 'enregistrement').
  const dlgs = G.dialogues.filter(d => d.lieu_id === 'enregistrement');
  const intro = dlgs.find(d => d.type === 'pnj');
  baptisteConsigneDlg = dlgs.find(d => d.type === 'consigne');
  baptisteRelanceDlg  = dlgs.find(d => d.type === 'relance'); // consigne courte après une mauvaise valise
  baptisteSuccesDlg   = dlgs.find(d => d.type === 'fin_succes');
  baptisteTunnelPhrases = dlgs.filter(d => d.type === 'tunnel').sort((a,b) => +a.ordre - +b.ordre);
  baptisteTunnelIdx = 0;
  baptisteValisesActives = false;

  // Zones valises (les clics ne sont pris en compte qu'en mode "consigne").
  const overlay = document.getElementById('valises-overlay');
  overlay.innerHTML = '';
  const valises = [
    { left:'5%',  top:'55%', w:'20%', h:'25%' },
    { left:'27%', top:'57%', w:'20%', h:'23%' },
    { left:'52%', top:'55%', w:'20%', h:'25%' },
    { left:'74%', top:'53%', w:'22%', h:'27%' },
  ];
  valises.forEach((v, idx) => {
    const zone = document.createElement('div');
    zone.className = 'valise-zone';
    zone.dataset.idx = idx;
    zone.dataset.essayee = 'false';
    zone.style.cssText = `position:absolute;left:${v.left};top:${v.top};width:${v.w};height:${v.h};cursor:pointer;z-index:10;-webkit-tap-highlight-color:rgba(255,110,199,0.2);`;
    zone.ontouchstart = () => { if (baptisteValisesActives && zone.dataset.essayee === 'false') zone.style.background = 'rgba(255,110,199,0.2)'; };
    zone.ontouchend = () => zone.style.background = 'transparent';
    zone.onclick = () => choisirValise(zone);
    overlay.appendChild(zone);
  });

  // Intro de Baptiste (phrase(s) + CONTINUER), puis consigne en jaune.
  if (intro) {
    montrerSequenceBaptiste(splitPhrasesBaptiste(intro.texte), false, montrerConsigne);
  } else {
    montrerConsigne();
  }
}

// Affiche une suite de phrases dans le bloc Baptiste, une par une via CONTINUER.
// onDone est appelé au clic CONTINUER de la dernière phrase.
function montrerSequenceBaptiste(phrases, consigneMode, onDone) {
  const seq = phrases.length ? phrases : ['...'];
  let idx = 0;
  const bloc = document.querySelector('#baptiste-tunnel .baptiste-bloc');
  bloc.classList.toggle('mode-consigne', !!consigneMode);
  document.getElementById('baptiste-tunnel').style.display = 'block';
  baptisteValisesActives = false; // pas de clic valise pendant un dialogue
  const txtEl = document.getElementById('baptiste-txt');
  const btn = document.getElementById('baptiste-ok-btn');
  const afficher = () => {
    btn.style.display = 'none';
    baptisteEcrit = true;
    typewriteBloc(txtEl, seq[idx], () => {
      baptisteEcrit = false;
      btn.textContent = 'Continuer';
      btn.style.display = 'block';
      btn.onclick = () => {
        if (baptisteEcrit) return;
        idx++;
        if (idx < seq.length) afficher();
        else { btn.style.display = 'none'; if (onDone) onDone(); }
      };
    });
  };
  afficher();
}

// Consigne en jaune (depuis le Sheet) + valises rendues cliquables.
// relance=true → consigne courte après une mauvaise valise (repli sur la
// consigne complète si aucune ligne 'relance' n'existe dans le Sheet).
function montrerConsigne(relance) {
  const bloc = document.querySelector('#baptiste-tunnel .baptiste-bloc');
  document.getElementById('baptiste-ok-btn').style.display = 'none';
  const dlg = (relance && baptisteRelanceDlg) ? baptisteRelanceDlg : baptisteConsigneDlg;
  if (dlg) {
    bloc.classList.add('mode-consigne');
    document.getElementById('baptiste-tunnel').style.display = 'block';
    baptisteEcrit = true;
    typewriteBloc(document.getElementById('baptiste-txt'), dlg.texte, () => {
      baptisteEcrit = false;
      baptisteValisesActives = true;
    });
  } else {
    // Pas de consigne dans le Sheet : on active simplement les valises.
    document.getElementById('baptiste-tunnel').style.display = 'none';
    baptisteValisesActives = true;
  }
}

function choisirValise(zone) {
  if (!baptisteValisesActives || baptisteEcrit) return;
  if (zone.dataset.essayee === 'true') return;

  zone.dataset.essayee = 'true';
  zone.style.cursor = 'default';
  zone.style.background = 'transparent';

  const zones = Array.from(document.querySelectorAll('#valises-overlay .valise-zone'));
  const restantes = zones.filter(z => z.dataset.essayee === 'false');

  if (restantes.length === 0) {
    // Dernière valise non essayée = la bonne → succès.
    baptisteValisesActives = false;
    zones.forEach(z => z.onclick = null);
    if (baptisteSuccesDlg && baptisteSuccesDlg.meta) ajouterObjet(baptisteSuccesDlg.meta); // animation ramassage
    if (currentLieu) playSonLieu(currentLieu); // son au moment du ramassage de la valise
    const phrases = baptisteSuccesDlg ? splitPhrasesBaptiste(baptisteSuccesDlg.texte) : ['...'];
    montrerSequenceBaptiste(phrases, false, () => { stopSound(); goHall(); });
  } else {
    // Mauvaise valise → séquence "tunnel" (1 ligne tunnel = 1 valise, phrases
    // séparées par "|"), puis retour à la consigne + valises de nouveau cliquables.
    const row = baptisteTunnelPhrases.length
      ? baptisteTunnelPhrases[baptisteTunnelIdx % baptisteTunnelPhrases.length]
      : null;
    baptisteTunnelIdx++;
    const phrases = row ? splitPhrasesBaptiste(row.texte) : ['...'];
    montrerSequenceBaptiste(phrases, false, () => montrerConsigne(true)); // relance courte
  }
}
