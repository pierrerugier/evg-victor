<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EVG Victor</title>
<!-- Ajout à l'écran d'accueil iOS : icône + titre + affichage plein écran "app" -->
<meta name="apple-mobile-web-app-title" content="EVG Victor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/pierrerugier/evg-victor/main/icons/app-icon.png">
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pierrerugier/evg-victor/main/icons/app-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font: 'Josefin Sans', sans-serif;
  --rose: #FF6EC7;
  --noir: #000000;
  --blanc: #ffffff;
  --dlg-bg: rgba(0,0,0,0.72);
  --dlg-color: #ffffff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: var(--font);
  background: #111;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
html, body {
  width: 100%; height: 100%;
  /* Hauteur = celle MESURÉE en JS (--app-h, cf. setAppHeight()). iOS calcule mal
     les unités vh/dvh au 1er affichage en mode app (bande noire en bas, qui
     disparaît dès qu'on pivote) ; une mesure JS réappliquée à chaque événement
     donne la vraie hauteur. Repli sur 100dvh tant que le JS n'a pas tourné. */
  height: 100dvh;
  height: var(--app-h, 100dvh);
  overflow: hidden;
  font-family: var(--font);
  background: #000;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
#app {
  position: relative;
  width: 100%;
  height: 100dvh;
  height: var(--app-h, 100dvh);
  /* ne jamais dépasser la hauteur visible réelle */
  max-height: var(--app-h, 100dvh);
  overflow: hidden;
}
/* Sur écran assez large (paysage ou desktop), on borne la largeur pour garder
   un format vertical, en se basant sur la hauteur réelle. */
@media (min-aspect-ratio: 9/16) {
  #app {
    width: calc(var(--app-h, 100dvh) * 9 / 16);
    height: var(--app-h, 100dvh);
    max-height: var(--app-h, 100dvh);
  }
}

/* SCREENS */
.screen {
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  width: 100%; height: 100%;
}
.screen.active { display: flex; }

/* BG — pleine page QUOI QU'IL ARRIVE, jamais de bande ni de répétition.
   `cover` remplit toujours tout le cadre et rogne le débord ; `no-repeat`
   garantit qu'aucune répétition n'apparaît en haut/bas même si l'image est
   plus petite que prévu ; `center` rend le rognage symétrique. */
.bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center center;
  background-color: #000;
  z-index: 0;
}

/* BOUTON RETOUR */
#btn-retour-hall, #btn-retour-titre {
  position: absolute;
  /* Collé juste sous la barre de statut iPhone (safe-area) en mode "app"
     plein écran ; minimum 12px du haut en navigateur classique. */
  top: max(calc(env(safe-area-inset-top, 0px) + 4px), 12px); left: 14px;
  z-index: 50;
  background: rgba(0,0,0,0.75);
  color: #fff;
  border: none;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px 14px;
  cursor: pointer;
}

/* INVENTAIRE ICON */
.inv-btn {
  position: absolute;
  top: max(calc(env(safe-area-inset-top, 0px) + 2px), 8px); right: 10px;
  width: 64px; height: 64px;
  z-index: 50;
  background: none; border: none;
  cursor: pointer; padding: 0;
}
.inv-btn img { width: 100%; height: 100%; object-fit: contain; }

/* BOUTON MUTE - à gauche du bouton inventaire, plus petit, blanc transparent */
.mute-btn {
  position: absolute;
  top: max(calc(env(safe-area-inset-top, 0px) + 70px), 76px); right: 22px;
  width: 40px; height: 40px;
  z-index: 50;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.mute-btn svg { width: 20px; height: 20px; display: block; }
.mute-btn svg path, .mute-btn svg line { stroke: #fff; }

/* SCENE */
#screen-scene { position: relative; }

/* DIALOGUE - toujours collé en bas */
#dlg-zone {
  position: absolute;
  bottom: 58px; left: 0; right: 0;
  z-index: 30;
  padding: 10px 14px 0px;
  display: flex; flex-direction: column; gap: 0;
}
.dlg-bloc {
  background: var(--dlg-bg);
  padding: 10px 12px;
  margin-bottom: 4px;
}
.dlg-bloc.narration {
  background: var(--dlg-bg); /* même fond noir que les autres */
}
.dlg-nom {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--rose); margin-bottom: 4px;
}
.dlg-txt {
  font-size: 14px; line-height: 1.5;
  color: var(--dlg-color);
}
.dlg-bloc.narration .dlg-txt {
  color: var(--narration-color, #FFDE00);
}
/* plus de curseur clignotant */

/* CHOIX */
#choix-zone {
  position: absolute;
  bottom: 58px; left: 0; right: 0;
  z-index: 30;
  padding: 0 14px 4px;
  display: none; flex-direction: column; gap: 4px;
}
.btn-choix {
  background: rgba(0,0,0,0.72);
  border: none; border-left: 4px solid transparent;
  padding: 11px 13px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: #fff; text-align: left; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.btn-choix:active { border-left-color: var(--rose); }

/* ── TINDER (téléphone de Paul) ── */
/* iphone.png et les cartes tindergirl sont dessinés en 1080x1920, soit le format
   de l'écran du jeu : le cadrage (taille/position du téléphone, marges
   transparentes) est DÉJÀ dans l'image. On les affiche donc en plein écran, sans
   rien redimensionner, et les deux calques se superposent au pixel près.
   `contain` (et pas `cover`) : on veut la composition entière, sans rogner la
   main ; les marges transparentes laissent voir la scène de Paul derrière. */
/* Les 3 PNG (tindergirl, iphone, match) partagent le MÊME canvas et participent
   d'une seule animation : ils sont donc tous rendus À L'IDENTIQUE, dans une boîte
   unique (#tinder-phone) dimensionnée en JS façon `cover` — remplie en entier,
   rognée en haut/bas si l'image est plus haute que l'écran, sur les côtés si elle
   est plus large. Comme les trois calques occupent cette même boîte, ils restent
   alignés au pixel quoi qu'il arrive. Le débord est rogné par overflow:hidden. */
#tinder-zone {
  position: absolute; inset: 0;
  z-index: 20;
  display: none;
  align-items: center; justify-content: center;
  overflow: hidden;     /* rogne le débord du cadrage plein */
  pointer-events: none; /* seules les zones de clic du téléphone réagissent */
}
#tinder-zone.open { display: flex; }
#tinder-phone { position: relative; flex: none; } /* taille posée par ajusterTinderPhone */
#tinder-cadre, #tinder-photo, #tinder-match {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;  /* la boîte a déjà le ratio exact de l'image */
  object-position: center;
}
/* Zones de clic invisibles, calées sur les boutons dessinés dans iphone.png. */
.tinder-hit {
  position: absolute; z-index: 4;
  width: var(--tinder-hit, 11%);
  aspect-ratio: 1;
  transform: translate(-50%, -50%);
  background: transparent; border: none; padding: 0;
  border-radius: 50%;
  cursor: pointer;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}
#tinder-nope { left: var(--tinder-nope-x, 39.6%); top: var(--tinder-btn-y, 70.3%); }
#tinder-like { left: var(--tinder-like-x, 62.2%); top: var(--tinder-btn-y, 70.3%); }
/* Cadre du téléphone (main + UI Tinder, écran découpé) : PAR-DESSUS la carte. */
#tinder-cadre { z-index: 2; }
/* Carte de la fille : SOUS le cadre, elle apparaît dans la découpe de l'écran. */
#tinder-photo { z-index: 1; }
/* "MATCH" : calque plein, rendu EXACTEMENT comme les deux autres. Pas de scale
   ni de translation — le moindre transform le décalerait du téléphone, alors que
   les trois PNG sont dessinés pour se superposer au pixel. Seule l'opacité varie. */
#tinder-match {
  z-index: 3;
  opacity: 0;
  transition: opacity 0.18s ease;
  pointer-events: none;
}
#tinder-match.show { opacity: 1; }

/* CTA */
#cta-zone {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  padding: 4px 14px calc(14px + env(safe-area-inset-bottom, 0px));
  display: none; flex-direction: column; gap: 6px;
}

/* scene-bottom unused but kept for compat */
#scene-bottom { display: contents; }
.btn-cta {
  background: var(--rose);
  border: none; padding: 15px;
  font-family: var(--font); font-size: 15px; font-weight: 700;
  color: var(--noir); text-transform: uppercase;
  letter-spacing: 0.08em; cursor: pointer;
  width: 100%; min-height: 52px;
  -webkit-tap-highlight-color: transparent;
}
.btn-sec {
  background: rgba(0,0,0,0.7);
  border: none; padding: 12px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: #fff; cursor: pointer; width: 100%;
  -webkit-tap-highlight-color: transparent;
}

/* ── ÉCRAN CHARGEMENT ── */
#screen-loading { background: #000; }
#loading-cover {
  position: absolute; inset: 0;
  background-size: cover; background-position: center top;
}
#loading-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 10; pointer-events: none;
}
#loading-intro {
  position: absolute;
  bottom: 14%; left: 0; right: 0;
  z-index: 5; padding: 0 20px;
  text-align: center; color: #fff;
  font-size: 12px; line-height: 1.5;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}
#loading-phrases {
  position: absolute;
  bottom: 13%; left: 0; right: 0;
  z-index: 20; padding: 0 24px;
  text-align: center; color: #fff;
  font-size: 11px; letter-spacing: 0.3px;
  opacity: 0.85;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  pointer-events: none;
  min-height: 14px;
}
#btn-jouer {
  display: none;
  position: absolute;
  bottom: 5%; left: 5%; width: 90%;
  z-index: 20;
}

/* ── CHEAT BAR (appui long sur l'icône inventaire) ── */
.inv-btn {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
#cheat-bar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 200; display: none;
  /* padding haut augmenté de la safe-area iPhone (mode app plein écran) */
  padding: calc(env(safe-area-inset-top, 0px) + 10px) 14px 12px;
  background: rgba(0,0,0,0.88);
  box-shadow: 0 2px 12px rgba(0,0,0,0.6);
}
#cheat-bar.open { display: block; }
#cheat-row { display: flex; gap: 8px; align-items: stretch; }
#cheat-input {
  flex: 1; box-sizing: border-box;
  padding: 11px 12px; border-radius: 8px;
  border: 1px solid var(--rose);
  background: #111; color: #fff;
  font-size: 16px; text-align: center; letter-spacing: 1px;
  outline: none;
}
#cheat-close {
  flex: 0 0 auto; width: 44px;
  border-radius: 8px; border: 1px solid var(--rose);
  background: #111; color: #fff;
  font-size: 18px; line-height: 1; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#cheat-close:active { background: #222; }
#cheat-msg {
  color: var(--rose); text-align: center;
  font-size: 12px; margin-top: 6px; min-height: 14px;
}

/* ── POP-UP PUB PARODIE ── */
#pub-overlay {
  position: absolute; inset: 0; z-index: 300;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
}
#pub-overlay.open { display: flex; }
#pub-box {
  position: relative; width: 92%; line-height: 0;
  border: 4px solid var(--rose); border-radius: 6px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.7);
}
#pub-img { width: 100%; height: auto; display: block; border-radius: 3px; }
#pub-close {
  position: absolute; top: 8px; right: 8px;
  min-width: 30px; height: 30px; padding: 0 6px;
  border-radius: 50%;
  background: var(--rose); color: #000;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-weight: 800; font-size: 15px; line-height: 1;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
#pub-close.actif { cursor: pointer; }

/* ── HALL ── */
#screen-hall { position: relative; }
#hall-pins { position: absolute; inset: 0; z-index: 10; }
.hall-pin {
  position: absolute;
  transform: translate(-50%, -100%);
  background: none; border: none; padding: 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.hall-pin.locked svg path { fill: #777; }
.hall-pin.locked svg circle { fill: #555; }
/* Pins masqués pendant la 1re phrase du tuto, puis "atterrissage" à la 2e. */
.hall-pin.pin-hidden { opacity: 0; }
.hall-pin.pin-land {
  animation: pinLand 360ms cubic-bezier(0.34, 1.4, 0.64, 1) both;
}
@keyframes pinLand {
  0%   { opacity: 0; transform: translate(-50%, -200%) scale(0.8); }
  100% { opacity: 1; transform: translate(-50%, -100%) scale(1); }
}

/* ── INVENTAIRE OVERLAY ── */
#inv-overlay {
  position: absolute; inset: 0; z-index: 60;
  display: none; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5);
}
#inv-overlay.open { display: flex; }
#inv-inner { position: relative; width: 100%; height: 100%; }
#inv-bg { width: 100%; height: 100%; object-fit: cover; object-position: center; }
#inv-grid {
  position: absolute;
  /* Bornes calées sur le PANNEAU PLAT de la valise (mesuré : 19,9 %–82,8 % de la
     hauteur, fond en cover), avec une marge de sécurité pour ne jamais toucher le
     rabat en haut ni la fermeture en bas. On profite de la largeur (le vert est
     large à l'écran) pour de belles icônes sans étirer la hauteur. */
  top: 21%; left: 13%; width: 74%; height: 59%;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.inv-slot {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-width: 0;
  padding: 2px 0;      /* petite garde pour que rien ne se chevauche entre rangées */
  overflow: hidden;
}
.inv-slot img {
  /* Icônes agrandies (62 -> 78), plafonnées en vw pour rester nettes sur petit écran. */
  width: min(78px, 19vw); height: min(78px, 19vw); object-fit: contain;
  opacity: 0.15; filter: grayscale(1); flex: none;
}
.inv-slot.ok img { opacity: 1; filter: none; }
.inv-slot span {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.03em; color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  text-align: center; margin-top: 3px; line-height: 1.1;
  max-width: 100%;
}
#inv-close-btn {
  position: absolute; bottom: 5%; left: 10%; width: 80%; z-index: 2;
}

/* ── OBJET GAGNÉ ── */
#objet-popup {
  position: absolute; inset: 0; z-index: 200;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.82);
  pointer-events: all;
}
#objet-popup.open { display: flex; }
#objet-popup img {
  width: 220px; height: 220px; object-fit: contain;
  animation: popIn 0.4s ease forwards;
}
@keyframes popIn {
  0%{ transform: scale(0.4); opacity: 0; }
  70%{ transform: scale(1.1); }
  100%{ transform: scale(1); opacity: 1; }
}
#objet-popup-label {
  margin-top: 20px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase; color: #fff;
}
#objet-popup-nom {
  font-size: 22px; font-weight: 700; color: var(--rose); margin-top: 6px;
}
#objet-popup-ok {
  margin-top: 28px; width: 70%;
}

/* ── POPUP NARRATION CENTRAL (mini-jeux réussis) ── */
#popup-narration {
  position: absolute; inset: 0; z-index: 210;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  padding: 28px;
}
#popup-narration.open { display: flex; }
#popup-narration-bloc {
  background: var(--dlg-bg);
  padding: 10px 12px;
  max-width: 90%; width: 100%;
  animation: popIn 0.4s ease forwards;
}
#popup-narration-txt {
  font-size: 14px; line-height: 1.5;
  color: var(--narration-color, #FFDE00);
  min-height: 21px;
}
#popup-narration-ok {
  margin-top: 16px; width: 90%; max-width: 90%;
}

/* ── TUTO ── */
#tuto-zone {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 40; padding: 14px 14px 14px;
}
#tuto-bloc {
  background: var(--dlg-bg); padding: 14px 14px 12px; margin-bottom: 10px;
}
#tuto-txt { font-size: 14px; line-height: 1.5; color: var(--narration-color, #FFDE00); }
/* bouton tuto = rose comme les autres boutons d'action (hérite de .btn-cta) */

/* ── INTRO NARRATION (image + blocs jaunes avant le hall) ── */
#screen-intro { position: relative; }
#intro-zone {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 40; padding: 14px 14px calc(14px + env(safe-area-inset-bottom, 0px));
}
#intro-bloc {
  background: var(--dlg-bg); padding: 14px 14px 12px; margin-bottom: 10px;
}
#intro-txt {
  font-size: 14px; line-height: 1.5;
  color: var(--narration-color, #FFDE00);
  white-space: pre-wrap;
}
/* Fondu noir : l'image apparaît en 1 s depuis le noir, et recouvre TOUT en sortie
   (texte + bouton + boutons UI) pour un écran noir total → z-index élevé. */
#intro-fondu {
  position: absolute; inset: 0; z-index: 100; background: #000;
  opacity: 1; pointer-events: none; transition: opacity 1s ease;
}
/* Bouton "Passer" de l'intro : haut-droite, au-dessus du bouton mute (qui est à
   top ~76px), calé sous la barre d'état via env(safe-area-inset-top). Reprend la
   DA exacte des boutons "← Hall" / "← Titre" (bloc noir, capitales, 11px/700). */
#intro-passer {
  position: absolute;
  top: max(calc(env(safe-area-inset-top, 0px) + 4px), 12px);
  right: 14px;
  z-index: 50;
  background: rgba(0,0,0,0.75);
  color: #fff; border: none;
  font-family: var(--font); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 8px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#intro-fondu.clear { opacity: 0; }
/* Spinner de chargement global (DA rose) : attente titre→intro ou intro→hall. */
#app-spinner {
  position: absolute; inset: 0; z-index: 300; display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
}
#app-spinner.show { display: flex; }
#app-spinner svg { animation: introSpin 0.9s linear infinite; }
@keyframes introSpin { to { transform: rotate(360deg); } }

/* ── PACMAN ── */
#screen-pacman { background: #1a1a2e; }
/* Zone de jeu : prend l'espace dispo et centre le canvas verticalement */
#pac-stage {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 0;
  overflow: hidden;
}
/* Bouton "Passer" (skip) après 3 échecs : haut-droite, dans la zone safe, même DA
   que les boutons "← Hall" / "Passer" de l'intro. */
#pac-passer {
  position: absolute;
  top: max(calc(env(safe-area-inset-top, 0px) + 4px), 12px);
  right: 14px;
  z-index: 30;
  background: rgba(0,0,0,0.75);
  color: #fff; border: none;
  font-family: var(--font); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 8px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#pac-canvas { display: block; }
/* Barre de phrases de Pierre : collée juste sous le bloc jeu (canvas) */
#pac-phrase-bar {
  flex-shrink: 0;
  z-index: 15;
  background: rgba(0,0,0,0.92);
  padding: 12px 16px;
}
#pac-phrase-nom {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--rose); margin-bottom: 6px;
}
#pac-phrase-txt { font-size: 14px; line-height: 1.5; color: #fff; min-height: 44px; }
/* Bulle flottante hall (animation Victor) - même DA partout */
#hall-bubble {
  position: absolute;
  bottom: 24px; left: 14px; right: 14px;
  z-index: 20;
  background: var(--dlg-bg);
  padding: 10px 12px;
  display: none;

#magazine-bg { position: absolute; inset: 0; z-index: 0; background: #000; }

  object-fit: cover; object-position: center;

<script>
// ══════════════════════════════════════════════════════════
// HAUTEUR RÉELLE DU VIEWPORT (fix bande noire iOS)
// ══════════════════════════════════════════════════════════
// iOS — surtout en mode app (ajouté à l'écran d'accueil) — sous-estime la hauteur
// du viewport au tout premier affichage : il reste une bande noire en bas. Elle
// disparaît dès qu'on pivote l'iPhone, parce que la rotation force iOS à
// recalculer le viewport et il donne alors la vraie hauteur (plein écran).
// On ne peut donc pas faire confiance aux unités CSS (vh/dvh) au démarrage : on
// mesure la hauteur en JS et on la réapplique à CHAQUE occasion où iOS peut
// l'avoir corrigée (rotation, resize, retour d'arrière-plan), plus quelques
// passes différées juste après le 1er rendu pour rattraper la bonne valeur sans
// avoir à pivoter le téléphone.
function setAppHeight() {
  const h = Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0);
  if (h > 0) document.documentElement.style.setProperty('--app-h', h + 'px');
}
setAppHeight();
['resize', 'orientationchange', 'pageshow', 'load'].forEach(ev => window.addEventListener(ev, setAppHeight));
if (window.visualViewport) window.visualViewport.addEventListener('resize', setAppHeight);
// iOS corrige parfois le viewport juste après le premier rendu.
[50, 200, 500, 1000].forEach(ms => setTimeout(setAppHeight, ms));

// ══════════════════════════════════════════════════════════

async function init() {
  // Afficher le visuel du titre TOUT DE SUITE (avant même le fetch config) pour
  // éliminer l'écran noir de démarrage. BASE par défaut le temps d'avoir la config.
  const BASE_DEFAUT = 'https://raw.githubusercontent.com/pierrerugier/evg-victor/main/';
  document.getElementById('loading-cover').style.backgroundImage = `url(${BASE_DEFAUT}ecrans/Victors-laoding.jpg)`;
  // Phrases de chargement dès le tout début (occupent pendant le fetch config).
  // Pas de liste par défaut : on rejoue la DERNIÈRE liste du Sheet mise en cache
  // au dernier lancement (localStorage). Au tout 1er lancement (aucun cache),
  // rien ne s'affiche jusqu'à ce que la config arrive — puis la vraie liste tourne.
  startLoadingPhrases();

  const res = await fetch(SHEET_URL + '?v=' + Date.now());
  G = await res.json();
  BASE = G.config.github_base_url || 'https://raw.githubusercontent.com/pierrerugier/evg-victor/main/';
  // Mémoriser la liste du Sheet pour l'afficher dès le début au prochain lancement.
  try {
    if (G.config.phrases_chargement) localStorage.setItem(PHRASES_CACHE_KEY, String(G.config.phrases_chargement));
  } catch (e) {}
  startLoadingPhrases(); // relancer avec la liste (fraîche) du Sheet

  // Slot inventaire générique "montre" : on l'injecte s'il n'existe pas
  // dans le Sheet, pour que la montre choisie chez Rolex s'affiche.
  if (!G.objets.find(o => o.id === 'montre')) {
    G.objets.push({ id:'montre', nom:'Rolex', icon:'icons/milgauss.png' });
  }

  if (G.config.couleur_narration) {
    // couleur_narration = couleur du texte de narration (pas le fond)
    document.documentElement.style.setProperty('--narration-color', G.config.couleur_narration);
  }

  // Charger le tuto depuis le Sheet
  TUTO = (G.tuto || []).sort((a,b) => +a.ordre - +b.ordre).map(t => t.texte).filter(Boolean);
  if (TUTO.length === 0) TUTO = ["Bienvenue dans le jeu !", "Explore l'aéroport.", "Bonne chance !"];

  // Appliquer couleurs config
  if (G.config.couleur_rose) document.documentElement.style.setProperty('--rose', G.config.couleur_rose);
  // Transparence blocs dialogue (depuis sheet)
  const alpha = G.config.dlg_alpha || '0.72';
  document.documentElement.style.setProperty('--dlg-bg', `rgba(0,0,0,${alpha})`);
  if (G.config.font_family) {
    document.documentElement.style.setProperty('--font', `'${G.config.font_family}', sans-serif`);
  }

  // Titre + icône de l'ajout à l'écran d'accueil (iOS), éditables depuis le Sheet :
  // config.app_titre = titre affiché sous l'icône ; config.app_icone = chemin de
  // l'image (relatif au dépôt, ex. "icons/app-icon.png", ou URL complète).
  // iOS lit ces valeurs au moment de "Ajouter à l'écran d'accueil", donc les
  // mettre à jour après le chargement de la config suffit.
  if (G.config.app_titre) {
    document.title = G.config.app_titre;
    const metaTitre = document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if (metaTitre) metaTitre.setAttribute('content', G.config.app_titre);
  }
  if (G.config.app_icone) {
    const ic = String(G.config.app_icone).trim();
    const url = /^https?:\/\//.test(ic) ? ic : (BASE + ic);
    document.querySelectorAll('link[rel="apple-touch-icon"], link[rel="icon"]')
      .forEach(l => l.setAttribute('href', url));
  }

  // Réafficher le visuel du titre avec le BASE réel (au cas où il diffère du défaut).
  document.getElementById('loading-cover').style.backgroundImage = `url(${BASE}ecrans/Victors-laoding.jpg)`;

  // Ne précharger QUE le strict nécessaire pour démarrer vite : titre, intro, hall.
  // Tout le reste est chargé en arrière-plan (fin de init), pendant que le joueur
  // regarde le titre puis lit l'intro.
  const hallLieu = G.lieux.find(l => l.id === 'hall');
  await preload([
    BASE + 'ecrans/Victors-laoding.jpg',
    BASE + ecranIntro(),
    hallLieu && hallLieu.ecran ? BASE + hallLieu.ecran : null,
  ].filter(Boolean));

  // Précharger la musique d'intro dès maintenant (elle sera attendue avant l'intro).
  preloadIntroMusic();

  // Afficher le bouton Jouer (le jingle launch se joue au clic, pas au chargement).
  // Les phrases de chargement tournent déjà depuis le début (voir plus haut).
  document.getElementById('btn-jouer').style.display = 'block';
  document.getElementById('btn-jouer').onclick = () => {
    const btn = document.getElementById('btn-jouer');
    if (btn.disabled) return;
    btn.disabled = true;
    btn.style.opacity = '0.5';
    // Débloquer/résumer le contexte Web Audio DANS le geste, pour que le fondu de
    // la musique d'intro (gain Web Audio) fonctionne ensuite (surtout iOS).
    getAudioCtx();
    // Jouer le jingle sur l'écran titre, attendre qu'il se termine, puis lancer le jeu.
    const jingle = playLaunch();
    const lancerJeu = () => {
      stopLaunch();
      // Pas de musique de hall ici : l'intro a sa propre musique (intro.mp3).
      // ambiance-hall démarre seulement à l'arrivée au hall (onDone).
      const demarrerIntro = () => showIntroSequence(() => { goHall(); showTuto(); startBgMusic(); });
      // Attendre que intro.mp3 soit prête (spinner si besoin) pour que l'intro
      // démarre AVEC sa musique, pas en retard.
      if (introMusicReady) {
        montrerSpinner(true);
        introMusicReady.then(() => { montrerSpinner(false); demarrerIntro(); });
      } else {
        demarrerIntro();
      }
      btn.disabled = false;
      btn.style.opacity = '1';
    };
    if (jingle) {
      // Filet de sécurité : si l'audio est bloqué/échoue, on ne reste pas bloqué sur le titre.
      const delaiSecours = (parseFloat(G.config && G.config.launch_delai) || 8) * 1000;
      const secours = setTimeout(lancerJeu, delaiSecours);
      jingle.addEventListener('ended', () => { clearTimeout(secours); lancerJeu(); }, { once: true });
    } else {
      lancerJeu();
    }
  };

  // Setup inventaire icons
  document.getElementById('inv-icon').src = BASE + 'icons/inventaire-icon.png';
  document.getElementById('inv-bg').src = BASE + 'icons/inventaire.png';

  // Cheat codes (appui long sur l'icône inventaire)
  setupCheat();

  // Filet de sécurité : si le navigateur a bloqué l'autoplay de la musique de
  // fond, la relancer au premier clic/tap utilisateur (hors écran titre).
  // Mais JAMAIS quand le jeu est terminé / sur l'écran de fin : sinon le clic
  // qui déclenche la fin relancerait la musique du hall par-dessus finjeu.mp3.
  const retryAudio = () => {
    const surTitre = document.querySelector('#screen-loading.active');
    const surFin = document.querySelector('#screen-fin.active');
    const surIntro = document.querySelector('#screen-intro.active');
    // Ne JAMAIS relancer ambiance-hall si une ambiance de lieu joue déjà
    // (culte/exterieur/charles) : sinon les deux pistes se superposent → « disque
    // rayé ». Idem sur titre/fin/intro ou une fois le jeu terminé.
    if (!surTitre && !surFin && !surIntro && !jeuTermine && !bgMusicStarted && !bgMusic && !ambianceLieu) startBgMusic();
  };
  document.addEventListener('click', retryAudio);
  document.addEventListener('touchstart', retryAudio);
  // Toute interaction sur le hall réarme le décompte d'inactivité de la pub.
  document.addEventListener('click', resetPubTimer);
  document.addEventListener('touchstart', resetPubTimer);

  // Précharger TOUT LE RESTE en arrière-plan (sans bloquer l'affichage du titre).
  // Le joueur voit le titre + lit l'intro pendant que les décors, le magazine,
  // les icônes, etc. se chargent → plus d'attente noire au démarrage, et tout est
  // prêt quand il arrive au hall. On mémorise l'état pour l'intro (spinner si pas fini).
  preloadRestePromise = preload(collectImages());
  preloadRestePromise.then(() => { preloadResteDone = true; });
}

function collectImages() {
  const urls = [];
  (G.lieux || []).forEach(l => l.ecran && urls.push(BASE + l.ecran));
  (G.objets || []).forEach(o => o.icon && urls.push(BASE + o.icon));
  ['icons/inventaire.png','icons/inventaire-icon.png',
   'ecrans/Victors-laoding.jpg','ecrans/pullupbase.jpg','ecrans/victor-bodypullup.png',
   'ecrans/montreschoix.jpg','ecrans/Oscar.jpg','ecrans/oscarbis.jpg',
   'ecrans/toilette-50K.jpg','ecrans/toilette-shortbernardini.jpg',
   'ecrans/pubkorpus.jpg','ecrans/victordetendu.jpg'].forEach(p => urls.push(BASE + p));
  // Images des cheats de hall (intégrés + Sheet cheats_hall).
  Object.values(getCheatsHall()).forEach(f => urls.push(BASE + 'ecrans/' + f));
  // Mini-jeu Tinder : cadre du téléphone, MATCH, et la photo de chaque fille.
  if ((G.dialogues || []).some(d => d.type === 'tinder')) {
    urls.push(BASE + 'ecrans/' + tinderCadre());
    const fMatch = (G.config && G.config.tinder_match && String(G.config.tinder_match).trim())
      ? String(G.config.tinder_match).trim() : 'match.png';
    urls.push(BASE + 'ecrans/' + fMatch);
    G.dialogues.filter(d => d.type === 'tinder' && d.meta)
      .forEach(d => urls.push(BASE + 'ecrans/' + String(d.meta).trim()));
  }
  urls.push(BASE + ecranIntro());
  // Image de fin (config 'ecran_fin').
  urls.push(BASE + ((G.config && G.config.ecran_fin) ? G.config.ecran_fin : 'ecrans/fin-faro.jpg'));
  // Toutes les pages du magazine (magazine1..N.jpg) dès le chargement initial.
  if ((G.lieux || []).some(l => l.id === 'magazine')) {
    const n = (parseInt(G.config && G.config.magazine_pages) > 0) ? parseInt(G.config.magazine_pages) : 8;
    for (let i = 1; i <= n; i++) urls.push(BASE + 'ecrans/magazine' + i + '.jpg');
  }
  return urls;
}

function preload(urls) {
  return Promise.all(urls.map(url => new Promise(r => {
    const img = new Image(); img.onload = r; img.onerror = r; img.src = url;
  })));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  // Bouton inventaire global : visible sur les écrans de jeu, masqué ailleurs
  // (titre, mini-jeux, écran de fin).
  const invBtn = document.getElementById('inv-btn-global');
  if (invBtn) {
    const avecInv = ['hall', 'scene', 'valises', 'cabines', 'lambert'];
    invBtn.style.display = avecInv.includes(id) ? 'block' : 'none';
  }
  // Fausses phrases de chargement : ne défilent que sur l'écran titre.
  if (id === 'loading') startLoadingPhrases(); else stopLoadingPhrases();
  // Pop-up pub parodie : minuteur d'inactivité armé uniquement sur le hall.
  if (id === 'hall') { if (tutoDone && !pubVue) armPubTimer(); }
  else clearPubIdleTimer();
}

// ── POP-UP PUB PARODIE (hall) ──
// Après 20 s sans interaction sur le hall, une fausse pub plein écran apparaît,
// une seule fois par partie. Countdown 5→0 puis croix pour fermer.
let pubVue = false;              // n'apparaît qu'une fois par partie
let pubIdleTimer = null;         // minuteur d'inactivité (20 s)
let pubCountdownTimer = null;    // décompte 5→0
const PUB_IDLE_MS = 10000;

function clearPubIdleTimer() { if (pubIdleTimer) { clearTimeout(pubIdleTimer); pubIdleTimer = null; } }
function armPubTimer() {
  clearPubIdleTimer();
  if (pubVue) return;
  pubIdleTimer = setTimeout(showPub, PUB_IDLE_MS);
}
// Réinitialise le décompte d'inactivité à chaque interaction (uniquement sur le hall).
function resetPubTimer() {
  if (pubVue) return;
  if (document.querySelector('#screen-hall.active') && tutoDone) armPubTimer();
  else clearPubIdleTimer();
}
function showPub() {
  if (pubVue) return;
  pubVue = true;
  clearPubIdleTimer();
  const overlay = document.getElementById('pub-overlay');
  const img = document.getElementById('pub-img');
  const close = document.getElementById('pub-close');
  img.src = BASE + 'ecrans/pubkorpus.jpg';
  close.classList.remove('actif');
  close.onclick = null;
  let n = 5;
  close.textContent = n;
  overlay.classList.add('open');
  pubCountdownTimer = setInterval(() => {
    n--;
    if (n > 0) {
      close.textContent = n;
    } else {
      clearInterval(pubCountdownTimer); pubCountdownTimer = null;
      close.textContent = '✕';           // le décompte devient une croix
      close.classList.add('actif');
      close.onclick = fermerPub;
    }
  }, 1000);
}
function fermerPub() {
  document.getElementById('pub-overlay').classList.remove('open');
  if (pubCountdownTimer) { clearInterval(pubCountdownTimer); pubCountdownTimer = null; }
}

// ── FAUSSES PHRASES DE CHARGEMENT (écran titre) ──
// Petites phrases bidon qui défilent au-dessus du bouton "Jouer".
// Modifiables/ajoutables depuis le back end : ligne `phrases_chargement`
// de l'onglet config du Sheet, séparées par des « | ».
let loadingPhrasesTimer = null;
const PHRASES_CACHE_KEY = 'evg_phrases_chargement';
function parsePhrases(raw) {
  return raw ? String(raw).split('|').map(s => s.trim()).filter(Boolean) : [];
}
// Aucune liste par défaut : on veut TA liste du Sheet. Si la config n'est pas
// encore chargée, on utilise la dernière liste du Sheet mise en cache au
// lancement précédent. Au tout premier lancement (aucun cache), liste vide →
// rien tant que le Sheet n'a pas répondu.
function getPhrasesChargement() {
  const raw = G && G.config && G.config.phrases_chargement;
  const list = parsePhrases(raw);
  if (list.length) return list;
  try { return parsePhrases(localStorage.getItem(PHRASES_CACHE_KEY)); } catch (e) { return []; }
}
// Durée d'affichage proportionnelle au nombre de mots :
// 3 mots = 0,4 s, +0,2 s par mot supplémentaire (4 = 0,6 s, 5 = 0,8 s, etc.).
// Plancher à 3 mots pour les phrases plus courtes.
function dureePhraseMs(phrase) {
  const nbMots = phrase.split(/\s+/).filter(Boolean).length;
  return (Math.max(nbMots, 3) - 1) * 200;
}
// Mélange (Fisher-Yates) sans muter le tableau d'origine.
function melange(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function startLoadingPhrases() {
  stopLoadingPhrases();
  const el = document.getElementById('loading-phrases');
  if (!el) return;
  const phrases = getPhrasesChargement();
  if (!phrases.length) return; // pas encore de liste (1er lancement, avant config)
  // Ordre aléatoire : on pioche dans un sac mélangé, reconstitué une fois vidé
  // (évite de répéter une phrase juste avant qu'elles soient toutes passées).
  let sac = [];
  let derniere = null;
  const tick = () => {
    if (sac.length === 0) {
      sac = melange(phrases);
      // Éviter que la 1re phrase du nouveau sac soit identique à la précédente.
      if (sac.length > 1 && sac[0] === derniere) sac.push(sac.shift());
    }
    const phrase = sac.shift();
    derniere = phrase;
    el.textContent = phrase;
    loadingPhrasesTimer = setTimeout(tick, dureePhraseMs(phrase));
  };
  tick();
}
function stopLoadingPhrases() {
  if (loadingPhrasesTimer) { clearTimeout(loadingPhrasesTimer); loadingPhrasesTimer = null; }
  const el = document.getElementById('loading-phrases');
  if (el) el.textContent = '';
}

// ── CHEAT CODES ──
// Appui long (3 s) sur l'icône inventaire → champ de saisie en haut de l'écran.
// Code "complete" : ajoute tous les objets + la condition (Arthur vu) requis
// pour la fin. Il suffit ensuite d'aller faire la traction de Kupi pour finir.
// Déclencheur : 5 taps rapides sur l'icône inventaire. Fiable sur iOS,
// contrairement à l'appui long que Safari interrompt avec son propre geste.
let invTapCount = 0, invTapTimer = null;
const INV_TAPS_CHEAT = 5;     // nombre de taps pour ouvrir le cheat
const INV_TAP_FENETRE = 320;  // délai max (ms) entre deux taps de la séquence
// Appelé par le bouton inventaire (onclick). N'impacte PAS les openInv()
// déclenchés par le jeu lui-même (Charles, etc.), qui restent instantanés.
function onInvBtnTap() {
  invTapCount++;
  if (invTapTimer) clearTimeout(invTapTimer);
  if (invTapCount >= INV_TAPS_CHEAT) {
    invTapCount = 0;
    document.getElementById('inv-overlay').classList.remove('open');
    ouvrirCheat();
    return;
  }
  // Pas d'autre tap dans la fenêtre → appui normal, on ouvre l'inventaire.
  invTapTimer = setTimeout(() => { invTapCount = 0; openInv(); }, INV_TAP_FENETRE);
}
function setupCheat() {
  const input = document.getElementById('cheat-input');
  if (!input) return;
  // Validation du code : à la saisie (mobile, sans touche entrée) ou via Entrée.
  input.addEventListener('input', () => {
    if (getCheatCodes().includes(input.value.trim().toLowerCase())) appliquerCheat(input.value);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') appliquerCheat(input.value);
    else if (e.key === 'Escape') fermerCheat();
  });
}
function ouvrirCheat() {
  const bar = document.getElementById('cheat-bar');
  const input = document.getElementById('cheat-input');
  const msg = document.getElementById('cheat-msg');
  if (!bar || !input) return;
  if (msg) msg.textContent = '';
  input.value = '';
  bar.classList.add('open');
  setTimeout(() => input.focus(), 50);
}
function fermerCheat() {
  const bar = document.getElementById('cheat-bar');
  const input = document.getElementById('cheat-input');
  if (input) input.blur();
  if (bar) bar.classList.remove('open');
}

let cessAudio = null;        // <audio> dédié (indépendant de currentSound → pas coupé au retour hall)
let cessPhraseTimer = null;  // timer de la phrase spéciale sur le hall

const CESS_DUREE_MS = 5000;  // durée de l'image "détendu" + phrase spéciale sur le hall

// Joue cess.mp3 et appelle onEnd À LA FIN du son (ou en cas d'erreur/refus de
// lecture, pour ne jamais bloquer le jeu).
function jouerCess(onEnd) {
  if (!cessAudio) { cessAudio = new Audio(BASE + 'son/cess.mp3'); cessAudio.preload = 'auto'; }
  cessAudio.muted = isMuted;
  let fini = false;
  const finir = () => { if (fini) return; fini = true; if (onEnd) onEnd(); };
  cessAudio.onended = finir;
  cessAudio.onerror = finir;                 // fichier manquant → on enchaîne quand même
  try { cessAudio.currentTime = 0; } catch (e) {}
  const p = cessAudio.play();
  if (p && p.catch) p.catch(() => finir()); // lecture refusée → on enchaîne
  // Filet de sécurité si 'ended' ne se déclenche jamais (rare) : durée connue + marge.
  const dur = (isFinite(cessAudio.duration) && cessAudio.duration > 0) ? cessAudio.duration : null;
  setTimeout(finir, dur ? (dur * 1000 + 3000) : 20000);
}

// Affiche temporairement une image du hall (même dossier que hall.ecran), puis
// revient à l'image normale après dureeMs.
function hallEcranTemporaire(fichier, dureeMs) {
  const hall = G.lieux.find(l => l.id === 'hall');
  hallEcranTemp = hall ? hall.ecran.replace(/[^/]+$/, fichier) : null;
  if (hallEcranTempTimer) clearTimeout(hallEcranTempTimer);
  hallEcranTempTimer = setTimeout(() => {
    hallEcranTemp = null;
    hallEcranTempTimer = null;
    if (document.querySelector('#screen-hall.active')) setupHall();
  }, dureeMs);
}

// Phrase spéciale "Cess" dans la bulle du hall pendant dureeMs, prioritaire :
// coupe l'animation normale, puis la relance à la fin.
function montrerPhraseCess(dureeMs) {
  const rows = G.dialogues
    .filter(d => d.lieu_id && d.lieu_id.toLowerCase() === 'cess')
    .sort((a, b) => +a.ordre - +b.ordre);
  const bubble = document.getElementById('hall-bubble');
  const nomEl = document.getElementById('hall-bubble-nom');
  const txtEl = document.getElementById('hall-bubble-txt');
  if (!rows.length || !bubble || !txtEl) return;
  const row = rows[0]; // ordre 1
  stopHallAnim();                       // couper les phrases normales (et vider la bulle)
  bubble.style.display = 'block';
  if (nomEl) nomEl.textContent = row.personnage || 'Victor';

function actionMeujCess() {

// ── Cheats "écran de hall" éditables depuis le Sheet ──
// Pour AJOUTER un cheat sans repasser par le code : uploader ecrans/<code>.jpg,
// puis ajouter le code dans la config Sheet, clé `cheats_hall` (séparés par |).
//   Exemple : cheats_hall = drag|praud|noel|halloween
// Chaque code X remplace l'image du hall par ecrans/X.jpg (interrupteur).
// Variante si le fichier ne porte pas le nom du code : "code:fichier.jpg".
//   Exemple : cheats_hall = noel:hall-noel.jpg
const CHEATS_HALL_INTEGRES = ['drag', 'praud']; // toujours dispo, même sans Sheet
function getCheatsHall() {
  const map = {};
  const add = (code, fichier) => {
    code = String(code || '').trim().toLowerCase();
    if (!code) return;
    map[code] = (fichier ? String(fichier).trim() : code + '.jpg');
  };
  CHEATS_HALL_INTEGRES.forEach(c => add(c));
  const raw = G && G.config && G.config.cheats_hall;
  if (raw) String(raw).split('|').forEach(entry => {
    const parts = entry.split(':');
    add(parts[0], parts[1]);
  });
  return map; // { code: 'fichier.jpg' }
}
// Tous les codes reconnus (cheat "complete" + tous les cheats d'écran de hall).
function getCheatCodes() {
  return ['complete'].concat(Object.keys(getCheatsHall()));
}
// Interrupteur d'image de fond du hall : retaper le même code désactive ;
// taper un autre code bascule directement sur son image.
function toggleHallOverride(fichier, nom) {
  const hall = G.lieux.find(l => l.id === 'hall');
  const cible = hall ? hall.ecran.replace(/[^/]+$/, fichier) : null;
  if (hallEcranOverride === cible) {
    hallEcranOverride = null;
    return '✓ Mode ' + nom + ' désactivé';
  }
  hallEcranOverride = cible;
  return '✓ Mode ' + nom + ' activé';
}
function appliquerCheat(code) {
  const c = String(code || '').trim().toLowerCase();
  let msgTxt = null;
  if (c === 'complete') {
    // Tous les objets requis pour la fin + les conditions (Arthur vu, lambert validé).
    OBJETS_REQUIS_SECURITE.forEach(id => { if (!inventaire.includes(id)) inventaire.push(id); });
    lieuxVisites.add('arthur');
    lambertValide = true;
    magazineLu = true;
    // Rafraîchir les pins du hall si on y est, pour refléter le nouvel état.
    if (document.querySelector('#screen-hall.active')) setupHall();
    msgTxt = '✓ Tout débloqué — va voir Kupi et fais la traction !';
  } else {
    // Cheat d'écran de hall (intégré ou défini dans le Sheet).
    const cheatsHall = getCheatsHall();
    if (!cheatsHall[c]) return false; // code inconnu
    msgTxt = toggleHallOverride(cheatsHall[c], c);
    if (document.querySelector('#screen-hall.active')) setupHall();
  }
  const input = document.getElementById('cheat-input');
  const msg = document.getElementById('cheat-msg');
  if (input) { input.value = ''; input.blur(); }
  if (msg) msg.textContent = msgTxt;
  setTimeout(fermerCheat, 1900);
  return true;
}

// ══════════════════════════════════════════════════════════
// EFFET MACHINE À ÉCRIRE
// ══════════════════════════════════════════════════════════
// (Le timer de frappe est stocké sur chaque élément, cf. typewrite/stopTypewrite,
//  pour qu'un texte n'interrompe jamais la frappe d'un autre.)

function typewrite(el, text, speed, onDone) {
  // Le timer est stocké SUR L'ÉLÉMENT, pas dans une globale unique. Avec une
  // globale, n'importe quel texte qui démarrait ailleurs coupait net la frappe en
  // cours : or plusieurs se déclenchent sur minuterie sans prévenir (bulle du
  // hall en boucle, phrases du pacman, commentaire Tinder différé, commentaires
  // du magazine…). D'où des dialogues qui s'arrêtaient en plein milieu, au hasard.
  // Ici, une nouvelle frappe n'annule que la frappe précédente DU MÊME élément.
  stopTypewrite(el);
  el.textContent = '';
  const len = text.length;
  if (len === 0) { if (onDone) onDone(); return; }
  // On ajoute les caractères un par un à un nœud texte existant (appendData)
  // au lieu de réécrire tout le textContent à chaque frame : évite de recréer
  // le nœud + relayouter tout le bloc à chaque caractère. Rendu identique mais
  // bien moins coûteux → même vitesse réelle sur un long paragraphe (intro) que
  // sur une réplique courte.
  const node = document.createTextNode('');
  el.appendChild(node);
  let i = 0;
  function step() {
    if (i < len) {
      node.appendData(text[i]);
      i++;
      el._twTimer = setTimeout(step, speed);
    } else {
      el._twTimer = null;
      if (onDone) onDone();
    }
  }
  step();
}
// Arrête proprement la frappe en cours d'UN élément (sans toucher aux autres).
function stopTypewrite(el) {
  if (el && el._twTimer) { clearTimeout(el._twTimer); el._twTimer = null; }
}

function typewriteBloc(txtEl, text, onDone) {
  const speed = parseInt(G?.config?.typewriter_speed) || 10;
  typewrite(txtEl, text, speed, onDone);
}
let TUTO = []; // chargé depuis le Sheet onglet 'tuto'

function setupHall() {
  const hall = G.lieux.find(l => l.id === 'hall');
  // Priorité : image temporaire (meuj de cess, 5 s) > cheat (drag/praud) > normale.
  const ecranHall = hallEcranTemp || hallEcranOverride || hall.ecran;
  const bgEl = document.getElementById('hall-bg');
  bgEl.style.backgroundImage = `url(${BASE}${ecranHall})`;
  // Filet de sécurité : si l'image demandée n'existe pas (cheat dont le .jpg n'a
  // pas été uploadé, image temporaire manquante…), une background-image en 404
  // laisserait un HALL NOIR. On teste le chargement et on retombe sur l'image
  // normale du hall en abandonnant l'override fautif.
  if (ecranHall !== hall.ecran) {
    const test = new Image();
    test.onerror = () => {
      if (hallEcranTemp === ecranHall) hallEcranTemp = null;
      if (hallEcranOverride === ecranHall) hallEcranOverride = null;
      bgEl.style.backgroundImage = `url(${BASE}${hall.ecran})`;
    };
    test.src = BASE + ecranHall;
  }

  const pins = document.getElementById('hall-pins');
  pins.innerHTML = '';

  G.lieux.filter(l => {
    if (l.id === 'hall') return false;
    const a = String(l.actif).toLowerCase().trim();
    return a === 'true' || a === 'vrai' || a === '1' || a === 'oui';
  }).forEach(lieu => {
    if (!lieu.pos_x && lieu.pos_x !== 0) return;
    const done = lieuEstComplete(lieu);
    const btn = document.createElement('button');
    btn.className = 'hall-pin' + (done ? ' visited' : '');
    btn.style.left = lieu.pos_x + '%';
    btn.style.top = lieu.pos_y + '%';
    btn.innerHTML = `<svg width="26" height="34" viewBox="0 0 28 36" fill="none">
      <path d="M14 0C6.268 0 0 6.268 0 14c0 9.625 14 22 14 22S28 23.625 28 14C28 6.268 21.732 0 14 0z" fill="${done ? '#fff' : 'var(--rose)'}"/>
      <circle cx="14" cy="14" r="6" fill="${done ? '#ccc' : '#000'}"/>
    </svg>`;
    btn.onclick = () => {
      if (!tutoDone) return; // pins bloqués pendant le tuto
      entrerLieu(lieu.id);
    };
    // Au tout début (1re phrase du tuto), les pins sont masqués ; ils
    // "atterrissent" à la 2e phrase via revealPins().
    if (!pinsReveles && !tutoDone) btn.classList.add('pin-hidden');
    pins.appendChild(btn);
  });

  setupInvGrid();
  // Ne pas démarrer l'animation ici - elle démarre après le tuto
}

// Fait apparaître les pins du hall en cascade (atterrissage), ~1 s au total.
function revealPins() {
  pinsReveles = true;
  const pins = Array.from(document.querySelectorAll('#hall-pins .hall-pin'));
  const n = pins.length;
  const animDur = 360, total = 1000;
  const stagger = n > 1 ? (total - animDur) / (n - 1) : 0;
  pins.forEach((pin, i) => {
    pin.classList.remove('pin-hidden');
    const delay = Math.round(i * stagger);
    pin.style.animationDelay = delay + 'ms';
    pin.classList.add('pin-land');
    // "Toc" à l'impact : le pin touche vers ~62 % de l'anim d'atterrissage.
    setTimeout(() => playPinDrop(i), delay + Math.round(animDur * 0.62));
  });
}

function lieuEstComplete(lieu) {
  // Sécurité (Kupi) : reste rose jusqu'à la vraie fin du jeu (tous les objets).
  // Ne pas passer blanc juste parce qu'on y est entré pour une traction ratée.
  if (lieu.id === 'securite') return jeuTermine;
  // Lambert : validé dès qu'on a cliqué au moins une fois sur le briquet.
  if (lieu.id === 'lambert') return lambertValide;
  // Magazine : validé une fois parcouru en entier (dernière page atteinte).
  if (lieu.id === 'magazine') return magazineLu;
  if (!lieu.objet_donne) return lieuxVisites.has(lieu.id);
  if (lieu.id === 'toilettes') return oscarVisites >= 2;
  // Rolex : le pin passe blanc dès que la Milgauss a été achetée,
  // et le reste même après l'avoir donnée à Charles.
  if (lieu.id === 'rolex') return milgaussAchetee;
  return inventaire.includes(lieu.objet_donne);
}

function peutAcceder(lieu) {
  const requis = String(lieu.objets_requis || '').trim();
  if (!requis) return true;
  return requis.split(',').map(s => s.trim()).filter(Boolean).every(id => inventaire.includes(id));
}

// INTRO NARRATION : un écran (ecrans/intro.jpg) avec plusieurs blocs jaunes
// enchaînés (un par ligne 'intro' du Sheet). "Continuer" cliquable seulement
// après la fin de l'écriture du bloc. Le nombre de blocs = nombre de lignes.
// Image de fond de l'écran d'intro, éditable via config.intro_ecran (défaut intro1.jpg).
function ecranIntro() {
  return (G.config && G.config.intro_ecran) ? G.config.intro_ecran : 'ecrans/intro1.jpg';
}
function montrerSpinner(show) {
  const sp = document.getElementById('app-spinner');
  if (sp) sp.classList.toggle('show', !!show);
}
function showIntroSequence(onDone) {
  const blocs = G.dialogues
    .filter(d => d.lieu_id === 'intro')
    .sort((a, b) => +a.ordre - +b.ordre)
    .map(d => d.texte)
    .filter(t => t && String(t).trim());
  if (blocs.length === 0) { onDone(); return; } // aucune narration → direct au hall

  // Image + fondu noir + musique d'intro dès le début du fondu.
  document.getElementById('intro-bg').style.backgroundImage = `url(${BASE}${ecranIntro()})`;
  const fondu = document.getElementById('intro-fondu');
  const zone = document.getElementById('intro-zone');
  const txtEl = document.getElementById('intro-txt');
  const btn = document.getElementById('intro-btn');
  const btnPasser = document.getElementById('intro-passer');
  if (btnPasser) btnPasser.style.display = 'block';
  fondu.classList.remove('clear');
  fondu.style.transitionDuration = '1s'; // fondu d'entrée sur 1 s
  zone.style.display = 'none'; // texte caché pendant le fondu
  montrerSpinner(false);
  showScreen('intro');
  playIntroMusic();                 // intro.mp3 dès le début du fondu
  void fondu.offsetWidth;           // reflow → commit opacity:1 avant de lancer le fondu
  fondu.classList.add('clear');     // fondu noir → image (1 s), fiable même onglet arrière-plan

  // Sortie d'intro (commune aux deux chemins) : coupe la musique et passe au hall,
  // avec le spinner si le préchargement d'arrière-plan n'est pas encore fini.
  const suite = () => {
    if (introMusic) { introMusic.pause(); introMusic = null; }
    if (btnPasser) btnPasser.style.display = 'none';
    onDone();                              // hall + ambiance-hall
  };
  const allerAuHall = () => {
    if (preloadResteDone) suite();
    else { montrerSpinner(true); preloadRestePromise.then(() => { montrerSpinner(false); suite(); }); }
  };

  // Fin de l'intro (clic "C'est parti") :
  //   - fondu AU noir sur 2 s, puis 1 s d'écran noir (3 s au total) avant le hall
  //   - musique d'intro qui fade out sur les 3 secondes entières
  const terminerIntro = () => {
    btn.disabled = true; btn.style.opacity = '0.4';
    if (btnPasser) btnPasser.style.display = 'none';
    fadeOutIntroMusic(3000);               // fondu sortant musique sur 3 s (gain Web Audio, marche iOS)
    fondu.style.transitionDuration = '2s';
    fondu.classList.remove('clear');       // fondu AU noir sur 2 s
    setTimeout(allerAuHall, 3000);         // 2 s fondu + 1 s écran noir
  };

  // Bouton "Passer" : on ne fait pas subir les 3 s de sortie, fondu court (0,5 s)
  // et on arrive direct au hall. On coupe aussi l'écriture en cours.
  const passerIntro = () => {
    if (btnPasser) btnPasser.style.display = 'none';
    btn.disabled = true; btn.style.opacity = '0.4';
    stopTypewrite(txtEl); // couper la frappe de l'intro en cours
    fadeOutIntroMusic(500);
    fondu.style.transitionDuration = '0.5s';
    fondu.classList.remove('clear');
    setTimeout(allerAuHall, 500);
  };
  if (btnPasser) btnPasser.onclick = passerIntro;

  let i = 0;
  const afficher = () => {
    btn.disabled = true; btn.style.opacity = '0.4';
    txtEl.textContent = '';
    typewriteBloc(txtEl, blocs[i], () => { btn.disabled = false; btn.style.opacity = '1'; });
    btn.textContent = (i === blocs.length - 1) ? "C'est parti !" : 'Continuer';
    btn.onclick = () => {
      if (btn.disabled) return;
      i++;
      if (i < blocs.length) afficher();
      else terminerIntro();
    };
  };
  // Le texte commence quand l'image est totalement visible (fin du fondu, 1 s).
  setTimeout(() => { zone.style.display = 'block'; afficher(); }, 1000);
}

// ══════════════════════════════════════════════════════════
// ANIMATION HALL (phrases de Victor en random)
// ══════════════════════════════════════════════════════════
// Deux listes de phrases d'animation (dialogues lieu_id 'hall') :
//   - type 'animation hall'   = liste principale
//   - type 'animation hall 2' = phrases d'ARRIVÉE, jouées au tout début du jeu
// Les N premières phrases du jeu (config hall_anim_intro_nb, défaut 2) sont
// tirées au hasard dans la 2e liste, puis on passe définitivement à la 1re.
// Le compteur est GLOBAL : startHallAnim() est rappelée à chaque retour au hall,
// donc s'il était local il repartirait à 2 à chaque fois. Ainsi, si le joueur
// quitte le hall entre les deux, la 2e phrase d'arrivée l'attend toujours.
let hallAnimIntroRestantes = null; // null = pas encore initialisé (config pas lue)
let hallAnimDebutDernier = -1;     // évite de tirer 2 fois la même phrase d'arrivée
function hallAnimIntroNb() {
  const n = parseInt(G && G.config && G.config.hall_anim_intro_nb);
  return (n >= 0) ? n : 2;
}

function startHallAnim() {
  if (hallAnimTimer) { clearTimeout(hallAnimTimer); hallAnimTimer = null; }
  const bubble = document.getElementById('hall-bubble');
  const txtEl = document.getElementById('hall-bubble-txt');
  if (!bubble || !txtEl) return;

  const trouverListe = (type) => {
    const d = G.dialogues.find(x =>
      x.lieu_id && x.lieu_id.toLowerCase() === 'hall' && x.type && x.type.toLowerCase() === type
    );
    return d ? d.texte.split('|').map(p => p.trim()).filter(Boolean) : [];
  };
  const phrases = trouverListe('animation hall');         // liste principale
  const phrasesDebut = trouverListe('animation hall 2');  // phrases d'arrivée
  if (phrases.length === 0 && phrasesDebut.length === 0) return;
  if (hallAnimIntroRestantes === null) hallAnimIntroRestantes = hallAnimIntroNb();

  const dureeAffichage = (parseFloat(G.config.time_duration_animation) || 4) * 1000;
  const dureePause = (parseFloat(G.config.pause_duration_animation) || 3) * 1000;

  let lastIdx = -1;
  const tirer = (liste, dernier) => {
    let i;
    do { i = Math.floor(Math.random() * liste.length); }
    while (liste.length > 1 && i === dernier);
    return i;
  };
  function prochainePhrase() {
    // Début de partie : on pioche dans la 2e liste (si elle existe).
    if (hallAnimIntroRestantes > 0 && phrasesDebut.length) {
      hallAnimIntroRestantes--;
      const i = tirer(phrasesDebut, hallAnimDebutDernier);
      hallAnimDebutDernier = i;
      return phrasesDebut[i];
    }
    if (!phrases.length) return null;
    const i = tirer(phrases, lastIdx);
    lastIdx = i;
    return phrases[i];
  }

  function showNext() {
    // Ne pas afficher si le tuto est encore visible
    if (!tutoDone) {
      hallAnimTimer = setTimeout(showNext, 1000);
      return;
    }
    // Ne pas afficher si on n'est plus sur le hall
    if (!document.querySelector('#screen-hall.active')) return;

    const phrase = prochainePhrase();
    if (!phrase) return;
    bubble.style.display = 'block';
    txtEl.textContent = '';
    typewriteBloc(txtEl, phrase, () => {
      hallAnimTimer = setTimeout(() => {
        bubble.style.display = 'none';
        hallAnimTimer = setTimeout(() => {
          if (document.querySelector('#screen-hall.active')) showNext();
        }, dureePause);
      }, dureeAffichage);
    });
  }

  // Démarrer immédiatement (le délai de 5s est géré par l'appelant)
  showNext();
}

function openInv() {
  setupInvGrid();
  document.getElementById('inv-overlay').classList.add('open');

function setupInvGrid() {
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';
  const extras = inventaire.filter(id => !OBJETS_FINAUX.includes(id));
  [...OBJETS_FINAUX, ...extras].forEach(id => {
    const obj = G.objets.find(o => o.id === id);
    if (!obj) return;
    const collected = inventaire.includes(id);
    const slot = document.createElement('div');
    slot.className = 'inv-slot' + (collected ? ' ok' : '');

    // Si on est dans une scène qui attend un objet, rendre les slots cliquables
    const needsObjet = currentLieu && currentLieu.objet_a_donner && collected;
    const surHall = !!document.querySelector('#screen-hall.active');
    if (id === 'meuj' && collected && surHall) {
      // Action "meuj de cess" depuis le hall (prioritaire, ne casse pas le don).
      slot.style.cursor = 'pointer';
      slot.style.outline = '2px solid transparent';
      slot.onmouseenter = () => slot.style.outline = '2px solid var(--rose)';
      slot.onmouseleave = () => slot.style.outline = '2px solid transparent';
      slot.onclick = () => actionMeujCess();
    } else if (needsObjet) {
      slot.style.cursor = 'pointer';
      slot.style.outline = '2px solid transparent';
      slot.onmouseenter = () => slot.style.outline = '2px solid var(--rose)';
      slot.onmouseleave = () => slot.style.outline = '2px solid transparent';
      slot.onclick = () => {
        closeInv();
        handleDonner(id);
      };
    }

    slot.innerHTML = `<img src="${BASE}${obj.icon}" alt="${obj.nom}"><span>${obj.nom}</span>`;
    grid.appendChild(slot);
  });
}
function closeInv() { document.getElementById('inv-overlay').classList.remove('open'); }

let objetPopupQueue = [];

function ajouterObjet(id) {
  if (!id || inventaire.includes(id)) return;

  inventaire.push(id);
  objetPopupQueue.push(id);

// Joue l'animation d'obtention d'un objet À CHAQUE FOIS, même si l'objet est
// déjà dans l'inventaire (utile pour le meuj repris plusieurs fois chez Oscar).
function forcerAnimationObjet(id) {
  if (!id) return;
  if (id === 'meuj') cessCount = 0; // nouveau meuj → 3 usages de cess à nouveau
  if (!inventaire.includes(id)) inventaire.push(id);
  objetPopupQueue.push(id);
  if (objetPopupQueue.length === 1) showNextObjetPopup();
}

function showNextObjetPopup() {

}

function showObjetPopup(id) {
  const obj = G.objets.find(o => o.id === id);
